<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>소리마을 매니저</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200&display=block" rel="stylesheet">
<style>
@font-face{
  font-family:'StitchBody';
  src:url('./assets/fonts/Manrope-VariableFont_wght.ttf') format('truetype');
  font-weight:100 900;
  font-style:normal;
  font-display:swap;
}
@font-face{
  font-family:'Manrope';
  src:url('./assets/fonts/Manrope-VariableFont_wght.ttf') format('truetype');
  font-weight:100 900;
  font-style:normal;
  font-display:swap;
}
@font-face{
  font-family:'StitchHeadline';
  src:url('./assets/fonts/NotoSerifKR-VariableFont_wght.ttf') format('truetype');
  font-weight:100 900;
  font-style:normal;
  font-display:swap;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Manrope','StitchBody',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif!important}
body{background:#faf9f6;color:#1a1c1a;max-width:500px;margin:0 auto;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;padding-bottom:92px}
body.inv-immersive{padding-bottom:max(12px,env(safe-area-inset-bottom))}
*{font-family:inherit}

h1,h2,h3,h4,h5,h6,.title{font-family:'Manrope','StitchBody',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif!important}

:root{
  --pri:#002046;
  --pri-2:#1b365d;
  --bg:#faf9f6;
  --sc-low:#f4f3f1;
  --sc-lowest:#ffffff;
  --sec:#775a19;
  --sec-fixed:#ffdea5;
  --on:#1a1c1a;
  --on-v:#44474e;
  --ov:rgba(196,198,207,.15);
  --err:#ba1a1a;
  --sh:0 1px 3px rgba(26,28,26,0.04);
}

/* ═══ 공통 ═══ */
.banner{background:var(--bg);padding:18px 20px 14px;border-bottom:none;cursor:pointer;box-shadow:0 1px 0 rgba(196,198,207,.25)}
.banner-row{display:flex;justify-content:space-between;align-items:center}
.logo{font-size:10px;letter-spacing:.18em;color:var(--on-v);font-weight:800;text-transform:uppercase}
.title{font-size:18px;font-weight:800;color:var(--pri);margin-top:4px}
.date{font-size:12px;color:var(--on-v);font-weight:600}
.mode-tabs{display:flex;background:transparent;border-bottom:1px solid rgba(196,198,207,.22)}
.mode-tab{flex:1;padding:12px 0;text-align:center;font-size:13px;font-weight:500;color:#555;cursor:pointer;transition:.2s;position:relative}
.mode-tab:active{background:rgba(244,243,241,.9)}
.mode-tab.active{color:#FFD43B;font-weight:700}
.mode-tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:#FFD43B;border-radius:1px}
.loading{display:flex;flex-direction:column;align-items:center;padding:60px 20px;color:#666;font-size:13px;gap:12px}
.spin{width:22px;height:22px;border:2.5px solid rgba(196,198,207,.55);border-top-color:var(--pri);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(250,249,246,0.92);border:1px solid rgba(196,198,207,.38);color:var(--on);padding:9px 16px;border-radius:12px;font-size:13px;opacity:0;transition:.25s;z-index:99;pointer-events:none;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:0 16px 40px rgba(26,28,26,.10)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease}
.help-btn{width:30px;height:30px;border-radius:999px;background:rgba(255,255,255,.65);border:1px solid rgba(196,198,207,.4);color:var(--pri);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-weight:800;flex-shrink:0;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.help-btn:active{transform:scale(.98)}

@keyframes ntc-slide-up{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* ═══ 카톡 대본 스타일 ═══ */
.bar{padding:12px 20px;background:transparent;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.bar-info{font-size:12px;color:var(--on-v);font-weight:700}.bar-info b{color:var(--pri)}.bar-info .b-g{color:#8a6a0a}.bar-info .b-o{color:var(--sec)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 16px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:.15s;white-space:nowrap}
.btn:active{transform:scale(0.985)}
.btn-y{background:linear-gradient(45deg,var(--pri),var(--pri-2));color:#fff}
.btn-d{background:#e9e8e5;color:var(--pri);border:none}
.btn:disabled{opacity:.38;cursor:default;transform:none}
.btn-y-full{background:linear-gradient(45deg,var(--pri),var(--pri-2));color:#fff;width:100%;padding:14px;border-radius:14px;font-size:14px;font-weight:800;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.btn-y-full:active{transform:scale(0.97)}
.progress{height:3px;background:rgba(196,198,207,.22)}.progress-fill{height:100%;background:linear-gradient(90deg,var(--pri),var(--pri-2));transition:width .4s}
.gen-bar{padding:10px 20px;background:transparent;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--on-v)}
.gen-bar .spin-s{width:14px;height:14px;border:2px solid rgba(196,198,207,.5);border-top-color:var(--pri);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
.card{padding:14px 20px;border-bottom:none;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.12s}
.card:active{opacity:.88}.card.done-card{opacity:.62}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.av-y{background:var(--sec-fixed);color:#5d4201}
.av-g{background:rgba(184,150,12,.12);color:#7a6210;border:1px solid rgba(184,150,12,.28)}
.av-o{background:rgba(119,90,25,.10);color:var(--sec)}
.card-body{flex:1;min-width:0}.card-name{font-size:14px;font-weight:700;color:var(--on)}
.card-kw{font-size:12px;color:var(--on-v);margin-top:3px;display:flex;align-items:center;gap:6px}
.card-kw-label{color:var(--sec);font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;flex-shrink:0}
.card-kw-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.card-st{font-size:11px;flex-shrink:0}
.card-kw-input{width:100%;padding:9px 10px;background:rgba(244,243,241,.9);border:1px solid rgba(196,198,207,.35);border-radius:10px;color:var(--on);font-size:12px;font-family:inherit;outline:none;margin-top:6px}
.card-kw-input:focus{border-color:rgba(0,32,70,.35);box-shadow:0 0 0 3px rgba(0,32,70,.08)}
.inp-wrap{padding:0 20px 10px}
.inp-wrap.done-inp{opacity:.52;pointer-events:none}
.inp-label{display:flex;align-items:center;gap:10px;margin:10px 0 5px}
.inp-num{width:26px;height:26px;border-radius:999px;background:var(--sec-fixed);color:#5d4201;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0}
.inp-num.g{background:rgba(184,150,12,.12);color:#7a6210;border:1px solid rgba(184,150,12,.28)}
.inp-num.o{background:rgba(119,90,25,.10);color:var(--sec);border:1px solid rgba(119,90,25,.20)}
.inp-name{font-size:14px;font-weight:500}.inp-gg{font-size:12px;color:#555}
.inp-wrap input{width:100%;padding:12px 12px;background:var(--sc-lowest);border:none;border-radius:12px;color:var(--on);font-size:13px;font-family:inherit;outline:none;box-shadow:var(--sh)}
.inp-wrap input:focus{box-shadow:0 0 0 3px rgba(0,32,70,.10),var(--sh)}
.inp-wrap input::placeholder{color:rgba(68,71,78,.65)}
.inp-wrap input.review-input{border-color:#f59e0b;color:#f59e0b;pointer-events:none}
.det-head{padding:12px 16px;background:transparent;border-bottom:none}
.det-row1{display:flex;align-items:center;justify-content:space-between}
.det-nav{display:flex;gap:5px}
.nav-b{width:34px;height:34px;border-radius:999px;background:rgba(255,255,255,.7);border:1px solid rgba(196,198,207,.45);color:var(--pri);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.nav-b:active{transform:scale(.98)}
.carousel{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 0 4px;overflow:hidden}
.car-name{font-size:12px;color:rgba(68,71,78,.72);transition:all .25s;white-space:nowrap;cursor:pointer;flex-shrink:0}
.car-name.active{font-size:15px;color:var(--pri);font-weight:800}
.car-name.near{font-size:12px;color:rgba(68,71,78,.55)}
@keyframes carSlide{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.car-anim{animation:carSlide .25s ease}
.det-body{padding:16px 20px}
.det-stu{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.det-av{width:40px;height:40px;border-radius:999px;background:var(--sec-fixed);color:#5d4201;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900}
.det-name{font-size:16px;font-weight:900;color:var(--pri)}
.det-sub{font-size:12px;color:var(--on-v);margin-top:2px}
.regen-tag{font-size:11px;margin-bottom:8px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;transition:.15s}
.regen-tag:active{opacity:.7}
.regen-wait{font-size:11px;color:#888;display:inline-flex;align-items:center;gap:4px;margin-bottom:8px}
.regen-wait .spin-s{width:12px;height:12px;border:2px solid rgba(196,198,207,.55);border-top-color:var(--pri);border-radius:50%;animation:sp .7s linear infinite}
.msg-area{width:100%;padding:14px;background:var(--sc-lowest);border:none;border-radius:14px;color:var(--on);font-size:13.5px;line-height:1.75;font-family:inherit;outline:none;resize:none;min-height:220px;margin-bottom:14px;box-shadow:var(--sh)}
.msg-area:focus{box-shadow:0 0 0 3px rgba(0,32,70,.10),var(--sh)}
.msg-area.done{background:rgba(184,150,12,.10);box-shadow:0 0 0 1px rgba(184,150,12,.25),var(--sh);color:var(--on)}
.det-btns{display:flex;gap:8px}.det-btns .btn{flex:1;padding:12px;font-size:13px}
.sent-badge{font-size:11px;color:#8a6a0a;padding:6px 0;text-align:center;margin-bottom:8px}
.short-warn{font-size:11px;color:#f59e0b;padding:4px 0;margin-bottom:6px}
.resume-bar{padding:12px 20px;background:transparent;border-bottom:1px solid rgba(196,198,207,.22);display:flex;align-items:center;justify-content:space-between}
.resume-bar span{font-size:12px;color:var(--on-v);font-weight:700}
.msg-display{width:100%;padding:14px;background:var(--sc-lowest);border:none;border-radius:14px;color:var(--on);font-size:13.5px;line-height:1.75;min-height:220px;margin-bottom:14px;white-space:pre-wrap;word-break:break-word;-webkit-user-select:none;user-select:none;box-shadow:var(--sh)}
.msg-display.done{background:rgba(184,150,12,.10);box-shadow:0 0 0 1px rgba(184,150,12,.25),var(--sh);color:var(--on)}
.msg-edit-hint{font-size:11px;color:#555;text-align:center;margin:-8px 0 10px}
.kk-prev-bar{display:flex;align-items:center;justify-content:flex-end;margin-bottom:8px}
.kk-prev-btn{padding:8px 14px;border-radius:10px;font-size:12px;font-weight:700;border:1px solid rgba(196,198,207,.45);background:rgba(255,255,255,.85);color:var(--pri);cursor:pointer;font-family:inherit}
.kk-prev-btn.on{background:rgba(0,32,70,.1);border-color:rgba(0,32,70,.22)}
.kakao-preview{background:#B2C7D9;padding:16px;border-radius:12px;max-width:360px;margin:0 auto 14px}
.kakao-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.kakao-profile{width:36px;height:36px;border-radius:50%;object-fit:cover;background:#fff;flex-shrink:0}
.kakao-profile--ph{display:flex;align-items:center;justify-content:center;font-size:18px;background:#fff}
.kakao-sender{font-size:13px;font-weight:600;color:#111}
.kakao-bubble{background:#FFF;border-radius:0 12px 12px 12px;padding:10px 14px;font-size:14px;line-height:1.5;word-break:keep-all;max-width:260px;color:#111}
.kakao-bubble p{margin:0;white-space:pre-wrap}
.kakao-time{font-size:11px;color:#555;margin-top:4px;display:block}
.kk-sq-head{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px solid rgba(196,198,207,.18)}
.kk-sq-list{padding:8px 0 100px}
.kk-sq-item{padding:12px 16px;border-bottom:1px solid rgba(196,198,207,.12);display:flex;gap:10px;align-items:flex-start}
.kk-sq-item.disabled{opacity:.55}
.kk-sq-cb{margin-top:4px;width:18px;height:18px;flex-shrink:0}
.kk-sq-main{flex:1;min-width:0}
.kk-sq-line1{font-size:14px;font-weight:800;color:var(--pri);margin-bottom:4px}
.kk-sq-line2{font-size:12px;color:var(--on-v);margin-bottom:6px}
.kk-sq-snip{font-size:12px;color:#666;line-height:1.45;white-space:pre-wrap;word-break:break-word}
.kk-sq-foot{padding:12px 16px 24px;position:sticky;bottom:0;background:linear-gradient(180deg,rgba(250,249,246,0) 0%,#faf9f6 12%);border-top:1px solid rgba(196,198,207,.2)}
.kk-sq-count{font-size:12px;font-weight:700;color:var(--on-v);margin-bottom:10px}
.kk-sq-actions{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.kk-sq-actions .btn{flex:1;min-width:120px;padding:10px 12px;font-size:12px}
.kk-sendprog-item{font-size:12px;padding:6px 0;border-bottom:1px solid rgba(196,198,207,.15)}
.kk-sendprog-bar{height:8px;background:rgba(196,198,207,.25);border-radius:999px;overflow:hidden;margin:10px 0}
.kk-sendprog-fill{height:100%;background:linear-gradient(90deg,var(--pri),var(--pri-2));transition:width .3s}
.modal-card--wide{max-width:380px;text-align:left}
.sec-header{padding:16px 20px 10px;display:flex;align-items:center;gap:10px;border-bottom:none}
.sec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sec-dot-y{background:var(--sec-fixed)}
.sec-dot-g{background:rgba(184,150,12,.45)}
.sec-dot-o{background:rgba(119,90,25,.35)}
.sec-label{font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;flex-shrink:0}
.sec-label-y{color:var(--sec)}.sec-label-g{color:#7a6210}.sec-label-o{color:var(--sec)}
.sec-count{font-size:11px;color:rgba(68,71,78,.75);font-weight:700}
.sec-line{flex:1;height:1px;background:rgba(196,198,207,.22)}
.modal-dim{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.35);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;pointer-events:none;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.modal-dim.on{opacity:1;pointer-events:auto}
.modal-dim.modal-dim--closing{pointer-events:auto}
.modal-card{background:rgba(250,249,246,0.86);border:1px solid rgba(196,198,207,.35);border-radius:18px;padding:24px 20px 20px;width:calc(100% - 48px);max-width:340px;transform:scale(0.95) translateY(10px);transition:transform .2s cubic-bezier(0.34,1.56,0.64,1);text-align:center;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 16px 45px rgba(26,28,26,.12)}
.modal-dim.on .modal-card{transform:scale(1) translateY(0)}
/* 명세서 목록 모달: 화면 높이 안에서만 스크롤 */
.modal-card.modal-card--list{max-height:min(78vh, 520px);display:flex;flex-direction:column;overflow:hidden;text-align:left;padding:14px 12px 12px;width:calc(100% - 32px);max-width:min(380px, 100vw - 32px)}
.modal-card--list .modal-icon{text-align:center;font-size:22px;margin-bottom:4px}
.modal-card--list .modal-title{text-align:center;margin-bottom:2px}
.modal-card--list .modal-desc{text-align:center;margin-bottom:8px;font-size:11px;line-height:1.45}
.modal-card--list .inv-list-head{flex-shrink:0;margin:6px 0 8px}
.inv-list-scroll{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:0 2px 4px 0}
.inv-list-scroll::-webkit-scrollbar{width:4px}
.inv-list-scroll::-webkit-scrollbar-thumb{background:rgba(196,198,207,.55);border-radius:999px}
.modal-card--list .modal-btns{display:flex;gap:8px}.modal-card--list .modal-btns .btn{flex:1;padding:11px;font-size:13px}
.modal-card--list .modal-btns{margin-top:10px;flex-shrink:0}
.modal-icon{font-size:28px;margin-bottom:10px}
.modal-title{font-size:15px;font-weight:900;color:var(--pri);margin-bottom:6px}
.modal-desc{font-size:12.5px;color:var(--on-v);line-height:1.6;margin-bottom:6px}
.modal-names{font-size:12px;color:var(--sec);background:rgba(255,222,165,0.55);border-radius:10px;padding:10px 12px;margin:10px 0 18px;line-height:1.5;max-height:80px;overflow-y:auto}
.modal-btns{display:flex;gap:8px}.modal-btns .btn{flex:1;padding:12px;font-size:13px}
@keyframes slideL{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
.slide{animation:slideL .3s ease}

/* ═══ Tutorial ═══ */
.tut-dim{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.78);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;pointer-events:none;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.tut-dim.on{opacity:1;pointer-events:auto}
.tut-box{width:calc(100% - 48px);max-width:360px;text-align:center;padding:32px 24px 24px;overflow:hidden}
@keyframes tutSlideLeft{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
@keyframes tutSlideRight{from{opacity:0;transform:translateX(-60px)}to{opacity:1;transform:translateX(0)}}
.tut-slide-left{animation:tutSlideLeft .25s ease}
.tut-slide-right{animation:tutSlideRight .25s ease}
.tut-emoji{font-size:48px;margin-bottom:16px}
.tut-step{font-size:11px;color:var(--sec-fixed);font-weight:900;letter-spacing:.18em;margin-bottom:8px;text-transform:uppercase}
.tut-title{font-size:18px;font-weight:900;color:#fff;margin-bottom:10px;line-height:1.4}
.tut-desc{font-size:12px;color:rgba(255,255,255,.78);line-height:1.7;margin-bottom:8px}
.tut-example{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:12px 16px;margin:12px 0 20px;text-align:left}
.tut-example-label{font-size:10px;color:#FFD43B;font-weight:600;letter-spacing:1px;margin-bottom:6px}
.tut-example-text{font-size:11.5px;color:rgba(255,255,255,.82);line-height:1.6}
.tut-dots{display:flex;justify-content:center;gap:8px;margin-bottom:20px}
.tut-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.22);transition:.2s}
.tut-dot.on{background:#FFD43B;width:20px}
.tut-btns{display:flex;gap:8px}
.tut-btns .btn{flex:1;padding:13px;font-size:13px}
.tut-skip{font-size:11px;color:#555;margin-top:14px;cursor:pointer}
.tut-skip:active{color:#888}

/* ═══ 명세서 스타일 ═══ */
.section{border-bottom:none}
.section-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:.1s}
.section-header:active{opacity:.88}
.section-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
.section-dot{width:7px;height:7px;border-radius:50%;background:#FFD43B;flex-shrink:0}
.section-badge{font-size:11px;color:#888;font-weight:400;margin-left:4px}
.section-arrow{font-size:14px;color:#555;transition:transform .2s}
.section-arrow.open{transform:rotate(180deg)}
.section-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.section-body.open{max-height:3000px}
.section-inner{padding:0 20px 16px}
.month-sel{display:flex;align-items:center;gap:8px;margin-bottom:12px}

<script>
// ═══════════════════════════════════════
// 공통 설정
// ═══════════════════════════════════════
var API_URL='https://script.google.com/macros/s/AKfycbzW7VPXPRW0Ltf8ws_1xtdLM0rceMsumj7oi6bLD3jSjOCtYG8_WYGAqjd_UyRjPrQ1/exec';
var IS_TEST=true;
var MODE='home';
var HOME_PANEL='dash';
var APP_DATA=null,APP_LOADING=false,pay_monthCache={};
var HOME_RENDERED=false;

function apiGet(action,params){
  // params: {key:value} 형태로 추가 쿼리 파라미터 전송
  var url=API_URL+'?action='+action;
  if(IS_TEST)url+='&test=1';
  if(params){
    for(var k in params){
      if(params[k]===undefined||params[k]===null)continue;
      url+='&'+encodeURIComponent(k)+'='+encodeURIComponent(params[k]);
    }
  }
  return fetch(url).then(function(r){return r.json()}).then(function(j){if(!j.ok)throw new Error(j.error);return j.data});
}
function apiPost(action,body){
  body.action=action;
  // POST에서도 test 쿼리를 같이 보내야 doPost(e)에서 isTest가 확실히 갈라집니다.
  var url=API_URL+(IS_TEST?'?test=1':'');
  if(IS_TEST)body.test='1'; // 호환용(백엔드가 body.test를 읽도록 바꿀 수도 있으니 유지)
  return fetch(url,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)})
    .then(function(r){return r.json()}).then(function(j){if(!j.ok)throw new Error(j.error);return j.data});
}
function Q(id,h){document.getElementById(id).innerHTML=h}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on')},2500)}

function showModal(html,isList){
  var m=document.getElementById('modal');
  var card=document.getElementById('modalCard');
  if(m._modalCloseEnd){
    m.removeEventListener('transitionend',m._modalCloseEnd);
    m._modalCloseEnd=null;
  }
  m.classList.remove('modal-dim--closing');
  card.innerHTML=html;
  if(isList){card.classList.add('modal-card--list');}else{card.classList.remove('modal-card--list');}
  m.classList.add('on');
}
function closeModal(done){
  var m=document.getElementById('modal');
  var card=document.getElementById('modalCard');
  if(m._modalCloseEnd){
    m.removeEventListener('transitionend',m._modalCloseEnd);
    m._modalCloseEnd=null;
  }
  var wasOpen=m.classList.contains('on');
  m.classList.add('modal-dim--closing');
  m.classList.remove('on');
  if(!wasOpen){
    m.classList.remove('modal-dim--closing');
    card.classList.remove('modal-card--list');
    if(typeof done==='function')done();
    return;
  }
  function end(e){
    if(e.target!==m||e.propertyName!=='opacity')return;
    m.removeEventListener('transitionend',end);
    m._modalCloseEnd=null;
    m.classList.remove('modal-dim--closing');
    card.classList.remove('modal-card--list');
    if(typeof done==='function')done();
  }
  m._modalCloseEnd=end;
  m.addEventListener('transitionend',end);
}

var now=new Date();
document.getElementById('headerDate').textContent=now.getFullYear()+'년 '+(now.getMonth()+1)+'월';

function goHomeBanner(){
  if(MODE==='home'){HOME_PANEL='dash';home_render();}
  else if(MODE==='kakao')kk_goHome();
  else if(MODE==='invoice')invGoHome();
  else if(MODE==='stu')stu_render();
  else if(MODE==='pay')pay_render();
}

function appLoadInitFallback(){
  return Promise.all([
    apiGet('loadStudents'),
    apiGet('loadInvoiceStudents',{year:inv_targetYear,month:inv_selectedMonth}),
    apiGet('loadPaymentStatus',{year:pay_year,month:pay_month}),
    apiGet('getRevenueStats',{year:pay_year,month:pay_month})
  ]).then(function(arr){
    return{
      students:arr[0]||[],
      invoiceStudents:arr[1]||[],
      paymentStatus:arr[2]||null,
      revenueStats:arr[3]||null
    };
  });
}
function appMergeCacheFromData(data){
  APP_DATA=data;
  kk_KW={};
  kk_PrevKW={};
  kk_MSG={};
  kk_DONE=new Set();
  kk_S=data.students||[];
  kk_S.forEach(kk_mergeStudentIntoMaps);
  kk_loaded=true;
  inv_students=data.invoiceStudents||[];
  inv_loaded=true;
  stu_list=data.students||[];
  stu_loaded=true;
  pay_status=data.paymentStatus||null;
  pay_stats=data.revenueStats||null;
  pay_loaded=true;
  if(data.paymentsByMonth&&typeof data.paymentsByMonth==='object'){
    for(var k in data.paymentsByMonth){
      var e=data.paymentsByMonth[k];
      if(e&&e.paymentStatus&&e.paymentStatus.year!=null&&e.paymentStatus.month!=null){
        pay_setCached(Number(e.paymentStatus.year),Number(e.paymentStatus.month),e.paymentStatus,e.revenueStats||null);
      }
    }
  }
  pay_mergeCacheFromAppData();
}
function appApplyInitData(data){
  APP_LOADING=false;
  var prevUnpaid=home_getUnpaidCount();
  var prevTuition=home_getMonthTuitionAmount();
  appMergeCacheFromData(data);
  appRemoveLoader();
  if(MODE==='home'){
    var newUnpaid=home_getUnpaidCount();
    var newTuition=home_getMonthTuitionAmount();
    if(!HOME_RENDERED||prevUnpaid!==newUnpaid||prevTuition!==newTuition){
      home_render();
    }
  }
  else if(MODE==='kakao'){kk_rInput();kk_checkFirstRun();}
  else if(MODE==='invoice'){
    if(!inv_greetEditing)inv_applyMonthGreeting(inv_selectedMonth);
    inv_render();
  }
  else if(MODE==='stu')stu_render();
  else if(MODE==='pay')pay_render();
  else if(MODE==='att')att_render();
  else if(MODE==='more')more_render();
}
function stu_softReloadFromServer(){
  return appLoadInitFallback().then(appMergeCacheFromData);
}
var APP_CACHE_VER=1;
function appCacheKey(){
  return 'sori_app_'+APP_CACHE_VER+'_'+(IS_TEST?'t':'m')+'_'+inv_targetYear+'_'+inv_selectedMonth+'_'+pay_year+'_'+pay_month;
}
function appReadCache(){
  try{
    var raw=localStorage.getItem(appCacheKey());
    if(!raw)return null;
    var o=JSON.parse(raw);
    if(!o||!o.data)return null;
    return o.data;
  }catch(e){return null;}
}
function appWriteCache(data){
  try{
    localStorage.setItem(appCacheKey(),JSON.stringify({v:APP_CACHE_VER,data:data,ts:Date.now()}));
  }catch(e){}
}
function appInit(){
  var cached=appReadCache();
  var hadCache=!!cached;
  if(cached){
    APP_LOADING=false;
    appMergeCacheFromData(cached);
    if(MODE==='home')home_render();
    else if(MODE==='kakao'){kk_rInput();kk_checkFirstRun();}
    else if(MODE==='invoice'){
      if(!inv_greetEditing)inv_applyMonthGreeting(inv_selectedMonth);
      inv_render();
    }
    else if(MODE==='stu')stu_render();
    else if(MODE==='pay')pay_render();
    else if(MODE==='att')att_render();
    else if(MODE==='more')more_render();
    appRemoveLoader();
  }else{
    APP_LOADING=true;
    Q('app','<div class="loading"><div class="spin"></div>불러오는 중...</div>');
  }
  var params={
    year:inv_targetYear,
    month:inv_selectedMonth,
    payYear:pay_year,
    payMonth:pay_month
  };
  fetch(API_URL+'?action=ping'+(IS_TEST?'&test=1':''),{method:'GET'}).catch(function(){});
  apiGet('loadAll',params).catch(function(){
    return appLoadInitFallback();
  }).then(function(data){
    if(!data)return;
    appWriteCache(data);
    appApplyInitData(data);
  }).catch(function(e){
    APP_LOADING=false;
    if(!hadCache){
      appRemoveLoader();
      Q('app','<div style="padding:20px;color:#f87171;font-size:13px">연결 실패: '+esc(e&&e.message?e.message:String(e))+'</div>');
    }else{
      toast('최신 정보를 불러오지 못했어요');
    }
  });
}

function appRemoveLoader(){
  var el=document.getElementById('app-loader');
  if(el)el.remove();
}

function switchTab(m){
  if(MODE==='invoice'&&m!=='invoice'){
    if(inv_feeDropOpen!=null)inv_closeFeeDrop(false);
    inv_VIEW='setting';
    var tb0=document.getElementById('tabbar');
    if(tb0)tb0.style.display='';
    document.body.classList.remove('inv-immersive');
  }
  MODE=m;
  var activeTab=m;
  if(m==='stu'||m==='att'||m==='pay')activeTab='more';
  var elHome=document.getElementById('tabHome');if(elHome)elHome.classList.toggle('active',activeTab==='home');
  var elKakao=document.getElementById('tabKakao');if(elKakao)elKakao.classList.toggle('active',activeTab==='kakao');
  var elInv=document.getElementById('tabInv');if(elInv)elInv.classList.toggle('active',activeTab==='invoice');

function home_getMonthTuitionAmount(){
  try{
    if(typeof inv_calcTotalRaw==='function'&&Array.isArray(inv_students)&&inv_students.length)return inv_calcTotalRaw();
  }catch(e){}
  var arr=(APP_DATA&&APP_DATA.invoiceStudents)||[];
  if(arr.length&&typeof inv_studentRevenue==='function'){
    var sum=0;
    arr.forEach(function(s){sum+=inv_studentRevenue(s)});
    return sum;
  }
  var cur=(pay_stats&&pay_stats.current)?pay_stats.current:null;
  return cur&&typeof cur.total==='number'?cur.total:null;
}
function home_getTuitionMoM(){
  var st=typeof pay_stats!=='undefined'?pay_stats:null;
  var c=null;
  if(st&&st.current&&typeof st.current.total==='number')c=st.current.total;
  if(c===null)try{c=home_getMonthTuitionAmount();}catch(e){}
  if(c===null||typeof c!=='number'||isNaN(c))c=0;
  var p=null;
  if(st){
    if(st.previous&&typeof st.previous.total==='number')p=st.previous.total;
    else if(typeof st.prevMonthTotal==='number')p=st.prevMonthTotal;
  }
  if(p===null||typeof p!=='number'||isNaN(p)||p<=0){
    return{line:'지난달 대비 +0%',tone:'flat',icon:'trending_flat'};
  }
  var raw=((c-p)/p)*100;
  var pct=Math.round(raw*10)/10;
  if(Math.abs(pct)<0.05){
    return{line:'지난달 대비 +0%',tone:'flat',icon:'trending_flat'};
  }
  if(pct>0){
    return{line:'지난달 대비 +'+pct+'%',tone:'up',icon:'trending_up'};
  }
  return{line:'지난달 대비 '+pct+'%',tone:'down',icon:'trending_down'};
}

function ntc_generate(){
  if(!ntc_dateStr.trim()||!ntc_memo.trim()){
    alert('날짜와 메모를 모두 입력해주세요.');
    return;

  if(ntc_isGenerating)return;
  ntc_isGenerating=true;
  document.getElementById('ntc-modal-content').innerHTML=
    '<div style="text-align:center;padding:60px 0;">'
    +'<div style="font-size:15px;font-weight:600;color:#002046;">안내문을 작성하고 있어요...</div>'

    +'</div>';
  apiPost('generateNotice',{type:ntc_type,date:ntc_dateStr,memo:ntc_memo}).then(function(res){
    ntc_generatedText=(res&&res.message)?res.message:(res||'');
    ntc_renderStep3();
  }).catch(function(){
    alert('생성에 실패했습니다. 다시 시도해주세요.');
    ntc_renderStep2();
  }).finally(function(){

    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">'

    +'<div style="display:flex;gap:8px;">'
    +'<button onclick="ntc_generate()" style="flex:1;padding:14px;border:1.5px solid #ddd;border-radius:12px;background:#fff;font-size:14px;font-weight:600;font-family:Manrope, sans-serif;cursor:pointer">다시 생성</button>'
    +'<button onclick="ntc_copy(event)" style="flex:2;padding:14px;border:none;border-radius:12px;background:#002046;color:#fff;font-size:14px;font-weight:700;font-family:Manrope, sans-serif;cursor:pointer">복사하기</button>'
    +'</div>';
}
function ntc_copy(e){
  var btn=e&&e.target?e.target:null;
  try{
    navigator.clipboard.writeText(ntc_generatedText).then(function(){
      if(!btn)return;
      var old=btn.textContent;
      btn.textContent='복사 완료 ✓';
      btn.style.background='#28a745';
      setTimeout(function(){
        btn.textContent=old||'복사하기';
        btn.style.background='#002046';
      },1500);
    }).catch(function(){throw new Error('clipboard');});
  }catch(_){
    try{
      var ta=document.createElement('textarea');
      ta.value=ntc_generatedText;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      alert('복사되었습니다.');
    }catch(__){
      alert('복사에 실패했습니다.');
    }
  }
}

  var ps=(APP_DATA&&APP_DATA.paymentStatus)?APP_DATA.paymentStatus:null;
  if(!ps&&typeof pay_status!=='undefined')ps=pay_status;
  var list=(ps&&ps.students)?ps.students:[];
  var hit=list.find(function(x){return (x&&x.name)===s.name});
  if(!hit)return false;
  return !hit.paid;
}
function kk_getBaseList(){
  if(!kk_isOverdueMode())return kk_S;
  return kk_S.filter(function(s){return kk_isOverdueStudent(s)});

function kk_init(){
  if(APP_DATA&&APP_DATA.students){
    kk_KW={};kk_PrevKW={};kk_MSG={};kk_DONE=new Set();
    kk_S=APP_DATA.students||[];
    kk_S.forEach(kk_mergeStudentIntoMaps);

    if(MODE!=='kakao')return;
    kk_rInput();
    kk_checkFirstRun();
    return;
  }
  Q('app','<div class="loading"><div class="spin"></div>학생 목록 불러오는 중...</div>');
  apiGet('loadStudents').then(function(data){
    kk_KW={};kk_PrevKW={};kk_MSG={};kk_DONE=new Set();

function kk_od_getPreset(){

}
function kk_od_setPreset(t){
  try{localStorage.setItem(kk_od_presetKey(),t||'');}catch(e){}
}
function kk_od_payStatus(){
  var ps=(APP_DATA&&APP_DATA.paymentStatus)?APP_DATA.paymentStatus:null;
  if(!ps&&typeof pay_status!=='undefined')ps=pay_status;
  return ps;
}
function kk_od_monthToken(){
  var ps=kk_od_payStatus();
  if(ps&&ps.month!=null&&ps.month!=='')return String(ps.month);
  return String(now.getMonth()+1);
}
function kk_od_unpaidMonthLabel(){return kk_od_monthToken()+'월'}
function kk_od_fmtAmount(s){
  var ps=kk_od_payStatus();
  var list=(ps&&ps.students)?ps.students:[];
  var hit=list.find(function(x){return x&&x.name===s.name});
  if(hit){
    if(hit.feeDisplay)return String(hit.feeDisplay).replace(/\s*원\s*$/,'');
    if(typeof hit.fee==='number'&&hit.fee)return hit.fee.toLocaleString();
  }
  var n=kk_getOverdueAmount(s);
  return n?n.toLocaleString():'0';
}
function kk_od_substitute(tpl,s){
  return String(tpl||'')
    .split('{이름}').join(s.name)
    .split('{금액}').join(kk_od_fmtAmount(s))
    .split('{월}').join(kk_od_monthToken());
}
function kk_od_parseTemplates(res){
  if(res==null)return null;
  var o=res;
  if(typeof o==='string'){
    try{o=JSON.parse(o);}catch(e){return null}
  }
  if(o&&o.data&&o.data.formal)o=o.data;
  if(o&&o.formal&&o.casual&&o.short)return o;
  return null;
}
function kk_od_defaultTemplates(){
  return{
    formal:'안녕하세요, 소리마을음악교습소입니다.\n{이름} 학생 {월}월 수강료 {금액}원 납부가 확인되지 않았습니다.\n확인 부탁드립니다.\n감사합니다.',
    casual:'안녕하세요! 소리마을이에요 🎵\n{이름}님, {월}월 수강료 {금액}원 아직 입금 전이에요.\n편하실 때 확인 한 번만 부탁드릴게요 ^^',
    short:'[소리마을] {이름}님 {월}월 수강료 {금액}원 미납입니다. 확인 부탁드립니다.'
  };
}
function kk_od_startAi(){
  kk_od_phase='loading';
  kk_rOverdue();
  apiPost('generatePaymentTemplates',{
    prompt:'수납 안내 메시지 템플릿을 작성하세요. 반드시 {이름}, {금액}, {월} 플레이스홀더를 모두 포함할 것. 플레이스홀더는 중괄호 그대로 유지할 것(치환 금지). formal·casual·short 키로 JSON 객체만 출력할 것.',

function kk_od_toggleAcc(row){
  kk_od_accRow=(kk_od_accRow===row)?-1:row;
  kk_rOverdue();
}
function kk_od_sendOne(row){
  var tpl=kk_od_getPreset();
  if(!tpl.trim()){toast('먼저 템플릿을 만들어주세요');return;}
  var s=kk_S.find(function(x){return x.row===row});
  if(!s)return;
  if(!kk_phoneOk(s)){toast('학부모 연락처를 확인해주세요');return;}
  var msg=kk_od_substitute(tpl,s);
  if(KK_USE_ALIGO_API){
    var recipients=[{phone:s.phone,message:msg,studentName:s.name,parentName:s.parentName||''}];
    showModal('<div class="modal-title">발송 중...</div><div class="modal-desc">'+esc(s.name)+'</div><div style="display:flex;justify-content:center;padding:20px 0"><div class="spin"></div></div>',false);
    apiPost('sendFriendTalk',{recipients:recipients}).then(function(results){
      closeModal();
      if(!Array.isArray(results))results=[];
      var ok=results[0]&&results[0].success;
      if(ok){
        kk_DONE.add(kk_key(row));
        apiPost('markDone',{row:row,text:msg,type:'overdue'}).catch(function(){});
        toast('발송 완료');
      }else toast('발송 실패');
      kk_rOverdue();
    }).catch(function(){closeModal();toast('발송 오류');});
  }else{
    try{navigator.clipboard.writeText(msg)}catch(e){toast('복사 실패');return;}
    kk_DONE.add(kk_key(row));
    apiPost('markDone',{row:row,text:msg,type:'overdue'}).catch(function(){kk_DONE.delete(kk_key(row));});
    toast('복사했어요 (Aligo 연동 시 자동 발송)');
    kk_rOverdue();
  }
}
function kk_od_sendAll(){
  var tpl=kk_od_getPreset();
  if(!tpl.trim()){toast('먼저 템플릿을 만들어주세요');return;}
  var base=kk_getBaseList();
  var rows=base.filter(function(s){return kk_phoneOk(s)&&!kk_DONE.has(kk_key(s.row));});
  if(!rows.length){toast('발송할 미납 학생이 없습니다');return;}
  if(!KK_USE_ALIGO_API){
    var all=rows.map(function(s){return kk_od_substitute(tpl,s);}).join('\n\n---\n\n');
    try{navigator.clipboard.writeText(all)}catch(e){toast('복사 실패');return;}
    rows.forEach(function(s){
      kk_DONE.add(kk_key(s.row));
      apiPost('markDone',{row:s.row,text:kk_od_substitute(tpl,s),type:'overdue'}).catch(function(){});
    });
    toast(rows.length+'명 메시지를 한 번에 복사했어요');
    kk_rOverdue();
    return;
  }
  var recipients=rows.map(function(s){
    return{phone:s.phone,message:kk_od_substitute(tpl,s),studentName:s.name,parentName:s.parentName||''};
  });
  kk_showSendingProgress(recipients);
  apiPost('sendFriendTalk',{recipients:recipients}).then(function(results){
    kk_hideSendProgress();
    if(!Array.isArray(results))results=[];
    results.forEach(function(r,ix){
      if(r&&r.success&&rows[ix]){
        kk_DONE.add(kk_key(rows[ix].row));
        apiPost('markDone',{row:rows[ix].row,text:kk_od_substitute(tpl,rows[ix]),type:'overdue'}).catch(function(){});
      }
    });
    kk_showSendResult(results.filter(function(r){return r&&r.success}).length,results.filter(function(r){return r&&!r.success}).length,results);
    kk_rOverdue();
  }).catch(function(){kk_hideSendProgress();toast('전송 오류');});
}

function kk_rOverdue(){
  kk_VIEW='od_flow';

  h+='<div class="bar" style="padding-top:4px"><button type="button" class="btn btn-d" onclick="kk_od_backMain()" style="padding:8px 12px;font-size:12px">← 메인</button><span class="bar-info">수납 안내</span></div>';

    h+='<div class="kk-od-landing"><p style="font-weight:800;color:var(--pri);margin-bottom:8px;font-size:15px">수납 안내 템플릿</p><p>AI로 한 번 만든 뒤 저장하면, 매달 {이름}·{금액}·{월}만 바꿔서 보낼 수 있어요.</p>';
    h+='<button type="button" class="btn-y-full" style="margin-top:16px" onclick="kk_od_startAi()">AI로 템플릿 만들기</button></div>';
  }else if(kk_od_phase==='loading'){
    h+='<div class="loading" style="padding:40px 20px"><div class="spin"></div><span>Gemini로 템플릿 생성 중...</span></div>';
  }else if(kk_od_phase==='pick'&&kk_od_picks){
    h+='<div class="kk-od-pick">';
    [['formal','① 정중한 톤'],['casual','② 캐주얼 톤'],['short','③ 간결한 톤']].forEach(function(pair){
      var k=pair[0],lab=pair[1],txt=kk_od_picks[k]||'';
      h+='<div class="kk-od-pick-card"><div style="font-size:12px;font-weight:900;color:var(--pri)">'+lab+'</div>';
      h+='<div class="kk-od-pick-pre">'+esc(txt)+'</div>';
      h+='<button type="button" class="btn btn-y" style="width:100%" onclick="kk_od_pickSelect(&quot;'+k+'&quot;)">이걸로 선택</button></div>';
    });

function kk_genAllOverwrite(){

function kk_resumeGen(){
  var base=kk_getBaseList();
  kk_GEN_TG=kk_isOverdueMode()?base.filter(function(s){return!kk_DONE.has(kk_key(s.row))&&!kk_MSG[kk_key(s.row)]}):base.filter(function(s){return(kk_KW[kk_key(s.row)]||'').trim()&&!kk_DONE.has(kk_key(s.row))&&!kk_MSG[kk_key(s.row)]});
  if(!kk_GEN_TG.length){toast('생성할 학생이 없습니다');return}
  kk_CANCEL=false;kk_GEN=true;kk_GT=kk_GEN_TG.length;kk_GC=0;
  kk_rList();kk_runGen(0);
}

function kk_runGen(idx){
  if(kk_CANCEL||!kk_GEN){kk_GEN=false;kk_updGB();if(!kk_hasMsg())kk_rInput();return}
  if(idx>=kk_GEN_TG.length){kk_GEN=false;kk_GC=0;kk_GT=0;kk_updGB();return}
  var s=kk_GEN_TG[idx];
  if(kk_REGEN.has(kk_key(s.row))||kk_MSG[kk_key(s.row)]){kk_runGen(idx+1);return}
  kk_GC=idx+1;kk_updGB();
  var payload=kk_isOverdueMode()
    ? {name:s.name,gg:s.gg,type:'overdue',overdueAmount:kk_getOverdueAmount(s),overdueMonth:kk_getOverdueMonth(),hist:s.hist}
    : {name:s.name,gg:s.gg,type:'feedback',kw:kk_KW[kk_kwFeedbackKey(s.row)],hist:s.hist};
  apiPost('generateKakao',payload).then(function(m){
    if(kk_CANCEL){kk_GEN=false;if(!kk_hasMsg())kk_rInput();return}
    if(m.indexOf('[SHORT]')===0){kk_SHORT[kk_key(s.row)]=true;m=m.substring(7)}
    kk_MSG[kk_key(s.row)]=m;
    apiPost('saveMessage',{row:s.row,text:m,type:kk_messageType});
    if(kk_VIEW==='list')kk_refreshCards();
    if(kk_VIEW==='detail'){kk_updDetCounter();toast(s.name+' 생성 완료 ✓')}
    kk_runGen(idx+1);
  }).catch(function(e){
    if(kk_CANCEL){kk_GEN=false;return}
    kk_MSG[kk_key(s.row)]='[실패: '+e.message+']';
    if(kk_VIEW==='list')kk_refreshCards();
    kk_runGen(idx+1);
  });
}

  el.innerHTML='<div class="spin-s"></div>'+kk_GC+'/'+kk_GT+'명 생성 중...<button class="btn btn-d" onclick="kk_CANCEL=true;kk_GEN=false;kk_updGB();kk_refreshCards()" style="padding:4px 10px;font-size:11px;margin-left:auto">취소</button>';

function kk_phoneOk(s){
  var p=String((s&&s.phone)||'').replace(/\D/g,'');
  return p.length>=10;
}
function kk_snipMsg(row){
  var t=(kk_MSG[kk_key(row)]||'').replace(/\s+/g,' ');
  if(t.length>20)return esc(t.substring(0,20))+'…';
  return esc(t);
}
function kk_sendSelCount(){
  var n=0;
  var base=kk_getBaseList();
  kk_SEND_QUEUE.forEach(function(row){
    var s=base.find(function(x){return x.row===row});
    if(s&&kk_phoneOk(s))n++;
  });
  return n;
}
function kk_maskPhone(phone){
  var d=String(phone||'').replace(/\D/g,'');
  if(d.length<10)return phone||'';
  if(d.length===10)return d.slice(0,3)+'-****-'+d.slice(6);
  if(d.length===11)return d.slice(0,3)+'-****-'+d.slice(7);
  return d.slice(0,3)+'-****-'+d.slice(-4);
}

function kk_toggleSend(row){
  var s=kk_getBaseList().find(function(x){return x.row===row});
  if(!s||!kk_phoneOk(s))return;
  if(kk_SEND_QUEUE.has(row))kk_SEND_QUEUE.delete(row);
  else kk_SEND_QUEUE.add(row);
  kk_rSendQueue();
}
function kk_toggleAllSend(on){
  var base=kk_getBaseList();
  var doneList=base.filter(function(s){return kk_DONE.has(kk_key(s.row))&&kk_MSG[kk_key(s.row)]});
  kk_SEND_QUEUE.clear();
  if(on)doneList.forEach(function(s){if(kk_phoneOk(s))kk_SEND_QUEUE.add(s.row)});
  kk_rSendQueue();
}
function kk_openSendConfirm(){
  var n=kk_sendSelCount();
  if(n<1){toast('선택된 수신자가 없습니다');return;}
  var lines=[];
  var base=kk_getBaseList();
  kk_SEND_QUEUE.forEach(function(row){
    var s=base.find(function(x){return x.row===row});
    if(!s||!kk_phoneOk(s))return;
    lines.push('<div style="font-size:12px;margin:6px 0">· '+esc(s.name)+' '+esc(s.parentName||'')+' ('+esc(kk_maskPhone(s.phone))+')</div>');
  });
  showModal('<div class="modal-title">⚠️ 전송 확인</div><div class="modal-desc" style="text-align:left">아래 '+n+'명의 학부모에게 친구톡이 전송됩니다.</div><div style="text-align:left;max-height:160px;overflow-y:auto;margin:10px 0">'+lines.join('')+'</div><div class="modal-desc" style="font-size:11px;color:#ba1a1a">전송 후 취소할 수 없습니다.</div><div class="modal-btns"><button class="btn btn-d" onclick="closeModal()">취소</button><button class="btn btn-y" onclick="closeModal();kk_execSend()">전송하기</button></div>');
}
function kk_execSend(){
  if(!KK_USE_ALIGO_API){toast('Aligo 연동이 필요합니다');return;}
  var recipients=[];
  var base=kk_getBaseList();
  kk_SEND_QUEUE.forEach(function(row){
    var s=base.find(function(x){return x.row===row});
    if(s&&kk_phoneOk(s))recipients.push({phone:s.phone,message:kk_MSG[kk_key(row)]||'',studentName:s.name,parentName:s.parentName||''});
  });
  if(!recipients.length){toast('전송할 대상이 없습니다');return;}
  kk_showSendingProgress(recipients);
  apiPost('sendFriendTalk',{recipients:recipients}).then(function(results){
    kk_hideSendProgress();
    if(!Array.isArray(results))results=[];
    var ok=results.filter(function(r){return r&&r.success}).length;
    var fail=results.length-ok;
    kk_showSendResult(ok,fail,results);
  }).catch(function(){
    kk_hideSendProgress();
    toast('전송 중 오류가 발생했습니다.');
  });
}
function kk_showSendingProgress(recipients){
  var n=recipients.length;
  showModal('<div class="modal-title">📤 전송 중...</div><div class="modal-desc">'+n+'명에게 발송 요청 중입니다.</div><div style="display:flex;justify-content:center;padding:20px 0"><div class="spin"></div></div>',false);
}
function kk_hideSendProgress(){closeModal()}
function kk_showSendResult(ok,fail,results){
  var lines='<div style="font-size:13px;color:var(--pri);font-weight:800;margin-bottom:8px">전송 완료</div>';
  lines+='<div style="font-size:12px;margin:6px 0">✅ 성공: '+ok+'명</div>';
  if(fail>0)lines+='<div style="font-size:12px;margin:6px 0">❌ 실패: '+fail+'명</div>';
  if(fail>0&&results){
    results.filter(function(r){return r&&!r.success}).forEach(function(r){
      lines+='<div style="font-size:11px;color:#666;word-break:break-all">· '+esc(r.studentName||'')+' — '+esc(r.message||'실패')+'</div>';
    });
  }
  lines+='<div class="modal-btns" style="margin-top:14px"><button class="btn btn-y" onclick="closeModal()">확인</button></div>';
  showModal(lines,true);
}

function kk_buildSectionedCards(edit){
  var base=kk_getBaseList();
  var gen=base.filter(function(s){return kk_MSG[kk_key(s.row)]||kk_DONE.has(kk_key(s.row))});
  var reviewList=gen.filter(function(s){return kk_isReview(s)});
  var ungenList=kk_isOverdueMode()
    ? base.filter(function(s){return kk_isUngen(s)&&!kk_MSG[kk_key(s.row)]})
    : base.filter(function(s){return(kk_KW[kk_key(s.row)]||'').trim()&&kk_isUngen(s)&&!kk_MSG[kk_key(s.row)]});
  var doneList=gen.filter(function(s){return kk_DONE.has(kk_key(s.row))});
  var h='';
  if(!gen.length&&!ungenList.length&&!kk_GEN)return '<div style="padding:40px 20px;text-align:center"><p style="color:#555;font-size:13px;margin-bottom:16px">생성된 메시지가 없습니다</p><button class="btn btn-y" onclick="kk_rInput()" style="padding:12px 24px">← 키워드 입력</button></div>';
  if(!gen.length&&!ungenList.length&&kk_GEN)return '';
  if(reviewList.length>0){
    h+='<div class="sec-header"><div class="sec-dot sec-dot-o"></div><span class="sec-label sec-label-o">검수대기</span><span class="sec-count">'+reviewList.length+'명</span><div class="sec-line"></div></div>';
    reviewList.forEach(function(s){h+=kk_buildOneCard(s,edit,'review')});
  }
  if(ungenList.length>0){
    h+='<div class="sec-header"><div class="sec-dot sec-dot-y"></div><span class="sec-label sec-label-y">미생성</span><span class="sec-count">'+ungenList.length+'명</span><div class="sec-line"></div></div>';
    ungenList.forEach(function(s){h+=kk_buildOneCard(s,edit,'ungen')});
  }
  if(doneList.length>0){
    h+='<div class="sec-header"><div class="sec-dot sec-dot-g"></div><span class="sec-label sec-label-g">복사완료</span><span class="sec-count">'+doneList.length+'명</span><div class="sec-line"></div></div>';
    doneList.forEach(function(s){h+=kk_buildOneCard(s,edit,'done')});
  }
  return h;
}

function kk_buildOneCard(s,edit,status){
  var kw=kk_KW[kk_key(s.row)]||'',kwFB=kk_KW[kk_kwFeedbackKey(s.row)]||kw,isShort=kk_SHORT[kk_key(s.row)];
  if(kk_isOverdueMode()){
    edit=false;
  }
  if(edit&&status==='review'){
    return '<div style="padding:10px 20px;border-bottom:1px solid #151515;display:flex;align-items:center;gap:12px"><div class="av av-o">'+s.name[0]+'</div><div style="flex:1;min-width:0"><div class="card-name">'+s.name+'</div><input class="card-kw-input" value="'+esc(kw)+'" oninput="kk_onEditKw('+s.row+',this.value)" placeholder="키워드"/></div></div>';
  }
  var avC,stC,stT;
  if(status==='done'){avC='av-g';stC='#4ade80';stT='복사완료'}
  else if(status==='ungen'){avC='av-y';stC='#FFD43B';stT='미생성'}
  else{avC='av-o';stC='#f59e0b';stT=isShort?'짧음':'검수대기'}
  var stHtml;
  if(kk_EDITED.has(kk_key(s.row))&&status==='review'){
    stHtml='<span onclick="event.stopPropagation();kk_doRegenFromList('+s.row+')" style="background:#f59e0b;color:var(--on);padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer">재생성</span>';
  }else{stHtml='<span class="card-st" style="color:'+stC+'">'+stT+'</span>'}
  var cardClass=status==='done'?'card done-card':'card';
  var clickAction=status==='ungen'?'':'onclick="kk_showDet('+s.row+')"';
  if(kk_isOverdueMode()){
    var amt=kk_getOverdueAmount(s);
    var meta=kk_getOverdueMonth()+' 미납 · '+(amt?amt.toLocaleString():'—')+'원';
    return '<div class="'+cardClass+'" '+clickAction+'><div class="av '+avC+'">'+s.name[0]+'</div><div class="card-body"><div class="card-name">'+s.name+'</div><div class="card-kw"><span class="card-kw-label">미납</span><span class="card-kw-text">'+esc(meta)+'</span></div></div>'+stHtml+'</div>';
  }
  if(!kk_isOverdueMode()&&status==='ungen'){
    return '<div class="'+cardClass+'" style="flex-wrap:wrap"><div class="av av-y">'+s.name[0]+'</div><div class="card-body"><div class="card-name">'+s.name+'</div><div class="card-kw"><span class="card-kw-label">키워드</span><span class="card-kw-text">'+(kwFB?esc(kwFB.substring(0,35)):'미입력')+'</span></div></div><span class="card-st" style="color:#FFD43B">미생성</span><input class="card-kw-input" value="'+esc(kwFB)+'" oninput="kk_kwCh('+s.row+',this.value)" placeholder="예: 바이엘 2권, 손목 힘 좋아짐" onclick="event.stopPropagation()"/></div>';
  }
  return '<div class="'+cardClass+'" '+clickAction+'><div class="av '+avC+'">'+s.name[0]+'</div><div class="card-body"><div class="card-name">'+s.name+'</div><div class="card-kw"><span class="card-kw-label">키워드</span><span class="card-kw-text">'+esc(kw.substring(0,35))+'</span></div></div>'+stHtml+'</div>';
}

function kk_onEditKw(row,v){if(kk_KW[kk_key(row)]!==v)kk_EDITED.add(kk_key(row));kk_KW[kk_key(row)]=v}

function kk_toggleEdit(){
  kk_EDITMODE=!kk_EDITMODE;
  document.getElementById('kk_cardList').innerHTML=kk_buildSectionedCards(kk_EDITMODE);
  var btn=document.getElementById('kk_editBtn');
  if(btn){
    if(kk_EDITMODE){btn.textContent='수정 완료';btn.classList.remove('btn-d');btn.classList.add('btn-y')}
    else{
      btn.classList.remove('btn-y');btn.classList.add('btn-d');btn.textContent='키워드 수정';
      var reviewS=kk_S.filter(function(s){return kk_isReview(s)});
      apiPost('saveKeywords',{updates:reviewS.map(function(s){return{row:s.row,kw:kk_KW[kk_kwFeedbackKey(s.row)]||''}})});
      kk_refreshCards();
    }
  }
}

function kk_doRegenFromList(row){
  kk_EDITED.delete(kk_key(row));delete kk_MSG[kk_key(row)];delete kk_SHORT[kk_key(row)];
  kk_CANCEL=false;kk_GEN=true;kk_GEN_TG=[kk_S.find(function(s){return s.row===row})];kk_GT=1;kk_GC=0;
  kk_refreshCards();kk_updGB();kk_runGen(0);
}

function kk_showDet(row){if(kk_EDITMODE)return;if(!kk_MSG[kk_key(row)])return;kk_CI=kk_S.findIndex(function(s){return s.row===row});kk_rDet(false)}

function kk_buildCarousel(anim){
  var gl=kk_getBaseList().filter(function(x){return kk_MSG[kk_key(x.row)]});
  var pos=gl.findIndex(function(x){return x.row===kk_S[kk_CI].row});
  var prev=pos>0?gl[pos-1].name:'';
  var cur=gl[pos]?gl[pos].name:'';
  var nxt=pos<gl.length-1?gl[pos+1].name:'';
  var cls=anim?' car-anim':'';
  var h='';
  if(prev)h+='<span class="car-name near" onclick="kk_nav(-1)">'+prev+'</span>';
  h+='<span class="car-name active'+cls+'">'+cur+'</span>';
  if(nxt)h+='<span class="car-name near'+cls+'" onclick="kk_nav(1)">'+nxt+'</span>';
  return h;
}

function kk_formatKakaoTime(){
  var d=new Date();
  var h=d.getHours(),mi=d.getMinutes();
  var ap=h<12?'오전':'오후';
  var hh=h%12;if(hh===0)hh=12;
  return ap+' '+hh+':'+(mi<10?'0':'')+mi;
}
function kk_toggleKakaoPreview(){
  var ta=document.getElementById('kk_msgbox');
  if(ta){kk_MSG[kk_key(kk_S[kk_CI].row)]=ta.value;kk_SHORT[kk_key(kk_S[kk_CI].row)]=false}
  kk_PREVIEW=!kk_PREVIEW;
  kk_rDet(false);
}

function kk_rDet(slide){
  kk_VIEW='detail';
  var s=kk_S[kk_CI],m=kk_MSG[kk_key(s.row)]||'',d=kk_DONE.has(kk_key(s.row)),isShort=kk_SHORT[kk_key(s.row)];
  var gl=kk_getBaseList().filter(function(x){return kk_MSG[kk_key(x.row)]});
  var pos=gl.findIndex(function(x){return x.row===s.row})+1;
  var sentBadge=d?'<div class="sent-badge">복사 완료</div>':'';
  var shortWarn=(!d&&isShort)?'<div class="short-warn">⚠ 메시지가 짧습니다. 직접 수정하세요.</div>':'';
  var tagHtml='';
  if(!d){
    var curKw=kk_KW[kk_kwFeedbackKey(s.row)]||'';
    if(kk_REGEN.has(kk_key(s.row)))tagHtml='<div class="regen-wait"><div class="spin-s"></div>생성 대기 중...</div>';
    else{
      tagHtml='<div class="regen-tag" style="color:#f59e0b;background:rgba(245,158,11,0.08)" onclick="kk_doRegen('+s.row+')">';
      tagHtml+='↻ 다시 생성';
      if(!kk_isOverdueMode()&&curKw)tagHtml+=' <span style="font-size:10px;color:#888;font-weight:500">('+esc(curKw.substring(0,20))+')</span>';
      tagHtml+='</div>';
    }
  }
  var btns;
  if(d){
    var gl2=kk_getBaseList().filter(function(x){return kk_MSG[kk_key(x.row)]});
    var curPos=gl2.findIndex(function(x){return x.row===s.row});
    var nextPending=gl2.slice(curPos+1).find(function(x){return!kk_DONE.has(kk_key(x.row))});
    var hasNext=curPos<gl2.length-1;
    btns='<div class="det-btns">';
    btns+='<button class="btn btn-d" onclick="kk_undo('+s.row+')">되돌리기</button>';
    btns+='<button class="btn btn-d" onclick="kk_doCopy('+s.row+')">다시 복사</button>';
    if(nextPending){
      btns+='<button class="btn btn-y" onclick="kk_goNextPendingDet('+nextPending.row+')">다음 학생 →</button>';
    }else if(hasNext){
      btns+='<button class="btn btn-y" onclick="kk_nav(1)">다음 →</button>';
    }else{
      btns+='<button class="btn btn-y" onclick="kk_rList()">목록으로</button>';
    }
    btns+='</div>';
  }else{btns='<button class="btn-y-full" onclick="kk_doCopy('+s.row+')">복사하기</button>'}
  var prevBar='<div class="kk-prev-bar"><button type="button" class="kk-prev-btn'+(kk_PREVIEW?' on':'')+'" id="kk_prev_toggle" onclick="kk_toggleKakaoPreview()">'+(kk_PREVIEW?'미리보기 닫기':'카카오톡 미리보기')+'</button></div>';
  var bubbleBlock='<div class="kakao-preview" id="kk_preview_wrap" style="display:'+(kk_PREVIEW?'block':'none')+'"><div class="kakao-header"><div class="kakao-profile kakao-profile--ph">🎵</div><span class="kakao-sender">소리마을</span></div><div class="kakao-bubble"><p id="kk_preview_body">'+esc(m)+'</p></div><span class="kakao-time" id="kk_kakao_time">'+esc(kk_formatKakaoTime())+'</span></div>';
  var plainWrap;
  if(d){
    plainWrap='<div id="kk_plain_wrap" style="display:'+(kk_PREVIEW?'none':'block')+'"><div class="msg-display done">'+esc(m)+'</div></div>';
  }else{
    plainWrap='<div id="kk_plain_wrap" style="display:'+(kk_PREVIEW?'none':'block')+'"><div class="msg-display" id="kk_msgdiv" onclick="kk_enterEdit('+s.row+')">'+esc(m)+'</div><div class="msg-edit-hint">탭하여 수정</div></div>';
  }
  var msgHtml=prevBar+plainWrap+bubbleBlock;
  var wrap=slide?'<div class="det-body slide" id="kk_det_body">':'<div class="det-body" id="kk_det_body">';
  var overdueBox='';
  var subText=kk_isOverdueMode()
    ? (s.gg+' · '+kk_getOverdueMonth()+' 미납 '+(kk_getOverdueAmount(s)?kk_getOverdueAmount(s).toLocaleString():'—')+'원')
    : (s.gg+' · '+esc(kk_KW[kk_kwFeedbackKey(s.row)]||''));
  if(kk_isOverdueMode()){
    overdueBox='<div class="kk-overdue-info" style="padding: 12px 16px; background: #fff8f0; border-radius: 10px; margin: 8px 0 12px 0;">'
      +'<div style="font-size: 13px; color: #666; margin-bottom: 4px;">미납 정보 (자동 입력)</div>'
      +'<div style="font-size: 15px; font-weight: 600;"><span id="kk-overdue-amount">'+esc(kk_getOverdueMonth()+' · '+(kk_getOverdueAmount(s)?kk_getOverdueAmount(s).toLocaleString():'—')+'원')+'</span></div>'
      +'</div>';
  }
  kk_Q(
    '<div class="det-head"><div class="det-row1"><button class="btn btn-d" onclick="kk_rList()" style="padding:7px 14px;font-size:12px">목록으로</button><span id="kk_detCount" style="font-size:13px;font-weight:600;color:#888">'+pos+' / '+gl.length+'</span><div class="det-nav"><div class="nav-b" onclick="kk_nav(-1)">‹</div><div class="nav-b" onclick="kk_nav(1)">›</div></div></div><div class="carousel" id="kk_carousel">'+kk_buildCarousel(slide)+'</div></div>'+
    wrap+'<div class="det-stu"><div class="det-av">'+s.name[0]+'</div><div><div class="det-name">'+s.name+'</div><div class="det-sub">'+subText+'</div></div></div>'+overdueBox+sentBadge+shortWarn+tagHtml+msgHtml+btns+'</div>');
  kk_applyTypeBtnStyles();
  setTimeout(function(){
    var body=document.getElementById('kk_det_body');
    if(!body)return;
    var sx=0;
    body.addEventListener('touchstart',function(e){if(e.touches&&e.touches[0])sx=e.touches[0].clientX},{passive:true});
    body.addEventListener('touchend',function(e){
      var t=e.changedTouches&&e.changedTouches[0];
      if(!t)return;
      var dx=t.clientX-sx;
      if(Math.abs(dx)<60)return;
      if(dx<0)kk_nav(1);else kk_nav(-1);
    },{passive:true});
  },50);
}

function kk_enterEdit(row){
  kk_PREVIEW=false;
  var pw=document.getElementById('kk_plain_wrap'),vw=document.getElementById('kk_preview_wrap'),btn=document.getElementById('kk_prev_toggle');
  if(pw)pw.style.display='block';
  if(vw)vw.style.display='none';
  if(btn){btn.textContent='카카오톡 미리보기';btn.classList.remove('on')}
  var div=document.getElementById('kk_msgdiv');if(!div)return;
  var m=kk_MSG[kk_key(row)]||'';
  var ta=document.createElement('textarea');
  ta.className='msg-area';ta.id='kk_msgbox';ta.value=m;
  ta.addEventListener('input',function(){kk_MSG[kk_key(row)]=this.value;kk_SHORT[kk_key(row)]=false});
  div.parentNode.replaceChild(ta,div);
  var hint=document.querySelector('.msg-edit-hint');
  if(hint)hint.innerHTML='<span onclick="kk_exitEdit('+row+')" style="color:#FFD43B;cursor:pointer;font-weight:600">수정 완료 ✓</span>';
  ta.style.height='auto';ta.style.height=Math.max(220,ta.scrollHeight)+'px';
  ta.focus();
}

function kk_exitEdit(row){
  var ta=document.getElementById('kk_msgbox');if(!ta)return;
  kk_MSG[kk_key(row)]=ta.value;
  apiPost('saveMessage',{row:row,text:ta.value,type:kk_messageType});
  ta.blur();
  var div=document.createElement('div');
  div.className='msg-display';div.id='kk_msgdiv';
  div.setAttribute('onclick','kk_enterEdit('+row+')');
  div.textContent=ta.value;
  ta.parentNode.replaceChild(div,ta);
  var hint=document.querySelector('.msg-edit-hint');
  if(hint)hint.innerHTML='탭하여 수정';
}

function kk_goNextPendingDet(row){
  var ix=kk_S.findIndex(function(x){return x.row===row});
  if(ix<0)return;
  kk_CI=ix;
  kk_rDet(true);
}
function kk_nav(dir){
  var cur=kk_S[kk_CI];
  if(!kk_DONE.has(kk_key(cur.row))){var b=document.getElementById('kk_msgbox');if(b){kk_MSG[kk_key(cur.row)]=b.value;apiPost('saveMessage',{row:cur.row,text:b.value,type:kk_messageType})}}
  var gl=kk_getBaseList().filter(function(x){return kk_MSG[kk_key(x.row)]});
  var p=gl.findIndex(function(x){return x.row===cur.row})+dir;
  if(p>=0&&p<gl.length){kk_CI=kk_S.findIndex(function(x){return x.row===gl[p].row});kk_rDet(dir>0)}
}

function kk_doCopy(row){
  var b=document.getElementById('kk_msgbox'),m=b?b.value:kk_MSG[kk_key(row)];
  kk_MSG[kk_key(row)]=m;
  try{navigator.clipboard.writeText(m)}catch(e){}
  if(!kk_DONE.has(kk_key(row))){
    kk_DONE.add(kk_key(row));kk_SHORT[kk_key(row)]=false;
    apiPost('markDone',{row:row,text:m,type:kk_messageType}).catch(function(e){kk_DONE.delete(kk_key(row))});
  }
  toast('클립보드에 복사했어요');
  kk_rDet(false);
}

function kk_doRegen(row){
  var s=kk_S.find(function(x){return x.row===row}),kw=kk_KW[kk_kwFeedbackKey(row)]||'';
  if(!kk_isOverdueMode() && !kw.trim()){toast('키워드를 입력해주세요');return}
  kk_REGEN.add(kk_key(row));kk_rDet(false);
  var payload=kk_isOverdueMode()
    ? {name:s.name,gg:s.gg,type:'overdue',overdueAmount:kk_getOverdueAmount(s),overdueMonth:kk_getOverdueMonth(),hist:s.hist}
    : {name:s.name,gg:s.gg,type:'feedback',kw:kw,hist:s.hist};
  apiPost('generateKakao',payload).then(function(m){
    kk_REGEN.delete(kk_key(row));
    if(m.indexOf('[SHORT]')===0){kk_SHORT[kk_key(row)]=true;m=m.substring(7)}else{kk_SHORT[kk_key(row)]=false}
    kk_MSG[kk_key(row)]=m;apiPost('saveMessage',{row:row,text:m,type:kk_messageType});
    if(kk_VIEW==='detail'&&kk_S[kk_CI].row===row)kk_rDet(false);
  }).catch(function(e){kk_REGEN.delete(kk_key(row));toast('실패: '+e.message);kk_rDet(false)});
}

function kk_undo(row){
  kk_DONE.delete(kk_key(row));kk_rDet(false);
  apiPost('undoDone',{row:row,type:kk_messageType}).catch(function(e){kk_DONE.add(kk_key(row));kk_rDet(false)});
}

  var allOn=(eligible>0 && selN===eligible);

  var allCb=document.getElementById('inv_bulk_all_cb');
  if(allCb){
    allCb.disabled=(eligible<1);

    allCb.indeterminate=(!allOn && selN>0 && selN<eligible);
  }
  var btn=document.getElementById('inv_bulk_send_btn');

  var items=document.querySelectorAll('.inv-list-item[data-idx]');
  items.forEach(function(el){

  var allOn=(eligible>0&&selN===eligible);
  var nextOn=(cb&&typeof cb.checked==='boolean') ? cb.checked : !allOn;

function inv_parseTuitionLine(msg,name){
  var escN=String(name||'').replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  var re=new RegExp('•\\s*'+escN+'\\s*\\(([^)]*)\\)\\s*-\\s*([\\d,]+)원');
  var m=String(msg||'').match(re);
  if(!m)return null;
  return {freq:m[1].trim(),feeRaw:m[2].replace(/,/g,'')};
}
function inv_tuitionDiffersFromMaster(idx){
  var s=inv_students[idx];
  var p=inv_parseTuitionLine(inv_getMsgFor(idx),s.name);
  if(!p)return false;
  var mf=inv_feeNumber(s);
  var pf=parseInt(p.feeRaw,10);
  if(isNaN(pf))pf=mf;
  var freqOk=(p.freq===(s.freq||'').trim());
  var feeOk=(pf===mf);
  return !freqOk||!feeOk;
}

  if(!p||!s.row){cb();return;}
  var feeStr=parseInt(p.feeRaw,10);
  if(isNaN(feeStr)){cb();return;}
  feeStr=feeStr.toLocaleString();
  apiPost('updateStudent',{
    row:s.row,
    name:s.name,
    grade:s.grade||'',
    gender:s.gender||'',
    freq:p.freq,
    fee:feeStr,
    phone:s.phone||'',
    parentName:s.parentName||'',
    level:s.level||'',
    memo:(stu_list.find(function(x){return x.row===s.row})||{}).memo||''
  }).then(function(){
    s.freq=p.freq;
    s.fee=feeStr;
    var stu=stu_list.find(function(x){return x.row===s.row});
    if(stu){stu.freq=p.freq;stu.fee=feeStr;}
    if(typeof inv_editingMsg[idx]!=='undefined')inv_editingMsg[idx]=inv_buildMessage(s);

function inv_parseMaterialLineSum(t){
  if(!t)return 0;
  var sum=0,s=String(t),re=/([\d,]+)\s*원/g,m;
  while((m=re.exec(s))!==null){var n=parseInt(m[1].replace(/,/g,''),10);if(!isNaN(n))sum+=n}
  return sum;
}
function inv_materialsSumForStudent(s){
  if(!s||!s.materials)return 0;
  var sum=0;
  s.materials.forEach(function(x){sum+=inv_parseMaterialLineSum(x.text)});
  return sum;
}

function inv_normalizeTuitionLevel(lv){
  var t=String(lv||'').trim();
  var leg={'기초(바이엘)':'기초','초급(체르니100)':'초급','중급(체르니30)':'중급','고급(체르니40~)':'고급','심화':'고급'};
  if(leg[t])return leg[t];
  if(INV_TUITION_LEVELS.indexOf(t)>=0)return t;
  return '';
}
function inv_freqIndex(freq){
  var m=String(freq||'').match(/주\s*(\d)/);
  if(!m)return -1;
  var n=parseInt(m[1],10);
  return (n>=1&&n<=5)?n-1:-1;
}
function inv_lookupTuitionFee(lev,freq){
  var c=INV_TUITION_LEVELS.indexOf(lev);
  var r=inv_freqIndex(freq);
  if(c<0||r<0)return null;
  return INV_TUITION_MATRIX_WON[r][c];
}
function inv_formatMatLineBlur(t){
  return String(t).replace(/(\d[\d,]*)\s*원/g,function(_,g){

    return (isNaN(n)?g:n.toLocaleString())+'원';
  });
}

function inv_regenGreeting(){

function inv_saveGreetEdit(){
  var ta=document.getElementById('inv_greetTA');

function inv_setMonth(m){
  if(inv_feeDropOpen!=null)inv_closeFeeDrop(false);
  inv_selectedMonth=m;
  document.getElementById('headerDate').textContent=inv_targetYear+'년 '+m+'월';
  inv_scheduleItems.forEach(function(si){si.placeholder=si.placeholder.replace(/\d+\//g,m+'/')});
  inv_applyMonthGreeting(m);
  var ck=inv_cacheKey();
  try{
    var raw=sessionStorage.getItem(ck);
    if(raw){
      inv_students=JSON.parse(raw)||[];
      inv_loaded=true;
      if(APP_DATA)APP_DATA.invoiceStudents=inv_students;
      inv_render();
      apiGet('loadInvoiceStudents',{month:m,year:inv_targetYear}).then(function(data){
        inv_students=data||[];
        try{sessionStorage.setItem(ck,JSON.stringify(inv_students));}catch(e){}
        if(APP_DATA)APP_DATA.invoiceStudents=inv_students;
        inv_render();
      }).catch(function(e){toast('목록 새로고침 실패 — 이전 목록 유지');});
      return;
    }
  }catch(e){}
  inv_loaded=false;
  inv_students=[];
  inv_loadStudents();

function inv_stuTuitionComplete(s){
  var fq=String(s&&s.freq||'').trim();
  if(!fq)return false;
  return inv_feeNumber(s)>0;
}
function inv_stuSummaryBadgesHtml(st){
  var fq=String(st.freq||'').trim();
  var feeN=inv_feeNumber(st);
  var incomplete=!fq||feeN<1;
  var feeLabel=feeN>0?feeN.toLocaleString()+'원':'0원';
  if(incomplete){
    return '<span class="stu-sum-wrap"><span class="stu-sum-badge stu-sum-badge--warn">미입력 · '+esc(feeLabel)+'</span></span>';
  }
  var h='<span class="stu-sum-wrap">';
  h+='<span class="stu-sum-badge">'+esc(fq)+'</span>';
  h+='<span class="stu-sum-badge">'+esc(feeN.toLocaleString())+'원</span>';
  var matSum=inv_materialsSumForStudent(st);
  if(matSum>0)h+='<span class="stu-sum-badge stu-sum-badge--mat">교재 '+matSum.toLocaleString()+'원</span>';
  h+='</span>';
  return h;
}
function inv_buildStudents(){
  var totalPages=Math.ceil(inv_students.length/inv_PER_PAGE);
  var start=inv_stuPage*inv_PER_PAGE,end=Math.min(start+inv_PER_PAGE,inv_students.length);
  var s='<div id="inv_stuListWrap">';
  for(var i=start;i<end;i++){
    var st=inv_students[i],isOpen=inv_openStudents.has(i);
    s+='<div class="stu-item'+(inv_feeDropOpen===i?' inv-fee-open':'')+'"><div class="stu-row" onclick="inv_toggleStu('+i+')">';
    s+='<div class="stu-av">'+st.name[0]+'</div>';
    s+='<span class="stu-name stu-name--fee" onclick="event.stopPropagation();inv_toggleFeeDrop('+i+')">'+esc(st.name)+' <span class="inv-name-chev">▼</span></span>';
    s+=inv_stuSummaryBadgesHtml(st);
    s+='<span class="stu-arrow'+(isOpen?' open':'')+'">›</span></div>';
    s+='<div class="inv-fee-panel" id="inv_fpanel_'+i+'" style="display:none"></div>';
    s+='<div class="stu-detail'+(isOpen?' open':'')+'"><div class="stu-detail-inner">';
    if(st.materials&&st.materials.length>0){
      st.materials.forEach(function(mat,mi){
        s+='<div class="added-item"><div class="added-item-row"><div class="added-item-remove" onclick="inv_removeMat('+i+','+mi+')">✕</div><input value="'+esc(mat.text)+'" placeholder="예: 3/6 반주1 : 7,000원" oninput="inv_students['+i+'].materials['+mi+'].text=this.value;inv_autoSave('+i+');inv_refreshTotalHint()" onblur="inv_blurMat('+i+','+mi+',this)"/></div></div>';
      });
      s+='<div class="material-note">* 교재비는 이체 부탁드립니다🩷</div>';
    }else if(st.prevMaterials&&st.prevMaterials.length>0){
      s+='<div class="material-note">* 전월 교재비 기록이 있어요 (자동 입력 안 함)</div>';
    }
    s+='<div class="add-btn" onclick="inv_addMat('+i+')">+ 교재비 추가</div>';
    s+='</div></div></div>';
  }
  if(totalPages>1){
    s+='<div class="pagi"><div class="pagi-btn'+(inv_stuPage===0?' disabled':'')+'" onclick="inv_goPage('+(inv_stuPage-1)+')">‹</div>';
    for(var p=0;p<totalPages;p++)s+='<div class="pagi-num'+(p===inv_stuPage?' active':'')+'" onclick="inv_goPage('+p+')">'+(p+1)+'</div>';
    s+='<div class="pagi-btn'+(inv_stuPage>=totalPages-1?' disabled':'')+'" onclick="inv_goPage('+(inv_stuPage+1)+')">›</div></div>';
  }
  s+='</div>';
  return s;
}

function inv_attachSwipe(){
  var el=document.getElementById('inv_stuListWrap');if(!el)return;
  var sx=0,sy=0;
  el.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
  el.addEventListener('touchmove',function(e){var dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>8)e.preventDefault()},{passive:false});
  el.addEventListener('touchend',function(e){var dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)<Math.abs(dy)||Math.abs(dx)<40)return;var totalPages=Math.ceil(inv_students.length/inv_PER_PAGE);if(dx<0&&inv_stuPage<totalPages-1)inv_goPage(inv_stuPage+1,'left');else if(dx>0&&inv_stuPage>0)inv_goPage(inv_stuPage-1,'right')},{passive:true});
}

}

function inv_buildPay(){

function inv_buildNotice(){

function inv_buildClosing(){

}

function inv_toggleSec(k){inv_openSections[k]=!inv_openSections[k];inv_renderSetting()}
function inv_toggleStu(i){
  if(inv_feeDropOpen!==null)inv_closeFeeDrop(true);
  inv_openStudents.has(i)?inv_openStudents.delete(i):inv_openStudents.add(i);inv_renderSetting();
}
function inv_goPage(p,dir){
  var mx=Math.ceil(inv_students.length/inv_PER_PAGE)-1;
  if(p<0||p>mx)return;
  if(inv_feeDropOpen!==null)inv_closeFeeDrop(true);
  var d=dir||(p>inv_stuPage?'left':'right');
  inv_stuPage=p;inv_openStudents.clear();inv_renderSetting();
  var el=document.getElementById('inv_stuListWrap');
  if(el){el.classList.add('stu-slide-'+d);setTimeout(function(){if(el)el.classList.remove('stu-slide-left','stu-slide-right')},300)}
}
function inv_addMat(i){inv_students[i].materials.push({text:''});inv_renderSetting()}
function inv_removeMat(si,mi){inv_students[si].materials.splice(mi,1);inv_autoSave(si);inv_renderSetting()}
function inv_addSched(){inv_scheduleItems.push({title:'',value:'',placeholder:'날짜와 내용 입력'});inv_openSections.schedule=true;inv_renderSetting();toast('항목 추가됨')}
function inv_removeSched(idx){inv_scheduleItems.splice(idx,1);inv_renderSetting()}
function inv_makeEditable(el){
  el.contentEditable='true';el.classList.add('editing');el.focus();
  el.parentNode.querySelector('.edit-hint').textContent='수정 중... (다른 곳을 탭하면 저장)';
  el.addEventListener('blur',function(){el.contentEditable='false';el.classList.remove('editing');el.parentNode.querySelector('.edit-hint').textContent='탭하여 수정'},{once:true});
}
function inv_autoSave(i){
  var s=inv_students[i];
  apiPost('saveInvoiceStudent',{name:s.name,materials:s.materials}).catch(function(){toast('저장 실패, 다시 시도해주세요');});
}
function inv_ensureDocFeeClose(){
  if(inv_docFeeBound)return;
  inv_docFeeBound=true;
  document.addEventListener('mousedown',inv_onDocFeeDown,true);
  document.addEventListener('touchstart',inv_onDocFeeDown,{passive:true,capture:true});
}
function inv_onDocFeeDown(ev){
  if(inv_feeDropOpen==null)return;
  var t=ev.target;
  if(t.closest&&(t.closest('.inv-fee-panel')||t.closest('.stu-name--fee')))return;
  inv_closeFeeDrop(true);
}
function inv_fpInitState(i){
  var s=inv_students[i];
  if(!s)return;
  var lev=inv_normalizeTuitionLevel(s.level||'');
  var fq=String(s.freq||'').trim()||'주 3회';
  var feeN=inv_feeNumber(s);
  var exp=inv_lookupTuitionFee(lev,fq);
  var custom=!lev||exp==null||exp!==feeN;
  inv_fpState[i]={
    lev:custom?'':lev,
    freq:fq,
    custom:custom,
    feeNum:feeN,
    feeInputStr:feeN?feeN.toLocaleString():'0'
  };
}
function inv_buildFeePanelHtml(i){
  var st=inv_fpState[i];
  if(!st)return'';
  var h='<div class="inv-fee-panel-in" onclick="event.stopPropagation()">';
  h+='<div class="inv-fee-lab">레벨</div><div class="fee-seg inv-fee-lev">';
  INV_TUITION_LEVELS.forEach(function(l){
    h+='<button type="button" class="fee-seg-item" data-lv="'+esc(l)+'" onclick="inv_fpPickLev('+i+','+JSON.stringify(l)+')">'+esc(l)+'</button>';
  });
  h+='</div><div class="inv-fee-lab">횟수</div><div class="fee-seg inv-fee-fr">';
  for(var w=1;w<=5;w++){
    var fr='주 '+w+'회';
    h+='<button type="button" class="fee-seg-item" data-fr="'+esc(fr)+'" onclick="inv_fpPickFreq('+i+','+JSON.stringify(fr)+')">'+w+'</button>';
  }
  h+='</div><div class="inv-fee-auto" id="inv_fp_auto_'+i+'"></div>';
  h+='<input class="fee-input" id="inv_fp_inp_'+i+'" type="text" inputmode="numeric" placeholder="수강료" style="width:100%;margin-top:4px;box-sizing:border-box" oninput="inv_fpOnFeeInput('+i+',this)"/>';
  h+='<div class="inv-fee-actions"><button type="button" class="btn btn-d" onclick="inv_fpToggleDirect('+i+')">직접 입력</button>';
  h+='<button type="button" class="btn btn-d" onclick="inv_fpOpenMat('+i+')">교재비 추가</button></div></div>';
  return h;
}
function inv_fpPickLev(i,lv){
  var st=inv_fpState[i];
  if(!st)return;
  st.custom=false;
  st.lev=lv;
  var n=inv_lookupTuitionFee(st.lev,st.freq);
  if(n!=null)st.feeNum=n;
  inv_fpSyncUI(i);
}
function inv_fpPickFreq(i,fr){
  var st=inv_fpState[i];
  if(!st)return;
  st.custom=false;
  st.freq=fr;
  var n=inv_lookupTuitionFee(st.lev,st.freq);
  if(n!=null)st.feeNum=n;
  inv_fpSyncUI(i);
}
function inv_fpToggleDirect(i){
  var st=inv_fpState[i];
  if(!st)return;
  st.custom=true;
  st.lev='';
  var inp=document.getElementById('inv_fp_inp_'+i);
  if(inp){
    var parsed=parseInt(String(inp.value).replace(/,/g,''),10);
    if(!isNaN(parsed)&&String(inp.value).replace(/[^\d]/g,''))st.feeNum=parsed;
    st.feeInputStr=st.feeNum?st.feeNum.toLocaleString():'0';
  }
  inv_fpSyncUI(i);
}
function inv_fpOnFeeInput(i,el){
  var st=inv_fpState[i];
  if(!st)return;
  var raw=String(el.value).replace(/[^\d]/g,'');
  if(raw){
    var n=parseInt(raw,10);
    st.feeNum=n;
    st.feeInputStr=n.toLocaleString();
    el.value=st.feeInputStr;
  }else{st.feeNum=0;st.feeInputStr='';el.value='';}
}
function inv_fpSyncUI(i){
  var panel=document.getElementById('inv_fpanel_'+i);
  if(!panel)return;
  var st=inv_fpState[i];
  if(!st)return;
  panel.querySelectorAll('.inv-fee-lev .fee-seg-item').forEach(function(b){
    var v=b.getAttribute('data-lv');
    b.classList.toggle('selected',!st.custom&&st.lev===v);
    b.classList.toggle('inv-fee-muted',st.custom);
  });
  panel.querySelectorAll('.inv-fee-fr .fee-seg-item').forEach(function(b){
    var v=b.getAttribute('data-fr');
    b.classList.toggle('selected',!st.custom&&st.freq===v);
    b.classList.toggle('inv-fee-muted',st.custom);
  });
  var auto=panel.querySelector('#inv_fp_auto_'+i);
  if(auto){
    if(st.custom)auto.textContent='직접 입력 모드';
    else{
      var n=inv_lookupTuitionFee(st.lev,st.freq);
      auto.textContent=n!=null?'→ 자동 계산: '+n.toLocaleString()+'원':'레벨과 횟수를 선택하세요';
    }
  }
  var inp=panel.querySelector('#inv_fp_inp_'+i);
  if(inp){
    inp.style.display=st.custom?'block':'none';
    if(st.custom)inp.value=st.feeInputStr||'';
  }
}
function inv_fpOpenMat(i){
  inv_closeFeeDrop(true);
  if(!inv_openStudents.has(i))inv_openStudents.add(i);
  inv_renderSetting();
}
function inv_toggleFeeDrop(i){
  inv_ensureDocFeeClose();
  if(inv_feeDropOpen===i){
    inv_closeFeeDrop(true);
    return;
  }
  if(inv_feeDropOpen!==null)inv_closeFeeDrop(true);
  inv_feeDropOpen=i;
  inv_fpInitState(i);
  var el=document.getElementById('inv_fpanel_'+i);
  if(!el)return;
  el.innerHTML=inv_buildFeePanelHtml(i);
  el.style.display='block';
  inv_fpSyncUI(i);
}
function inv_closeFeeDrop(save){
  if(inv_feeDropOpen==null)return;
  var ix=inv_feeDropOpen;
  if(save)inv_commitFeeFromPanel(ix);
  delete inv_fpState[ix];
  var el=document.getElementById('inv_fpanel_'+ix);
  if(el){el.style.display='none';el.innerHTML='';}
  inv_feeDropOpen=null;
  if(save)inv_renderSetting();
}
function inv_commitFeeFromPanel(i){
  var s=inv_students[i],st=inv_fpState[i];
  if(!s||!st)return;
  var prevFee=s.fee,prevFreq=s.freq,prevLev=s.level||'';
  var fq=String(st.freq||'').trim()||'주 3회';
  var feeNum,feeStr,levOut;
  if(st.custom){
    feeNum=st.feeNum||0;
    feeStr=feeNum.toLocaleString();
    levOut='';
  }else{
    feeNum=inv_lookupTuitionFee(st.lev,fq);
    if(feeNum==null)feeNum=st.feeNum||0;
    feeStr=feeNum.toLocaleString();
    levOut=st.lev||'';
  }
  s.fee=feeStr;
  s.freq=fq;
  s.level=levOut;
  var stu=stu_list.find(function(x){return x.row===s.row});
  if(stu){stu.fee=feeStr;stu.freq=fq;stu.level=levOut;}
  if(APP_DATA){APP_DATA.students=stu_list;APP_DATA.invoiceStudents=inv_students;}
  inv_syncPayLedgerFromStudent(s);
  try{sessionStorage.setItem(inv_cacheKey(),JSON.stringify(inv_students));}catch(e){}
  inv_refreshTotalHint();
  var body={
    row:s.row,name:s.name,grade:s.grade||'',gender:s.gender||'',
    freq:fq,fee:feeStr,phone:s.phone||'',parentName:s.parentName||'',
    level:levOut,memo:stu&&stu.memo?stu.memo:''
  };
  apiPost('updateStudent',body).catch(function(){
    toast('저장 실패, 다시 시도해주세요');
    s.fee=prevFee;s.freq=prevFreq;s.level=prevLev;
    if(stu){stu.fee=prevFee;stu.freq=prevFreq;stu.level=prevLev;}
    if(APP_DATA){APP_DATA.students=stu_list;APP_DATA.invoiceStudents=inv_students;}
    inv_syncPayLedgerFromStudent(s);
    inv_renderSetting();
  });
}

function inv_startCarousel(){
  inv_VIEW='carousel';inv_carIdx=0;inv_carSlide='';inv_sent.clear();inv_editingMsg={};inv_historySaving=false;
  inv_cancelRevAnim();inv_revSum=0;inv_revDisplay=0;inv_lastAdd=0;inv_listFilter='all';

function inv_renderBulk(){
  var h='<div class="inv-bulk-screen">';
  h+='<div class="inv-bulk-head">';
  h+='<button type="button" class="inv-car-back" onclick="inv_carBack()">← 돌아가기</button>';

  h+='</div><div class="inv-bulk-list">';
  for(var i=0;i<inv_students.length;i++){
    var st=inv_students[i],ok=inv_stuTuitionComplete(st);
    var fq=String(st.freq||'').trim();
    var feeN=inv_feeNumber(st);
    var matSum=inv_materialsSumForStudent(st);
    var col1=ok?esc(fq):'<span class="w">주 -회</span>';
    var col2=ok?esc(feeN.toLocaleString()+'원'):'<span class="w">미입력</span>';
    var col3=matSum>0?('교재 '+matSum.toLocaleString()+'원'):'교재비 없음';
    var isOpen=inv_bulkAccOpen===i;
    h+='<div class="inv-bulk-item">';
    h+='<div class="inv-bulk-row" onclick="inv_toggleBulkAcc('+i+')">';
    h+='<span class="inv-bulk-name">'+esc(st.name)+'</span>';
    h+='<span class="inv-bulk-meta">'+col1+'<span class="sep">|</span>'+col2+'<span class="sep">|</span>'+esc(col3)+'</span>';
    h+='<span class="inv-bulk-arr'+(isOpen?' open':'')+'">▾</span></div>';

function inv_attachCarouselSwipe(){
  var el=document.getElementById('inv_car_body');
  if(!el)return;
  var sx=0,sy=0;
  el.addEventListener('touchstart',function(e){
    if(!e.touches||e.touches.length!==1)return;
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;
  },{passive:true});
  el.addEventListener('touchend',function(e){
    var t=e.changedTouches&&e.changedTouches[0];
    if(!t)return;
    var dx=t.clientX-sx,dy=t.clientY-sy;
    if(Math.abs(dx)<56||Math.abs(dy)>Math.abs(dx)*0.75)return;
    if(dx<0)inv_carNav(1);else inv_carNav(-1);
  },{passive:true});
}
function inv_cancelRevAnim(){if(inv_revRaf){cancelAnimationFrame(inv_revRaf);inv_revRaf=null}}
function inv_syncRevBarNums(){

function inv_revAnimate(to){
  inv_cancelRevAnim();
  var from=inv_revDisplay,start=performance.now(),dur=420;
  function ease(t){return 1-Math.pow(1-t,3)}
  function tick(now){
    var u=Math.min(1,(now-start)/dur);
    inv_revDisplay=Math.round(from+(to-from)*ease(u));
    inv_syncRevBarNums();
    if(u<1)inv_revRaf=requestAnimationFrame(tick);
    else{inv_revDisplay=to;inv_syncRevBarNums();inv_revRaf=null}
  }
  inv_revRaf=requestAnimationFrame(tick);
}

function inv_runBulkFriend(idxs){
  var queue=[];
  for(var k=0;k<idxs.length;k++){
    var i=idxs[k];
    if(inv_phoneOk(inv_students[i])) queue.push({idx:i,name:inv_students[i].name,phone:inv_students[i].phone,message:inv_getMsgFor(i)});
  }
  if(!queue.length){toast('발송할 항목 없음');return;}
  var allRes=[];
  var cur=0;
  function prog(){
    Q('app','<div class="summary-wrap fade-in"><div class="summary-title">발송 중</div><div class="pay-sum" id="inv_bulk_prog">'+(cur+1)+'/'+queue.length+' 발송 중...</div></div>');
  }
  function step(){
    if(cur>=queue.length){
      var lines=allRes.map(function(x){return '<div class="'+(x.ok?'ok':'fail')+'">'+esc(x.name)+' '+(x.ok?'성공':'실패')+(x.error?(' '+esc(x.error)):'')+'</div>';}).join('');
      Q('app','<div class="summary-wrap fade-in"><div class="summary-title">발송 완료</div><div class="summary-result">'+lines+'</div><button class="summary-back" onclick="inv_VIEW=\'setting\';inv_render()">← 설정으로</button></div>');
      return;
    }
    prog();
    var at=cur;
    apiPost('sendInvoiceFriendTalk',{students:[{name:queue[at].name,phone:queue[at].phone,message:queue[at].message}]}).then(function(res){
      var r=(res&&res.results)||[];
      var row=r[0];
      if(inv_ftResultOk(row))inv_applySentState(queue[at].idx);
      if(row)allRes.push({ok:inv_ftResultOk(row),name:row.name||queue[at].name,error:row.error||row.message});
      cur++;
      step();
    }).catch(function(e){
      allRes.push({name:queue[at].name,ok:false,error:e.message});
      cur++;
      step();
    });
  }
  step();
}
