<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>소리마을 매니저</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif!important;background:#0a0a0a;color:#f0f0f0;max-width:500px;margin:0 auto;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;padding-bottom:80px}
*{font-family:'Noto Sans KR',sans-serif!important}

/* ═══ 공통 ═══ */
.banner{background:#111;padding:16px 20px 14px;border-bottom:2px solid #FFD43B;cursor:pointer}
.banner-row{display:flex;justify-content:space-between;align-items:center}
.logo{font-size:11px;letter-spacing:2.5px;color:#FFD43B;font-weight:700}
.title{font-size:17px;font-weight:700;color:#fff;margin-top:3px}
.date{font-size:13px;color:#888}
.mode-tabs{display:flex;background:#111;border-bottom:1px solid #1e1e1e}
.mode-tab{flex:1;padding:12px 0;text-align:center;font-size:13px;font-weight:500;color:#555;cursor:pointer;transition:.2s;position:relative}
.mode-tab:active{background:#141414}
.mode-tab.active{color:#FFD43B;font-weight:700}
.mode-tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:#FFD43B;border-radius:1px}
.loading{display:flex;flex-direction:column;align-items:center;padding:60px 20px;color:#666;font-size:13px;gap:12px}
.spin{width:22px;height:22px;border:2.5px solid #1a1a1a;border-top-color:#FFD43B;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:#1a1a1a;border:1px solid #252525;color:#eee;padding:8px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.25s;z-index:99;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease}
.help-btn{width:28px;height:28px;border-radius:50%;background:#1a1a1a;border:1px solid #444;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-weight:600;flex-shrink:0}
.help-btn:active{background:#222;color:#FFD43B}

/* ═══ 카톡 대본 스타일 ═══ */
.bar{padding:12px 20px;background:#141414;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e1e1e;flex-wrap:wrap;gap:6px}
.bar-info{font-size:13px;color:#888}.bar-info b{color:#FFD43B}.bar-info .b-g{color:#4ade80}.bar-info .b-o{color:#f59e0b}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:.15s;white-space:nowrap}
.btn:active{transform:scale(0.97)}.btn-y{background:#FFD43B;color:#111}.btn-d{background:#1a1a1a;color:#ccc;border:1px solid #2a2a2a}.btn:disabled{opacity:.3;cursor:default;transform:none}
.btn-y-full{background:#FFD43B;color:#111;width:100%;padding:14px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.btn-y-full:active{transform:scale(0.97)}
.progress{height:3px;background:#141414}.progress-fill{height:100%;background:#FFD43B;transition:width .4s}
.gen-bar{padding:8px 20px;background:#111;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;gap:8px;font-size:12px;color:#888}
.gen-bar .spin-s{width:14px;height:14px;border:2px solid #222;border-top-color:#FFD43B;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
.card{padding:14px 20px;border-bottom:1px solid #151515;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.12s}
.card:active{background:#141414}.card.done-card{opacity:.55}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.av-y{background:#FFD43B;color:#111}.av-g{background:#0a0a0a;color:#4ade80;border:1.5px solid #16a34a}.av-o{background:#f59e0b;color:#111}
.card-body{flex:1;min-width:0}.card-name{font-size:14px;font-weight:500}
.card-kw{font-size:12px;color:#777;margin-top:3px;display:flex;align-items:center;gap:4px}
.card-kw-label{color:#FFD43B;font-size:11px;font-weight:600;flex-shrink:0}
.card-kw-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.card-st{font-size:11px;flex-shrink:0}
.card-kw-input{width:100%;padding:7px 10px;background:#111;border:1px solid #333;border-radius:6px;color:#eee;font-size:12px;font-family:inherit;outline:none;margin-top:4px}
.card-kw-input:focus{border-color:#FFD43B}
.inp-wrap{padding:4px 20px}
.inp-wrap.done-inp{opacity:.4;pointer-events:none}
.inp-label{display:flex;align-items:center;gap:10px;margin:10px 0 5px}
.inp-num{width:24px;height:24px;border-radius:50%;background:#FFD43B;color:#111;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.inp-num.g{background:#0a0a0a;color:#4ade80;border:1.5px solid #16a34a}
.inp-num.o{background:#f59e0b;color:#111}
.inp-name{font-size:14px;font-weight:500}.inp-gg{font-size:12px;color:#555}
.inp-wrap input{width:100%;padding:10px 12px;background:#111;border:1px solid #222;border-radius:8px;color:#eee;font-size:13px;font-family:inherit;outline:none}
.inp-wrap input:focus{border-color:#FFD43B}.inp-wrap input::placeholder{color:#3a3a3a}
.inp-wrap input.review-input{border-color:#f59e0b;color:#f59e0b;pointer-events:none}
.det-head{padding:10px 16px;background:#111;border-bottom:1px solid #1e1e1e}
.det-row1{display:flex;align-items:center;justify-content:space-between}
.det-nav{display:flex;gap:5px}
.nav-b{width:32px;height:32px;border-radius:50%;background:#1a1a1a;border:1px solid #252525;color:#aaa;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
.nav-b:active{background:#222}
.carousel{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 0 4px;overflow:hidden}
.car-name{font-size:12px;color:#444;transition:all .25s;white-space:nowrap;cursor:pointer;flex-shrink:0}
.car-name.active{font-size:15px;color:#FFD43B;font-weight:600}
.car-name.near{font-size:12px;color:#555}
@keyframes carSlide{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.car-anim{animation:carSlide .25s ease}
.det-body{padding:16px 20px}
.det-stu{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.det-av{width:38px;height:38px;border-radius:50%;background:#FFD43B;color:#111;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700}
.det-name{font-size:16px;font-weight:700}.det-sub{font-size:12px;color:#666;margin-top:1px}
.regen-tag{font-size:11px;margin-bottom:8px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;transition:.15s}
.regen-tag:active{opacity:.7}
.regen-wait{font-size:11px;color:#888;display:inline-flex;align-items:center;gap:4px;margin-bottom:8px}
.regen-wait .spin-s{width:12px;height:12px;border:2px solid #222;border-top-color:#FFD43B;border-radius:50%;animation:sp .7s linear infinite}
.msg-area{width:100%;padding:14px;background:#111;border:1px solid #222;border-radius:10px;color:#ddd;font-size:13.5px;line-height:1.75;font-family:inherit;outline:none;resize:none;min-height:220px;margin-bottom:14px;transition:border-color .3s,background .3s}
.msg-area:focus{border-color:#FFD43B}.msg-area.done{background:#0d1a0d;border-color:#16a34a;color:#ccc}
.det-btns{display:flex;gap:8px}.det-btns .btn{flex:1;padding:12px;font-size:13px}
.sent-badge{font-size:11px;color:#4ade80;padding:6px 0;text-align:center;margin-bottom:8px}
.short-warn{font-size:11px;color:#f59e0b;padding:4px 0;margin-bottom:6px}
.resume-bar{padding:12px 20px;background:#111;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;justify-content:space-between}
.resume-bar span{font-size:12px;color:#888}
.msg-display{width:100%;padding:14px;background:#111;border:1px solid #222;border-radius:10px;color:#ddd;font-size:13.5px;line-height:1.75;min-height:220px;margin-bottom:14px;white-space:pre-wrap;word-break:break-word;-webkit-user-select:none;user-select:none}
.msg-display.done{background:#0d1a0d;border-color:#16a34a;color:#ccc}
.msg-edit-hint{font-size:11px;color:#555;text-align:center;margin:-8px 0 10px}
.sec-header{padding:10px 20px 8px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #1a1a1a}
.sec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sec-dot-y{background:#FFD43B}.sec-dot-g{background:#4ade80}.sec-dot-o{background:#f59e0b}
.sec-label{font-size:12px;font-weight:600;flex-shrink:0}
.sec-label-y{color:#FFD43B}.sec-label-g{color:#4ade80}.sec-label-o{color:#f59e0b}
.sec-count{font-size:11px;color:#555}.sec-line{flex:1;height:1px;background:#1e1e1e}
.modal-dim{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;pointer-events:none;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.modal-dim.on{opacity:1;pointer-events:auto}
.modal-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:24px 20px 20px;width:calc(100% - 48px);max-width:340px;transform:scale(0.95) translateY(10px);transition:transform .25s cubic-bezier(0.34,1.56,0.64,1);text-align:center}
.modal-dim.on .modal-card{transform:scale(1) translateY(0)}
/* 명세서 목록 모달: 화면 높이 안에서만 스크롤 */
.modal-card.modal-card--list{max-height:min(78vh, 520px);display:flex;flex-direction:column;overflow:hidden;text-align:left;padding:14px 12px 12px;width:calc(100% - 32px);max-width:min(380px, 100vw - 32px)}
.modal-card--list .modal-icon{text-align:center;font-size:22px;margin-bottom:4px}
.modal-card--list .modal-title{text-align:center;margin-bottom:2px}
.modal-card--list .modal-desc{text-align:center;margin-bottom:8px;font-size:11px;line-height:1.45}
.modal-card--list .inv-list-head{flex-shrink:0;margin:6px 0 8px}
.inv-list-scroll{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:0 2px 4px 0}
.inv-list-scroll::-webkit-scrollbar{width:4px}
.inv-list-scroll::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
.modal-card--list .modal-btns{display:flex;gap:8px}.modal-card--list .modal-btns .btn{flex:1;padding:11px;font-size:13px}
.modal-card--list .modal-btns{margin-top:10px;flex-shrink:0}
.modal-icon{font-size:28px;margin-bottom:10px}
.modal-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:6px}
.modal-desc{font-size:12.5px;color:#999;line-height:1.6;margin-bottom:6px}
.modal-names{font-size:12px;color:#FFD43B;background:rgba(255,212,59,0.08);border-radius:8px;padding:8px 12px;margin:10px 0 18px;line-height:1.5;max-height:80px;overflow-y:auto}
.modal-btns{display:flex;gap:8px}.modal-btns .btn{flex:1;padding:12px;font-size:13px}
@keyframes slideL{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
.slide{animation:slideL .3s ease}

/* ═══ Tutorial ═══ */
.tut-dim{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.92);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;pointer-events:none}
.tut-dim.on{opacity:1;pointer-events:auto}
.tut-box{width:calc(100% - 48px);max-width:360px;text-align:center;padding:32px 24px 24px;overflow:hidden}
@keyframes tutSlideLeft{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
@keyframes tutSlideRight{from{opacity:0;transform:translateX(-60px)}to{opacity:1;transform:translateX(0)}}
.tut-slide-left{animation:tutSlideLeft .25s ease}
.tut-slide-right{animation:tutSlideRight .25s ease}
.tut-emoji{font-size:48px;margin-bottom:16px}
.tut-step{font-size:11px;color:#FFD43B;font-weight:700;letter-spacing:1.5px;margin-bottom:8px}
.tut-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:10px;line-height:1.4}
.tut-desc{font-size:12px;color:#999;line-height:1.7;margin-bottom:8px}
.tut-example{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:12px 16px;margin:12px 0 20px;text-align:left}
.tut-example-label{font-size:10px;color:#FFD43B;font-weight:600;letter-spacing:1px;margin-bottom:6px}
.tut-example-text{font-size:11.5px;color:#ccc;line-height:1.6}
.tut-dots{display:flex;justify-content:center;gap:8px;margin-bottom:20px}
.tut-dot{width:8px;height:8px;border-radius:50%;background:#333;transition:.2s}
.tut-dot.on{background:#FFD43B;width:20px}
.tut-btns{display:flex;gap:8px}
.tut-btns .btn{flex:1;padding:13px;font-size:13px}
.tut-skip{font-size:11px;color:#555;margin-top:14px;cursor:pointer}
.tut-skip:active{color:#888}

/* ═══ 명세서 스타일 ═══ */
.section{border-bottom:1px solid #1a1a1a}
.section-header{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:.1s}
.section-header:active{background:#111}
.section-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
.section-dot{width:7px;height:7px;border-radius:50%;background:#FFD43B;flex-shrink:0}
.section-badge{font-size:11px;color:#888;font-weight:400;margin-left:4px}
.section-arrow{font-size:14px;color:#555;transition:transform .2s}
.section-arrow.open{transform:rotate(180deg)}
.section-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.section-body.open{max-height:3000px}
.section-inner{padding:0 20px 16px}
.month-sel{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.month-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #2a2a2a;background:#1a1a1a;color:#888;transition:.15s;font-family:inherit}
.month-chip:active{transform:scale(.95)}
.month-chip.active{background:rgba(255,212,59,.12);color:#FFD43B;border-color:rgba(255,212,59,.3)}
.greeting-box{background:#111;border:1px solid #222;border-radius:10px;padding:14px;color:#ddd;font-size:13px;line-height:1.7;white-space:pre-wrap;min-height:60px;outline:none;transition:border-color .2s}
.greeting-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.chip-btn{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.chip-btn:active{transform:scale(.95)}
.chip-btn-o{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.2)}
.chip-btn-g{background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.2)}
.chip-btn-d{background:#1a1a1a;color:#999;border:1px solid #2a2a2a}
.inv-greet-ta{width:100%;padding:12px;background:#111;border:1px solid #FFD43B;border-radius:10px;color:#eee;font-size:13px;line-height:1.7;min-height:100px;font-family:inherit;outline:none;resize:vertical}
.add-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px dashed #333;background:transparent;color:#666;font-family:inherit;transition:.15s;margin-top:6px}
.add-btn:active{background:#111;color:#aaa;transform:scale(.95)}
.added-item{background:#111;border:1px solid #222;border-radius:8px;padding:10px 12px;margin-top:8px;position:relative}
.added-item-row{display:flex;align-items:center;gap:8px}
.added-item-remove{width:20px;height:20px;border-radius:50%;background:#1a1a1a;border:1px solid #333;color:#666;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;flex-shrink:0;line-height:1}
.added-item-remove:active{background:#333;color:#f87171}
.added-item input{flex:1;padding:6px 8px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:6px;color:#eee;font-size:12px;font-family:inherit;outline:none}
.added-item input:focus{border-color:#FFD43B}
.added-item input::placeholder{color:#444}
.sched-item{background:#111;border:1px solid #222;border-radius:8px;padding:10px 12px;margin-bottom:8px}
.sched-row{display:flex;align-items:center;gap:8px}
.sched-title-input{padding:6px 8px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:6px;color:#FFD43B;font-size:12px;font-weight:600;font-family:inherit;outline:none;width:80px}
.sched-title-input:focus{border-color:#FFD43B}
.sched-value-input{flex:1;padding:6px 8px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:6px;color:#eee;font-size:12px;font-family:inherit;outline:none}
.sched-value-input:focus{border-color:#FFD43B}
.sched-value-input::placeholder{color:#444}
.edit-block{background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:12px;font-size:12.5px;color:#999;line-height:1.6;white-space:pre-wrap;outline:none;transition:border-color .2s,color .2s;min-height:40px;cursor:pointer}
.edit-block:focus,.edit-block.editing{border-color:#FFD43B;color:#eee;cursor:text}
.edit-hint{font-size:10px;color:#444;margin-top:4px;text-align:right}
.notice-block{background:rgba(255,212,59,.04);border:1px solid rgba(255,212,59,.15);border-radius:8px;padding:10px 12px;margin-top:8px}
.notice-input{width:100%;padding:8px;background:transparent;border:none;color:#eee;font-size:12.5px;font-family:inherit;outline:none;line-height:1.6;resize:none;min-height:36px}
.notice-input::placeholder{color:#555}
.notice-label{font-size:10px;color:#FFD43B;font-weight:600;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.preview-dim{position:fixed;top:0;left:0;right:0;bottom:0;z-index:105;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .25s}
.preview-dim.on{opacity:1;pointer-events:auto}
.preview-sheet{width:100%;max-width:500px;height:94vh;background:#0e0e0e;border-radius:16px 16px 0 0;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .32s cubic-bezier(.22,1,.36,1)}
.preview-dim.on .preview-sheet{transform:translateY(0)}
.preview-header{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e1e1e;flex-shrink:0}
.preview-back{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #2a2a2a;background:#1a1a1a;color:#ccc;font-family:inherit}
.preview-back:active{background:#222}
.preview-title{font-size:14px;font-weight:700;color:#fff}
.preview-body{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
.preview-text{font-size:13px;line-height:1.8;color:#ddd;white-space:pre-wrap;word-break:break-word}
.preview-text .ph{color:#FFD43B;background:rgba(255,212,59,0.08);border-radius:3px;padding:0 2px}
.preview-footer{padding:16px 20px;border-top:1px solid #1a1a1a;flex-shrink:0}
.preview-copy-btn{width:100%;padding:14px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:.15s;background:#FFD43B;color:#111}
.preview-copy-btn:active{transform:scale(0.97)}
.preview-copy-btn.done{background:#0d1a0d;color:#4ade80;border:1px solid #16a34a}
.preview-trigger{position:sticky;bottom:0;padding:16px 20px;background:#0a0a0a;border-top:1px solid #1a1a1a}
.preview-trigger-btn{width:100%;padding:14px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;background:#FFD43B;color:#111;transition:.15s}
.preview-trigger-btn:active{transform:scale(0.97)}
::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<div class="banner" onclick="goHomeBanner()">
  <div class="banner-row">
    <div><div class="logo">SORI MANAGER</div><div class="title" id="bannerTitle">소리마을 매니저</div></div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="help-btn" id="helpBtn" onclick="event.stopPropagation();showTutorial()" style="display:none">?</div>
      <div class="date" id="headerDate"></div>
    </div>
  </div>
</div>
<div class="mode-tabs">
  <div class="mode-tab" id="tabKakao" onclick="switchMode('kakao')">💬 카톡 대본</div>
  <div class="mode-tab" id="tabInvoice" onclick="switchMode('invoice')">💳 월비 안내문</div>
</div>
<div id="app"></div>
<div class="toast" id="toast"></div>
<div class="modal-dim" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-card" id="modalCard"></div>
</div>
<div class="tut-dim" id="tut" onclick="if(event.target===this)closeTutorial()">
  <div class="tut-box" id="tutBox"></div>
</div>
<div class="preview-dim" id="previewDim" onclick="if(event.target===this)inv_closePreview()">
  <div class="preview-sheet">
    <div class="preview-header">
      <button type="button" class="preview-back" onclick="inv_closePreview()">← 돌아가기</button>
      <span class="preview-title">📋 미리보기</span>
      <span style="width:70px"></span>
    </div>
    <div class="preview-body">
      <div class="preview-text" id="previewText"></div>
    </div>
    <div class="preview-footer">
      <button type="button" class="preview-copy-btn" id="previewCopyBtn" onclick="inv_copyTemplate()">템플릿 복사하기</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// 공통 설정
// ═══════════════════════════════════════
var API_URL='https://script.google.com/macros/s/AKfycbzW7VPXPRW0Ltf8ws_1xtdLM0rceMsumj7oi6bLD3jSjOCtYG8_WYGAqjd_UyRjPrQ1/exec';
var IS_TEST=true;
var MODE='kakao'; // 'kakao' or 'invoice'

function apiGet(action,params){
  // params: {key:value} 형태로 추가 쿼리 파라미터 전송
  var url=API_URL+'?action='+action;
  if(IS_TEST)url+='&test=1';
  if(params){
    for(var k in params){
      if(params[k]===undefined||params[k]===null)continue;
      url+='&'+encodeURIComponent(k)+'='+encodeURIComponent(params[k]);
    }
  }
  return fetch(url).then(function(r){return r.json()}).then(function(j){if(!j.ok)throw new Error(j.error);return j.data});
}
function apiPost(action,body){
  body.action=action;
  // POST에서도 test 쿼리를 같이 보내야 doPost(e)에서 isTest가 확실히 갈라집니다.
  var url=API_URL+(IS_TEST?'?test=1':'');
  if(IS_TEST)body.test='1'; // 호환용(백엔드가 body.test를 읽도록 바꿀 수도 있으니 유지)
  return fetch(url,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)})
    .then(function(r){return r.json()}).then(function(j){if(!j.ok)throw new Error(j.error);return j.data});
}
function Q(id,h){document.getElementById(id).innerHTML=h}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on')},2500)}
function showModal(html,isList){
  var card=document.getElementById('modalCard');
  card.innerHTML=html;
  if(isList){card.classList.add('modal-card--list');}else{card.classList.remove('modal-card--list');}
  document.getElementById('modal').classList.add('on');
}
function closeModal(){
  document.getElementById('modal').classList.remove('on');
  document.getElementById('modalCard').classList.remove('modal-card--list');
}

var now=new Date();
document.getElementById('headerDate').textContent=now.getFullYear()+'년 '+(now.getMonth()+1)+'월';

function goHomeBanner(){
  if(MODE==='kakao')kk_goHome();
  else invGoHome();
}

function switchMode(m){
  MODE=m;
  document.getElementById('tabKakao').classList.toggle('active',m==='kakao');
  document.getElementById('tabInvoice').classList.toggle('active',m==='invoice');
  document.getElementById('helpBtn').style.display=(m==='kakao'?'flex':'none');
  document.getElementById('bannerTitle').textContent=(m==='kakao'?'카톡 메시지 관리':'월비 안내문');
  Q('app','');
  if(m==='kakao'){
    if(!kk_loaded)kk_init();
    else kk_rInput();
  }else{
    if(!inv_loaded)inv_init();
    else inv_render();
  }
}

// ═══════════════════════════════════════
// 카톡 대본 모듈 (kk_ prefix)
// ═══════════════════════════════════════
var kk_S=[],kk_KW={},kk_PrevKW={},kk_MSG={},kk_SHORT={},kk_DONE=new Set(),kk_REGEN=new Set(),kk_EDITED=new Set();
var kk_CI=0,kk_CANCEL=false,kk_EDITMODE=false,kk_VIEW='input',kk_GEN=false,kk_GC=0,kk_GT=0,kk_GEN_TG=[];
var kk_loaded=false;

function kk_init(){
  Q('app','<div class="loading"><div class="spin"></div>학생 목록 불러오는 중...</div>');
  apiGet('loadStudents').then(function(data){
    kk_S=data||[];
    kk_S.forEach(function(s){if(s.kw)kk_KW[s.row]=s.kw;kk_PrevKW[s.row]=s.prevKw||'';if(s.msg)kk_MSG[s.row]=s.msg;if(s.done)kk_DONE.add(s.row)});
    kk_loaded=true;
    if(MODE!=='kakao')return;
    kk_rInput();
    kk_checkFirstRun();
  }).catch(function(e){
    if(MODE!=='kakao')return;
    Q('app','<div style="padding:20px;color:#f87171;font-size:13px;">연결 실패: '+e.message+'</div>');
  });
}

function kk_goHome(){kk_CANCEL=true;kk_GEN=false;kk_EDITMODE=false;kk_rInput()}
function kk_hasMsg(){return kk_S.some(function(s){return kk_MSG[s.row]})}
function kk_isReview(s){return!kk_DONE.has(s.row)&&kk_MSG[s.row]&&kk_MSG[s.row].trim()}
function kk_isUngen(s){return!kk_DONE.has(s.row)&&(!kk_MSG[s.row]||!kk_MSG[s.row].trim())}

function kk_rInput(){
  kk_VIEW='input';
  var pending=kk_S.filter(function(s){return!kk_DONE.has(s.row)});
  var kwCount=pending.filter(function(s){return(kk_KW[s.row]||'').trim()&&kk_isUngen(s)}).length;
  var reviewCount=kk_S.filter(function(s){return kk_isReview(s)}).length;
  var dc=kk_S.length-pending.length;
  var h='<div class="bar"><span class="bar-info">';
  var infoParts=[];
  if(kwCount>0||pending.filter(function(s){return kk_isUngen(s)}).length>0) infoParts.push('원생 <b>'+kwCount+'</b>/'+pending.filter(function(s){return kk_isUngen(s)}).length+'명 입력');
  if(reviewCount>0) infoParts.push('<b class="b-o">'+reviewCount+'</b>명 검수대기');
  if(dc>0) infoParts.push('<b class="b-g">'+dc+'</b>명 복사완료');
  h+=infoParts.join(' · ')+'</span><div style="display:flex;gap:6px">';
  if(kk_hasMsg())h+='<button class="btn btn-d" onclick="kk_rList()">목록 보기</button>';
  var genableCount=pending.filter(function(s){return(kk_KW[s.row]||'').trim()}).length;
  h+='<button class="btn btn-y" id="kk_gbtn" onclick="kk_tryGenAll()" '+(genableCount===0?'disabled':'')+'>일괄 생성</button></div></div>';
  kk_S.forEach(function(s,i){
    var d=kk_DONE.has(s.row);
    var rv=kk_isReview(s);
    var ph=kk_PrevKW[s.row]?'지난달: '+kk_PrevKW[s.row]:'바이엘 2번, 밝음, 손가락 독립 잘됨';
    if(d){
      h+='<div class="inp-wrap done-inp"><div class="inp-label"><div class="inp-num g">✓</div><span class="inp-name">'+s.name+'</span><span class="inp-gg">'+s.gg+'</span></div><input value="'+esc('(복사완료)')+'" disabled/></div>';
    }else if(rv){
      var rvPh=kk_KW[s.row]||ph;
      h+='<div class="inp-wrap"><div class="inp-label"><div class="inp-num o">'+(i+1)+'</div><span class="inp-name">'+s.name+'</span><span class="inp-gg">'+s.gg+'</span><span onclick="event.stopPropagation();kk_showDet('+s.row+')" style="margin-left:auto;font-size:11px;color:#f59e0b;background:rgba(245,158,11,0.1);padding:3px 8px;border-radius:5px;cursor:pointer;font-weight:600;white-space:nowrap">AI글 확인 ›</span></div><input value="" placeholder="'+esc(rvPh)+'" oninput="kk_kwCh('+s.row+',this.value)"/></div>';
    }else{
      h+='<div class="inp-wrap"><div class="inp-label"><div class="inp-num">'+(i+1)+'</div><span class="inp-name">'+s.name+'</span><span class="inp-gg">'+s.gg+'</span></div><input value="'+esc(kk_KW[s.row]||'')+'" placeholder="'+esc(ph)+'" oninput="kk_kwCh('+s.row+',this.value)"/></div>';
    }
  });
  Q('app',h);
}

function kk_kwCh(row,v){
  kk_KW[row]=v;
  var pending=kk_S.filter(function(s){return!kk_DONE.has(s.row)});
  var genableCount=pending.filter(function(s){return(kk_KW[s.row]||'').trim()}).length;
  var b=document.getElementById('kk_gbtn');if(b)b.disabled=genableCount===0;
}

function kk_tryGenAll(){
  var targets=kk_S.filter(function(s){return(kk_KW[s.row]||'').trim()&&!kk_DONE.has(s.row)});
  var existing=targets.filter(function(s){return kk_MSG[s.row]&&kk_MSG[s.row].trim()});
  if(existing.length>0){
    var names=existing.map(function(s){return s.name}).join(', ');
    var newOnly=targets.filter(function(s){return!(kk_MSG[s.row]&&kk_MSG[s.row].trim())});
    showModal('<div class="modal-icon">📝</div><div class="modal-title">이미 생성된 메시지가 있습니다</div><div class="modal-desc">아래 '+existing.length+'명은 이미 AI 메시지가 있어요.<br>새로 생성하면 기존 메시지가 사라집니다.</div><div class="modal-names">'+esc(names)+'</div><div class="modal-btns"><button class="btn btn-d" onclick="closeModal();kk_genAllSkip()">'+(newOnly.length>0?'새 학생만 생성 ('+newOnly.length+'명)':'취소')+'</button><button class="btn btn-y" onclick="closeModal();kk_genAllOverwrite()">전체 다시 생성</button></div>');
  }else{kk_genAllOverwrite()}
}

function kk_genAllOverwrite(){
  kk_CANCEL=false;kk_GEN=true;kk_REGEN.clear();
  kk_GEN_TG=kk_S.filter(function(s){return(kk_KW[s.row]||'').trim()&&!kk_DONE.has(s.row)});
  if(!kk_GEN_TG.length){kk_GEN=false;kk_rList();return}
  kk_GEN_TG.forEach(function(s){delete kk_MSG[s.row];delete kk_SHORT[s.row]});
  kk_GT=kk_GEN_TG.length;kk_GC=0;
  apiPost('saveKeywords',{updates:kk_GEN_TG.map(function(s){return{row:s.row,kw:kk_KW[s.row]}})});
  kk_rList();kk_runGen(0);
}

function kk_genAllSkip(){
  kk_CANCEL=false;kk_GEN=true;kk_REGEN.clear();
  kk_GEN_TG=kk_S.filter(function(s){return(kk_KW[s.row]||'').trim()&&!kk_DONE.has(s.row)&&!(kk_MSG[s.row]&&kk_MSG[s.row].trim())});
  if(!kk_GEN_TG.length){kk_GEN=false;toast('새로 생성할 학생이 없습니다');kk_rList();return}
  kk_GEN_TG.forEach(function(s){delete kk_MSG[s.row];delete kk_SHORT[s.row]});
  kk_GT=kk_GEN_TG.length;kk_GC=0;
  apiPost('saveKeywords',{updates:kk_GEN_TG.map(function(s){return{row:s.row,kw:kk_KW[s.row]}})});
  kk_rList();kk_runGen(0);
}

function kk_resumeGen(){
  kk_GEN_TG=kk_S.filter(function(s){return(kk_KW[s.row]||'').trim()&&!kk_DONE.has(s.row)&&!kk_MSG[s.row]});
  if(!kk_GEN_TG.length){toast('생성할 학생이 없습니다');return}
  kk_CANCEL=false;kk_GEN=true;kk_GT=kk_GEN_TG.length;kk_GC=0;
  kk_rList();kk_runGen(0);
}

function kk_runGen(idx){
  if(kk_CANCEL||!kk_GEN){kk_GEN=false;kk_updGB();if(!kk_hasMsg())kk_rInput();return}
  if(idx>=kk_GEN_TG.length){kk_GEN=false;kk_GC=0;kk_GT=0;kk_updGB();return}
  var s=kk_GEN_TG[idx];
  if(kk_REGEN.has(s.row)||kk_MSG[s.row]){kk_runGen(idx+1);return}
  kk_GC=idx+1;kk_updGB();
  apiPost('generateKakao',{name:s.name,gg:s.gg,kw:kk_KW[s.row],hist:s.hist}).then(function(m){
    if(kk_CANCEL){kk_GEN=false;if(!kk_hasMsg())kk_rInput();return}
    if(m.indexOf('[SHORT]')===0){kk_SHORT[s.row]=true;m=m.substring(7)}
    kk_MSG[s.row]=m;
    apiPost('saveMessage',{row:s.row,text:m});
    if(kk_VIEW==='list')kk_refreshCards();
    if(kk_VIEW==='detail'){kk_updDetCounter();toast(s.name+' 생성 완료 ✓')}
    kk_runGen(idx+1);
  }).catch(function(e){
    if(kk_CANCEL){kk_GEN=false;return}
    kk_MSG[s.row]='[실패: '+e.message+']';
    if(kk_VIEW==='list')kk_refreshCards();
    kk_runGen(idx+1);
  });
}

function kk_updGB(){
  var el=document.getElementById('kk_genBar');if(!el)return;
  if(!kk_GEN||kk_GT===0){el.style.display='none';return}
  el.style.display='flex';
  el.innerHTML='<div class="spin-s"></div>'+kk_GC+'/'+kk_GT+'명 생성 중...<button class="btn btn-d" onclick="kk_CANCEL=true;kk_GEN=false;kk_updGB();kk_refreshCards()" style="padding:4px 10px;font-size:11px;margin-left:auto">취소</button>';
}

function kk_updDetCounter(){
  var gl=kk_S.filter(function(x){return kk_MSG[x.row]});
  var s=kk_S[kk_CI],el=document.getElementById('kk_detCount');
  if(el){var pos=gl.findIndex(function(x){return x.row===s.row})+1;el.textContent=pos+' / '+gl.length}
  var car=document.getElementById('kk_carousel');
  if(car)car.innerHTML=kk_buildCarousel(true);
}

function kk_refreshCards(){
  var cl=document.getElementById('kk_cardList');if(cl)cl.innerHTML=kk_buildSectionedCards(kk_EDITMODE);
  var reviewList=kk_S.filter(function(s){return kk_isReview(s)});
  var ungenList=kk_S.filter(function(s){return(kk_KW[s.row]||'').trim()&&kk_isUngen(s)});
  var doneList=kk_S.filter(function(s){return kk_DONE.has(s.row)});
  var total=reviewList.length+ungenList.length+doneList.length;
  var pct=total?Math.round(doneList.length/total*100):0;
  var info=document.querySelector('.bar-info');
  if(info){
    var parts=[];
    if(ungenList.length>0)parts.push('미생성 <b>'+ungenList.length+'</b>명');
    if(reviewList.length>0)parts.push('검수대기 <b class="b-o">'+reviewList.length+'</b>명');
    if(doneList.length>0)parts.push('복사완료 <b class="b-g">'+doneList.length+'</b>명');
    info.innerHTML=parts.join(' · ');
  }
  var prog=document.querySelector('.progress-fill');if(prog)prog.style.width=pct+'%';
  var rb=document.getElementById('kk_resumeBar');
  var remaining=kk_S.filter(function(s){return(kk_KW[s.row]||'').trim()&&!kk_DONE.has(s.row)&&!kk_MSG[s.row]}).length;
  if(rb){if(!kk_GEN&&remaining>0){rb.style.display='flex';rb.querySelector('span').textContent=remaining+'명 미생성'}else{rb.style.display='none'}}
}

function kk_rList(){
  kk_VIEW='list';kk_EDITMODE=false;kk_EDITED.clear();
  var reviewList=kk_S.filter(function(s){return kk_isReview(s)});
  var ungenList=kk_S.filter(function(s){return(kk_KW[s.row]||'').trim()&&kk_isUngen(s)});
  var doneList=kk_S.filter(function(s){return kk_DONE.has(s.row)});
  var total=reviewList.length+ungenList.length+doneList.length;
  var pct=total?Math.round(doneList.length/total*100):0;
  var remaining=kk_S.filter(function(s){return(kk_KW[s.row]||'').trim()&&!kk_DONE.has(s.row)&&!kk_MSG[s.row]}).length;
  var infoParts=[];
  if(ungenList.length>0)infoParts.push('미생성 <b>'+ungenList.length+'</b>명');
  if(reviewList.length>0)infoParts.push('검수대기 <b class="b-o">'+reviewList.length+'</b>명');
  if(doneList.length>0)infoParts.push('복사완료 <b class="b-g">'+doneList.length+'</b>명');
  var h='<div class="bar"><span class="bar-info">'+infoParts.join(' · ')+'</span>';
  if(reviewList.length>0)h+='<button class="btn btn-d" id="kk_editBtn" onclick="kk_toggleEdit()">키워드 수정</button>';
  h+='</div><div class="progress"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
    '<div class="gen-bar" id="kk_genBar" style="display:none"></div>'+
    '<div class="resume-bar" id="kk_resumeBar" style="'+((!kk_GEN&&remaining>0)?'display:flex':'display:none')+'"><span>'+remaining+'명 미생성</span><button class="btn btn-y" onclick="kk_resumeGen()" style="padding:8px 16px;font-size:12px">이어서 생성</button></div>'+
    '<div id="kk_cardList">'+kk_buildSectionedCards(false)+'</div>';
  Q('app',h);kk_updGB();
}

function kk_buildSectionedCards(edit){
  var gen=kk_S.filter(function(s){return kk_MSG[s.row]||kk_DONE.has(s.row)});
  var reviewList=gen.filter(function(s){return kk_isReview(s)});
  var ungenList=kk_S.filter(function(s){return(kk_KW[s.row]||'').trim()&&kk_isUngen(s)&&!kk_MSG[s.row]});
  var doneList=gen.filter(function(s){return kk_DONE.has(s.row)});
  var h='';
  if(!gen.length&&!ungenList.length&&!kk_GEN)return '<div style="padding:40px 20px;text-align:center"><p style="color:#555;font-size:13px;margin-bottom:16px">생성된 메시지가 없습니다</p><button class="btn btn-y" onclick="kk_rInput()" style="padding:12px 24px">← 키워드 입력</button></div>';
  if(!gen.length&&!ungenList.length&&kk_GEN)return '';
  if(reviewList.length>0){
    h+='<div class="sec-header"><div class="sec-dot sec-dot-o"></div><span class="sec-label sec-label-o">검수대기</span><span class="sec-count">'+reviewList.length+'명</span><div class="sec-line"></div></div>';
    reviewList.forEach(function(s){h+=kk_buildOneCard(s,edit,'review')});
  }
  if(ungenList.length>0){
    h+='<div class="sec-header"><div class="sec-dot sec-dot-y"></div><span class="sec-label sec-label-y">미생성</span><span class="sec-count">'+ungenList.length+'명</span><div class="sec-line"></div></div>';
    ungenList.forEach(function(s){h+=kk_buildOneCard(s,edit,'ungen')});
  }
  if(doneList.length>0){
    h+='<div class="sec-header"><div class="sec-dot sec-dot-g"></div><span class="sec-label sec-label-g">복사완료</span><span class="sec-count">'+doneList.length+'명</span><div class="sec-line"></div></div>';
    doneList.forEach(function(s){h+=kk_buildOneCard(s,edit,'done')});
  }
  return h;
}

function kk_buildOneCard(s,edit,status){
  var kw=kk_KW[s.row]||'',isShort=kk_SHORT[s.row];
  if(edit&&status==='review'){
    return '<div style="padding:10px 20px;border-bottom:1px solid #151515;display:flex;align-items:center;gap:12px"><div class="av av-o">'+s.name[0]+'</div><div style="flex:1;min-width:0"><div class="card-name">'+s.name+'</div><input class="card-kw-input" value="'+esc(kw)+'" oninput="kk_onEditKw('+s.row+',this.value)" placeholder="키워드"/></div></div>';
  }
  var avC,stC,stT;
  if(status==='done'){avC='av-g';stC='#4ade80';stT='복사완료'}
  else if(status==='ungen'){avC='av-y';stC='#FFD43B';stT='미생성'}
  else{avC='av-o';stC='#f59e0b';stT=isShort?'짧음':'검수대기'}
  var stHtml;
  if(kk_EDITED.has(s.row)&&status==='review'){
    stHtml='<span onclick="event.stopPropagation();kk_doRegenFromList('+s.row+')" style="background:#f59e0b;color:#111;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer">재생성</span>';
  }else{stHtml='<span class="card-st" style="color:'+stC+'">'+stT+'</span>'}
  var cardClass=status==='done'?'card done-card':'card';
  var clickAction=status==='ungen'?'':'onclick="kk_showDet('+s.row+')"';
  return '<div class="'+cardClass+'" '+clickAction+'><div class="av '+avC+'">'+s.name[0]+'</div><div class="card-body"><div class="card-name">'+s.name+'</div><div class="card-kw"><span class="card-kw-label">키워드</span><span class="card-kw-text">'+esc(kw.substring(0,35))+'</span></div></div>'+stHtml+'</div>';
}

function kk_onEditKw(row,v){if(kk_KW[row]!==v)kk_EDITED.add(row);kk_KW[row]=v}

function kk_toggleEdit(){
  kk_EDITMODE=!kk_EDITMODE;
  document.getElementById('kk_cardList').innerHTML=kk_buildSectionedCards(kk_EDITMODE);
  var btn=document.getElementById('kk_editBtn');
  if(btn){
    if(kk_EDITMODE){btn.textContent='수정 완료';btn.classList.remove('btn-d');btn.classList.add('btn-y')}
    else{
      btn.classList.remove('btn-y');btn.classList.add('btn-d');btn.textContent='키워드 수정';
      var reviewS=kk_S.filter(function(s){return kk_isReview(s)});
      apiPost('saveKeywords',{updates:reviewS.map(function(s){return{row:s.row,kw:kk_KW[s.row]||''}})});
      kk_refreshCards();
    }
  }
}

function kk_doRegenFromList(row){
  kk_EDITED.delete(row);delete kk_MSG[row];delete kk_SHORT[row];
  kk_CANCEL=false;kk_GEN=true;kk_GEN_TG=[kk_S.find(function(s){return s.row===row})];kk_GT=1;kk_GC=0;
  kk_refreshCards();kk_updGB();kk_runGen(0);
}

function kk_showDet(row){if(kk_EDITMODE)return;if(!kk_MSG[row])return;kk_CI=kk_S.findIndex(function(s){return s.row===row});kk_rDet(false)}

function kk_buildCarousel(anim){
  var gl=kk_S.filter(function(x){return kk_MSG[x.row]});
  var pos=gl.findIndex(function(x){return x.row===kk_S[kk_CI].row});
  var prev=pos>0?gl[pos-1].name:'';
  var cur=gl[pos]?gl[pos].name:'';
  var nxt=pos<gl.length-1?gl[pos+1].name:'';
  var cls=anim?' car-anim':'';
  var h='';
  if(prev)h+='<span class="car-name near" onclick="kk_nav(-1)">'+prev+'</span>';
  h+='<span class="car-name active'+cls+'">'+cur+'</span>';
  if(nxt)h+='<span class="car-name near'+cls+'" onclick="kk_nav(1)">'+nxt+'</span>';
  return h;
}

function kk_rDet(slide){
  kk_VIEW='detail';
  var s=kk_S[kk_CI],m=kk_MSG[s.row]||'',d=kk_DONE.has(s.row),isShort=kk_SHORT[s.row];
  var gl=kk_S.filter(function(x){return kk_MSG[x.row]});
  var pos=gl.findIndex(function(x){return x.row===s.row})+1;
  var sentBadge=d?'<div class="sent-badge">복사 완료</div>':'';
  var shortWarn=(!d&&isShort)?'<div class="short-warn">⚠ 메시지가 짧습니다. 직접 수정하세요.</div>':'';
  var tagHtml='';
  if(!d){
    if(kk_REGEN.has(s.row))tagHtml='<div class="regen-wait"><div class="spin-s"></div>생성 대기 중...</div>';
    else tagHtml='<div class="regen-tag" style="color:#f59e0b;background:rgba(245,158,11,0.08)" onclick="kk_doRegen('+s.row+')">AI 생성 메시지 ↻ 다시 생성</div>';
  }
  var btns;
  if(d){btns='<div class="det-btns"><button class="btn btn-d" onclick="kk_undo('+s.row+')">되돌리기</button><button class="btn btn-y" onclick="kk_doCopy('+s.row+')">복사하기</button></div>'}
  else{btns='<button class="btn-y-full" onclick="kk_doCopy('+s.row+')">복사하기</button>'}
  var msgHtml;
  if(d){msgHtml='<div class="msg-display done">'+esc(m)+'</div>'}
  else{msgHtml='<div class="msg-display" id="kk_msgdiv" onclick="kk_enterEdit('+s.row+')">'+esc(m)+'</div><div class="msg-edit-hint">탭하여 수정</div>'}
  var wrap=slide?'<div class="det-body slide">':'<div class="det-body">';
  Q('app',
    '<div class="det-head"><div class="det-row1"><button class="btn btn-d" onclick="kk_rList()" style="padding:7px 14px;font-size:12px">목록으로</button><span id="kk_detCount" style="font-size:13px;font-weight:600;color:#888">'+pos+' / '+gl.length+'</span><div class="det-nav"><div class="nav-b" onclick="kk_nav(-1)">‹</div><div class="nav-b" onclick="kk_nav(1)">›</div></div></div><div class="carousel" id="kk_carousel">'+kk_buildCarousel(slide)+'</div></div>'+
    wrap+'<div class="det-stu"><div class="det-av">'+s.name[0]+'</div><div><div class="det-name">'+s.name+'</div><div class="det-sub">'+s.gg+' · '+esc(kk_KW[s.row]||'')+'</div></div></div>'+sentBadge+shortWarn+tagHtml+msgHtml+btns+'</div>');
}

function kk_enterEdit(row){
  var div=document.getElementById('kk_msgdiv');if(!div)return;
  var m=kk_MSG[row]||'';
  var ta=document.createElement('textarea');
  ta.className='msg-area';ta.id='kk_msgbox';ta.value=m;
  ta.addEventListener('input',function(){kk_MSG[row]=this.value;kk_SHORT[row]=false});
  div.parentNode.replaceChild(ta,div);
  var hint=document.querySelector('.msg-edit-hint');
  if(hint)hint.innerHTML='<span onclick="kk_exitEdit('+row+')" style="color:#FFD43B;cursor:pointer;font-weight:600">수정 완료 ✓</span>';
  ta.style.height='auto';ta.style.height=Math.max(220,ta.scrollHeight)+'px';
  ta.focus();
}

function kk_exitEdit(row){
  var ta=document.getElementById('kk_msgbox');if(!ta)return;
  kk_MSG[row]=ta.value;
  apiPost('saveMessage',{row:row,text:ta.value});
  ta.blur();
  var div=document.createElement('div');
  div.className='msg-display';div.id='kk_msgdiv';
  div.setAttribute('onclick','kk_enterEdit('+row+')');
  div.textContent=ta.value;
  ta.parentNode.replaceChild(div,ta);
  var hint=document.querySelector('.msg-edit-hint');
  if(hint)hint.innerHTML='탭하여 수정';
}

function kk_nav(dir){
  var cur=kk_S[kk_CI];
  if(!kk_DONE.has(cur.row)){var b=document.getElementById('kk_msgbox');if(b){kk_MSG[cur.row]=b.value;apiPost('saveMessage',{row:cur.row,text:b.value})}}
  var gl=kk_S.filter(function(x){return kk_MSG[x.row]});
  var p=gl.findIndex(function(x){return x.row===cur.row})+dir;
  if(p>=0&&p<gl.length){kk_CI=kk_S.findIndex(function(x){return x.row===gl[p].row});kk_rDet(dir>0)}
}

function kk_doCopy(row){
  var b=document.getElementById('kk_msgbox'),m=b?b.value:kk_MSG[row];kk_MSG[row]=m;
  try{navigator.clipboard.writeText(m)}catch(e){}
  if(!kk_DONE.has(row)){
    kk_DONE.add(row);kk_SHORT[row]=false;
    apiPost('markDone',{row:row,text:m}).catch(function(e){kk_DONE.delete(row)});
  }
  var gl=kk_S.filter(function(x){return kk_MSG[x.row]});
  var p=gl.findIndex(function(x){return x.row===row});
  var nextPending=gl.slice(p+1).find(function(x){return!kk_DONE.has(x.row)});
  if(nextPending){kk_CI=kk_S.findIndex(function(x){return x.row===nextPending.row});kk_rDet(true)}
  else{toast('모든 메시지 복사 완료!');setTimeout(function(){kk_rInput()},1200)}
}

function kk_doRegen(row){
  var s=kk_S.find(function(x){return x.row===row}),kw=kk_KW[row]||'';
  if(!kw.trim()){toast('키워드를 입력해주세요');return}
  kk_REGEN.add(row);kk_rDet(false);
  apiPost('generateKakao',{name:s.name,gg:s.gg,kw:kw,hist:s.hist}).then(function(m){
    kk_REGEN.delete(row);
    if(m.indexOf('[SHORT]')===0){kk_SHORT[row]=true;m=m.substring(7)}else{kk_SHORT[row]=false}
    kk_MSG[row]=m;apiPost('saveMessage',{row:row,text:m});
    if(kk_VIEW==='detail'&&kk_S[kk_CI].row===row)kk_rDet(false);
  }).catch(function(e){kk_REGEN.delete(row);toast('실패: '+e.message);kk_rDet(false)});
}

function kk_undo(row){
  kk_DONE.delete(row);kk_rDet(false);
  apiPost('undoDone',{row:row}).catch(function(e){kk_DONE.add(row);kk_rDet(false)});
}

function showTutorial(){kk_TUT_STEP=0;kk_renderTut();document.getElementById('tut').classList.add('on')}
function closeTutorial(){document.getElementById('tut').classList.remove('on');localStorage.setItem('sori_tut','1')}
function kk_renderTut(){
  var t=kk_TUT_DATA[kk_TUT_STEP],total=kk_TUT_DATA.length;
  var dots='';for(var i=0;i<total;i++)dots+='<div class="tut-dot'+(i===kk_TUT_STEP?' on':'')+'"></div>';
  var isLast=kk_TUT_STEP===total-1,isFirst=kk_TUT_STEP===0;
  var btns='';
  if(isFirst)btns='<div class="tut-btns"><button class="btn btn-y" onclick="kk_tutNext()" style="flex:1">다음</button></div>';
  else if(isLast)btns='<div class="tut-btns"><button class="btn btn-d" onclick="kk_tutPrev()">이전</button><button class="btn btn-y" onclick="closeTutorial()" style="flex:1">시작하기!</button></div>';
  else btns='<div class="tut-btns"><button class="btn btn-d" onclick="kk_tutPrev()">이전</button><button class="btn btn-y" onclick="kk_tutNext()" style="flex:1">다음</button></div>';
  document.getElementById('tutBox').innerHTML=
    '<div class="tut-emoji">'+t.emoji+'</div><div class="tut-step">'+t.step+'</div><div class="tut-title">'+t.title+'</div><div class="tut-desc">'+t.desc.replace(/\n/g,'<br>')+'</div><div class="tut-example"><div class="tut-example-label">'+t.exLabel+'</div><div class="tut-example-text">'+t.exText+'</div></div><div class="tut-dots">'+dots+'</div>'+btns+'<div class="tut-skip" onclick="closeTutorial()">다시 보지 않기</div>';
}
function kk_tutNext(){if(kk_TUT_STEP<kk_TUT_DATA.length-1){kk_TUT_STEP++;kk_renderTut();var box=document.getElementById('tutBox');box.classList.remove('tut-slide-left','tut-slide-right');void box.offsetWidth;box.classList.add('tut-slide-left')}}
function kk_tutPrev(){if(kk_TUT_STEP>0){kk_TUT_STEP--;kk_renderTut();var box=document.getElementById('tutBox');box.classList.remove('tut-slide-left','tut-slide-right');void box.offsetWidth;box.classList.add('tut-slide-right')}}
function kk_checkFirstRun(){if(!localStorage.getItem('sori_tut'))showTutorial()}

var tutTouchX=0;
document.getElementById('tut').addEventListener('touchstart',function(e){tutTouchX=e.touches[0].clientX},{passive:true});
document.getElementById('tut').addEventListener('touchend',function(e){
  var diff=e.changedTouches[0].clientX-tutTouchX;
  if(Math.abs(diff)>50){if(diff<0)kk_tutNext();else kk_tutPrev()}
},{passive:true});

function inv_buildGreeting(){
  var s='<div class="month-sel">';
  for(var m=inv_selectedMonth-1;m<=inv_selectedMonth+1;m++){
    var mm=m<1?m+12:m>12?m-12:m;
    s+='<div class="month-chip'+(mm===inv_selectedMonth?' active':'')+'" onclick="inv_setMonth('+mm+')">'+mm+'월</div>';
  }
  s+='</div>';
  if(inv_greetEditing){
    s+='<textarea class="inv-greet-ta" id="inv_greetTA" oninput="inv_greeting=this.value" style="min-height:100px">'+esc(inv_greeting)+'</textarea>';
    s+='<div class="greeting-actions"><div class="chip-btn chip-btn-g" onclick="inv_saveGreetEdit()">✓ 수정 완료</div></div>';
  }else{
    s+='<div class="greeting-box">'+esc(inv_greeting)+'</div>';
    s+='<div class="greeting-actions">';
    s+='<div class="chip-btn chip-btn-d" onclick="inv_greetEditing=true;inv_renderSetting()">✏️ 직접 수정</div>';
    s+='</div>';
  }
  return s;
}

function inv_saveGreetEdit(){
  var ta=document.getElementById('inv_greetTA');
  if(ta)inv_greeting=ta.value;
  inv_greetEditing=false;inv_renderSetting();
}

function inv_setMonth(m){
  inv_selectedMonth=m;inv_greeting=inv_defaultGreeting(m);inv_greetEditing=false;
  document.getElementById('headerDate').textContent=inv_targetYear+'년 '+m+'월';
  inv_scheduleItems.forEach(function(si){si.placeholder=si.placeholder.replace(/\d+\//g,m+'/')});
  inv_renderSetting();
}

function inv_buildSchedule(){
  var s='';
  inv_scheduleItems.forEach(function(item,idx){
    s+='<div class="sched-item"><div class="sched-row"><div class="added-item-remove" onclick="inv_removeSched('+idx+')">✕</div><input class="sched-title-input" value="'+esc(item.title)+'" oninput="inv_scheduleItems['+idx+'].title=this.value"/><input class="sched-value-input" value="'+esc(item.value)+'" placeholder="'+esc(item.placeholder)+'" oninput="inv_scheduleItems['+idx+'].value=this.value"/></div></div>';
  });
  s+='<div class="add-btn" onclick="inv_addSched()">+ 항목 추가</div>';
  s+='<div style="margin-top:10px"><div class="edit-block" contenteditable="false" onclick="inv_makeEditable(this)" onblur="inv_scheduleNote=this.textContent">'+esc(inv_scheduleNote)+'</div><div class="edit-hint">탭하여 수정</div></div>';
  return s;
}

function inv_buildPay(){
  return '<div class="edit-block" contenteditable="false" onclick="inv_makeEditable(this)" onblur="inv_payInfo=this.textContent">'+esc(inv_payInfo)+'</div><div class="edit-hint">탭하여 수정</div>';
}

function inv_buildNotice(){
  if(!inv_noticeOn){
    return '<div style="padding:8px 20px;border-bottom:1px solid #1a1a1a"><div class="add-btn" onclick="inv_noticeOn=true;inv_renderSetting()" style="width:100%;justify-content:center;padding:10px">+ 📢 공지 추가</div></div>';
  }
  return '<div class="section"><div style="padding:12px 20px"><div class="notice-block"><div class="notice-label"><span>📢 공지사항</span><span class="added-item-remove" onclick="inv_noticeOn=false;inv_notice=\'\';inv_renderSetting()">✕</span></div><textarea class="notice-input" placeholder="예: 다음 달부터 인상된 원비가 적용됩니다" oninput="inv_notice=this.value">'+esc(inv_notice)+'</textarea></div></div></div>';
}

function inv_buildClosing(){
  return '<div class="edit-block" contenteditable="false" onclick="inv_makeEditable(this)" onblur="inv_closing=this.textContent">'+esc(inv_closing)+'</div><div class="edit-hint">탭하여 수정</div>';
}

function inv_toggleSec(k){inv_openSections[k]=!inv_openSections[k];inv_renderSetting()}
function inv_addSched(){inv_scheduleItems.push({title:'',value:'',placeholder:'날짜와 내용 입력'});inv_openSections.schedule=true;inv_renderSetting();toast('항목 추가됨')}
function inv_removeSched(idx){inv_scheduleItems.splice(idx,1);inv_renderSetting()}
function inv_makeEditable(el){
  el.contentEditable='true';el.classList.add('editing');el.focus();
  el.parentNode.querySelector('.edit-hint').textContent='수정 중... (다른 곳을 탭하면 저장)';
  el.addEventListener('blur',function(){el.contentEditable='false';el.classList.remove('editing');el.parentNode.querySelector('.edit-hint').textContent='탭하여 수정'},{once:true});
}
