function stu_save(row){
  var body={
    name:document.getElementById('stu_e_name').value.trim(),
    grade:document.getElementById('stu_e_grade').value.trim(),
    gender:document.getElementById('stu_e_gender').value.trim(),
    parentName:document.getElementById('stu_e_parent').value.trim(),
    phone:document.getElementById('stu_e_phone').value.trim(),
    fee:document.getElementById('stu_e_fee').value.trim(),
    freq:document.getElementById('stu_e_freq').value.trim(),
    level:document.getElementById('stu_e_level').value.trim(),
    memo:document.getElementById('stu_e_memo').value.trim()
  };
  if(!body.name){toast('이름을 입력하세요');return;}
  if(row){
    body.row=row;
    var prev=stu_list.find(function(s){return s.row===row})||{};
    var oldName=prev.name;
    var rec=stu_recFromBody(row,body,prev);
    var ix=stu_list.findIndex(function(s){return s.row===row});
    if(ix>=0)stu_list[ix]=rec;
    kk_S=stu_list;
    stu_patchInvFromRec(rec);
    stu_patchPayFromRec(rec,oldName);
    stu_syncAppDataStudents();
    stu_invalidateInvSession();
    stu_rebuildKkMapsFromList();
    toast('저장됨');
    stu_render();
    apiPost('updateStudent',body).catch(function(e){
      toast('저장 실패, 다시 시도해주세요');
      stu_softReloadFromServer().then(function(){stu_openEdit(row);}).catch(function(){});
    });
  }else{
    var maxR=1;
    stu_list.forEach(function(s){if(s.row>maxR)maxR=s.row;});
    var guessRow=maxR+1;
    var rec=stu_recNew(guessRow,body);
    stu_list.push(rec);
    kk_S=stu_list;
    inv_students.push({
      row:guessRow,name:rec.name,grade:rec.grade,gender:rec.gender,gg:rec.gg,
      freq:rec.freq,fee:rec.fee,materials:[],phone:rec.phone,parentName:rec.parentName,level:rec.level,memo:rec.memo||'',
      prevFreq:'',prevFee:'',prevMaterials:[]
    });
    stu_patchPayFromRec(rec);
    stu_syncAppDataStudents();
    stu_invalidateInvSession();
    stu_rebuildKkMapsFromList();
    toast('저장됨');
    stu_render();
    apiPost('addStudent',body).then(function(newRow){
      var r=typeof newRow==='number'?newRow:parseInt(newRow,10);
      if((!r||isNaN(r))&&newRow&&typeof newRow==='object'&&newRow.row!=null)r=parseInt(newRow.row,10);
      if(!r||isNaN(r)||r<2){
        stu_softReloadFromServer().then(function(){stu_render();}).catch(function(e){toast(e.message);});
        return;
      }
      if(r!==guessRow){
        stu_softReloadFromServer().then(function(){stu_render();});
        return;
      }
      stu_syncAppDataStudents();
      stu_invalidateInvSession();
    }).catch(function(e){
      toast('저장 실패, 다시 시도해주세요');
      stu_list=stu_list.filter(function(s){return s.row!==guessRow});
      kk_S=stu_list;
      inv_students=inv_students.filter(function(x){return x.row!==guessRow});
      stu_rebuildKkMapsFromList();
      stu_softReloadFromServer().then(function(){stu_render();}).catch(function(){});
    });
  }
}
function stu_delete(row){
  var rec=stu_list.find(function(x){return x.row===row});
  if(!rec||!confirm(rec.name+' 학생을 삭제할까요?'))return;
  var delRow=row;
  var nm=rec.name;
  stu_list=stu_list.filter(function(s){return s.row!==delRow});
  stu_list.forEach(function(s){ if(s.row>delRow) s.row--; });
  kk_S=stu_list;
  inv_students=inv_students.filter(function(x){return x.row!==delRow});
  inv_students.forEach(function(x){ if(x.row>delRow) x.row--; });
  if(pay_status&&pay_status.students){
    pay_status.students=pay_status.students.filter(function(p){return p.name!==nm});
  }
  stu_rebuildKkMapsFromList();
  stu_syncAppDataStudents();
  stu_invalidateInvSession();
  toast('삭제됨');
  stu_render();
  apiPost('deleteStudent',{row:delRow}).catch(function(e){
    toast('삭제 실패 — 서버와 맞추는 중');
    stu_softReloadFromServer().then(function(){stu_render();}).catch(function(){});
  });
}

var pay_loaded=false,pay_status=null,pay_stats=null,pay_year=now.getFullYear(),pay_month=now.getMonth()+1,pay_saving={},pay_uiFilter='all';
function pay_monthKeyStr(y,m){return String(y)+'_'+String(m)}
function pay_snapKey(y,m){return 'pay_snap_'+(IS_TEST?'t_':'m_')+y+'_'+m}
function pay_saveSnapshot(y,m,status,stats){
  if(y===now.getFullYear()&&m===now.getMonth()+1)return;
  try{
    localStorage.setItem(pay_snapKey(y,m),JSON.stringify({status:status,stats:stats,ts:Date.now()}));
  }catch(e){}
}
function pay_loadSnapshot(y,m){
  try{
    var raw=localStorage.getItem(pay_snapKey(y,m));
    return raw?JSON.parse(raw):null;
  }catch(e){return null;}
}
function pay_getCached(y,m){return pay_monthCache[pay_monthKeyStr(y,m)]||null}
function pay_setCached(y,m,status,stats){
  pay_monthCache[pay_monthKeyStr(y,m)]={status:status,stats:stats};
  pay_saveSnapshot(y,m,status,stats);
}
function pay_mergeCacheFromAppData(){
  if(!pay_status||pay_status.year==null||pay_status.month==null)return;
  pay_setCached(Number(pay_status.year),Number(pay_status.month),pay_status,pay_stats);
}
function pay_prefetchAdjacentMonths(y,m){
  var want=[];
  for(var d=-2;d<=2;d++){
    var mm=m+d;
    if(mm<1||mm>12)continue;
    if(!pay_getCached(y,mm))want.push(mm);
  }
  want.forEach(function(mm){
    Promise.all([
      apiGet('loadPaymentStatus',{year:y,month:mm}),
      apiGet('getRevenueStats',{year:y,month:mm})
    ]).then(function(arr){
      pay_setCached(y,mm,arr[0],arr[1]);
    }).catch(function(){});
  });
}
function inv_payStatusForInvMonth(){
  var y=inv_targetYear,m=inv_selectedMonth;
  if(pay_status&&Number(pay_status.year)===y&&Number(pay_status.month)===m)return pay_status;
  var c=pay_getCached(y,m);
  return c&&c.status?c.status:null;
}
function inv_sumPaidTuition(){
  var ps=inv_payStatusForInvMonth();
  if(!ps||!ps.students)return 0;
  var sum=0;
  ps.students.forEach(function(p){
    if(!p||!p.paid)return;
    var raw=p.fee;
    if(typeof raw!=='number')raw=parseInt(String(p.feeDisplay||p.fee||'').replace(/,/g,''),10);
    if(isNaN(raw))raw=0;
    sum+=raw;
  });
  return sum;
}
function inv_syncPayLedgerFromStudent(s){
  if(!pay_status||!pay_status.students||!s)return;
  if(Number(pay_status.year)!==inv_targetYear||Number(pay_status.month)!==inv_selectedMonth)return;
  var n=parseInt(String(s.fee||'').replace(/,/g,''),10);
  if(isNaN(n))n=0;
  var fd=String(s.fee||'').trim();
  pay_status.students.forEach(function(p){
    if(p.name===s.name){p.fee=n;p.feeDisplay=fd;}
  });
  if(APP_DATA)APP_DATA.paymentStatus=pay_status;
  pay_setCached(inv_targetYear,inv_selectedMonth,pay_status,pay_stats);
}
function pay_findStudentByName(nm){
  var st=(pay_status&&pay_status.students)?pay_status.students:[];
  for(var i=0;i<st.length;i++){if(st[i]&&st[i].name===nm)return st[i];}
  return null;
}
function pay_fmtDate(){
  try{return new Date().toLocaleDateString('ko-KR')}catch(e){return '';}
}
function pay_dotDate(val){
  if(!val)return'';
  try{
    var d=new Date(val);
    if(isNaN(d.getTime())){
      var s=String(val).replace(/\./g,'-').trim().split(/\s/)[0];
      d=new Date(s);
      if(isNaN(d.getTime()))return String(val);
    }
    return d.getFullYear()+'.'+(d.getMonth()+1)+'.'+d.getDate();
  }catch(e){return String(val||'');}
}
function pay_setUiFilter(f){
  pay_uiFilter=f;

}
function pay_studentMetaLine(nm){
  try{
    if(typeof stu_list==='undefined'||!Array.isArray(stu_list))return '';
    var rec=stu_list.find(function(x){return x&&x.name===nm});
    if(!rec)return '';
    var parts=[];
    if(rec.freq)parts.push(rec.freq);
    if(rec.level)parts.push(rec.level);
    var fee=String(rec.fee||'').trim();
    if(fee)parts.push(fee+'원');
    return parts.filter(Boolean).join(' · ');
  }catch(e){return '';}
}
function pay_statsCounts(){
  var st=(pay_status&&pay_status.students)?pay_status.students:[];
  var paid=st.filter(function(x){return x&&x.paid}).length;
  return{tot:st.length,paid:paid,unpaid:st.length-paid};
}
function pay_renderCardHtml(s){
  var freq='';
  var feeNum=typeof s.fee==='number'?s.fee:parseInt(String(s.feeDisplay||s.fee||'').replace(/,/g,''),10);
  if(isNaN(feeNum))feeNum=0;
  try{
    var rec=stu_list.find(function(x){return x&&x.name===s.name;});
    if(rec)freq=rec.freq||'';
  }catch(e){}
  var feeDisp=feeNum?feeNum.toLocaleString()+'원':'';
  var paid=!!s.paid;
  var av=esc((s.name&&s.name[0])||'?');
  var nmJs=JSON.stringify(String(s.name||''));
  var dd=paid?pay_dotDate(s.paidDate):'';
  var actions=paid
    ? '<span class="pay-v2-row-paid">'+esc(dd)+' 완납</span><button type="button" class="pay-v2-btn-can" onclick=\'event.stopPropagation();pay_setPaid('+nmJs+',false)\'>취소</button>'
    : '<button type="button" class="pay-v2-btn-mi" onclick=\'event.stopPropagation();pay_setPaid('+nmJs+',true)\'>완납</button>';
  var feeBadgeCls=feeNum>=150000?'pay-fee-badge pay-fee-badge--high':'pay-fee-badge';
  var metaHtml='';
  if(freq)metaHtml+='<span class="pay-meta-chip">'+esc(freq)+'</span>';
  if(feeDisp)metaHtml+='<span class="'+feeBadgeCls+'">'+esc(feeDisp)+'</span>';
  return '<div class="pay-v2-card" data-student-id="'+esc(s.name)+'" onclick="pay_openStudent('+nmJs+')"><div class="pay-v2-row1">'
    +'<div class="pay-v2-av'+(paid?' paid':'')+'">'+av+'</div>'
    +'<div class="pay-v2-nm">'+esc(s.name)+'</div></div>'
    +'<div class="pay-v2-row2"><div class="pay-v2-meta">'+metaHtml+'</div><div class="pay-v2-actions">'+actions+'</div></div></div>';
}
function pay_replaceCard(studentId,s){
  var cards=document.querySelectorAll('.pay-v2-card');
  for(var i=0;i<cards.length;i++){
    if(cards[i].getAttribute('data-student-id')===studentId){
      var tmp=document.createElement('div');
      tmp.innerHTML=pay_renderCardHtml(s);
      if(tmp.firstElementChild){
        cards[i].replaceWith(tmp.firstElementChild);
      }
      break;
    }
  }
}
function pay_openStudent(nm){
  var st=(typeof stu_list!=='undefined'&&stu_list)?stu_list.find(function(x){return x&&x.name===nm;}):null;
  if(!st){toast('학생 관리에서 먼저 등록해 주세요');return;}
  MODE='stu';
  switchTab('stu');
  setTimeout(function(){stu_openEdit(st.row);},0);
}
function pay_filteredStudents(){
  var st=(pay_status&&pay_status.students)?pay_status.students:[];
  if(pay_uiFilter==='paid')return st.filter(function(x){return x&&x.paid});
  if(pay_uiFilter==='unpaid')return st.filter(function(x){return x&&!x.paid});
  return st;
}
function pay_updateV2Header(){
  var c=pay_statsCounts();
  var cur=(pay_stats&&pay_stats.current)?pay_stats.current:null;
  var totalMoney=(cur&&typeof cur.total==='number')?cur.total:0;
  var elG=document.getElementById('pay_v2_grand');
  var elP=document.getElementById('pay_v2_paid_n');
  var elU=document.getElementById('pay_v2_unpaid_n');
  if(elG)elG.textContent='₩'+totalMoney.toLocaleString();
  if(elP)elP.textContent=c.paid+'명';
  if(elU){
    elU.textContent=c.unpaid+'명';
    if(c.unpaid>0){
      elU.classList.add('pay-v2-sum--unpaid');
      elU.style.color='';
    }else{
      elU.classList.remove('pay-v2-sum--unpaid');
      elU.style.color='#2e7d32';
    }
  }
  document.querySelectorAll('.pay-v2-fpill').forEach(function(el){
    var f=el.getAttribute('data-f');
    el.classList.toggle('on',f===pay_uiFilter);
    if(f==='all')el.textContent='전체';
    else if(f==='paid')el.textContent='완납';
    else if(f==='unpaid')el.textContent='미납';
  });
}
function pay_renderCardList(){
  var host=document.getElementById('pay_v2_list');
  if(!host)return;
  var list=pay_filteredStudents();
  host.innerHTML=list.map(pay_renderCardHtml).join('');
  pay_updateV2Header();
}
function pay_selectMonth(m){
  pay_month=m;
  var hd=document.getElementById('headerDate');
  if(hd)hd.textContent=pay_year+'년 '+m+'월';
  pay_uiFilter='all';
  var hit=pay_getCached(pay_year,m);
  if(!hit){
    var snap=pay_loadSnapshot(pay_year,m);
    if(snap&&snap.status){
      pay_setCached(pay_year,m,snap.status,snap.stats);
      hit=pay_getCached(pay_year,m);
    }
  }
  if(hit&&hit.status){
    pay_status=hit.status;
    pay_stats=hit.stats||pay_stats;
    pay_loaded=true;
    if(APP_DATA){
      APP_DATA.paymentStatus=pay_status;
      APP_DATA.revenueStats=pay_stats;
    }
    pay_setCached(pay_year,m,pay_status,pay_stats);
    if(MODE==='pay')pay_render();
    pay_prefetchAdjacentMonths(pay_year,m);
    return;
  }
  pay_loaded=false;
  if(MODE==='pay')pay_render();
  var listEl=document.getElementById('pay_v2_list');
  if(listEl)listEl.innerHTML='<div class="loading" style="padding:24px;display:flex;align-items:center;justify-content:center;gap:10px"><div class="spin"></div></div>';
  Promise.all([
    apiGet('loadPaymentStatus',{year:pay_year,month:m}),
    apiGet('getRevenueStats',{year:pay_year,month:m})
  ]).then(function(arr){
    pay_status=arr[0];
    pay_stats=arr[1];
    pay_setCached(pay_year,m,pay_status,pay_stats);
    pay_loaded=true;
    if(APP_DATA){
      APP_DATA.paymentStatus=pay_status;
      APP_DATA.revenueStats=pay_stats;
    }
    if(MODE==='pay')pay_render();
    pay_prefetchAdjacentMonths(pay_year,m);
  }).catch(function(e){
    toast('데이터를 불러오지 못했어요');
    if(MODE==='pay'&&pay_status)pay_render();
  });
}
function pay_setPaid(studentId, wantPaid){
  if(!pay_status||!pay_status.students)return;
  if(pay_saving[studentId])return;
  var s=pay_findStudentByName(studentId);
  if(!s)return;
  var curPaid=!!s.paid;
  if(curPaid===!!wantPaid)return;
  pay_saving[studentId]=true;
  var prevDate=s.paidDate||'';
  s.paid=!!wantPaid;
  s.paidDate=wantPaid?pay_fmtDate():'';
  pay_replaceCard(studentId,s);
  pay_updateV2Header();
  if(!pay_filteredStudents().some(function(x){return x&&x.name===studentId;}))pay_renderCardList();
  try{if(APP_DATA)APP_DATA.paymentStatus=pay_status;}catch(e){}
  apiPost('togglePayment',{year:pay_year,month:pay_month,name:studentId,paid:s.paid}).then(function(){
    pay_saving[studentId]=false;
    pay_setCached(pay_year,pay_month,pay_status,pay_stats);
  }).catch(function(){
    s.paid=curPaid;
    s.paidDate=prevDate;
    pay_replaceCard(studentId,s);
    pay_updateV2Header();
    if(!pay_filteredStudents().some(function(x){return x&&x.name===studentId;}))pay_renderCardList();
    try{if(APP_DATA)APP_DATA.paymentStatus=pay_status;}catch(e){}
    pay_saving[studentId]=false;
    toast('저장 실패, 다시 시도해주세요');
  });
}
function pay_init(){
  var hit=pay_getCached(pay_year,pay_month);
  if(hit&&hit.status){
    pay_status=hit.status;
    pay_stats=hit.stats||pay_stats;
    pay_loaded=true;
    if(APP_DATA){
      APP_DATA.paymentStatus=pay_status;
      APP_DATA.revenueStats=pay_stats;
    }
    if(MODE==='pay')pay_render();
    pay_prefetchAdjacentMonths(pay_year,pay_month);
    return;
  }
  if(APP_DATA&&APP_DATA.paymentStatus&&APP_DATA.revenueStats){
    var ps=APP_DATA.paymentStatus;
    if(Number(ps.year)===pay_year&&Number(ps.month)===pay_month){
      pay_status=APP_DATA.paymentStatus;
      pay_stats=APP_DATA.revenueStats;
      pay_loaded=true;
      pay_setCached(pay_year,pay_month,pay_status,pay_stats);
      if(MODE==='pay')pay_render();
      pay_prefetchAdjacentMonths(pay_year,pay_month);
      return;
    }
  }
  Q('app','<div class="loading"><div class="spin"></div>불러오는 중...</div>');
  Promise.all([
    apiGet('loadPaymentStatus',{year:pay_year,month:pay_month}),
    apiGet('getRevenueStats',{year:pay_year,month:pay_month})
  ]).then(function(arr){
    pay_status=arr[0];
    pay_stats=arr[1];
    pay_setCached(pay_year,pay_month,pay_status,pay_stats);
    pay_loaded=true;
    if(APP_DATA){
      APP_DATA.paymentStatus=pay_status;
      APP_DATA.revenueStats=pay_stats;
    }
    if(MODE!=='pay')return;
    pay_render();
    pay_prefetchAdjacentMonths(pay_year,pay_month);
  }).catch(function(e){if(MODE==='pay')Q('app','<div style="padding:20px;color:#f87171">'+esc(e.message)+'</div>');});
}
function pay_render(){
  if(!pay_status){pay_init();return;}
  if(!pay_stats)pay_stats={current:{total:0}};
  var hd=document.getElementById('headerDate');
  if(hd)hd.textContent=pay_year+'년 '+pay_month+'월';
  var c=pay_statsCounts();
  var h='<div class="pay-v2-head"></div>';
  h+='<div class="month-sel" style="padding:0 20px 12px;overflow-x:auto;flex-wrap:nowrap;display:flex;gap:8px;-webkit-overflow-scrolling:touch">';
  for(var mm=1;mm<=12;mm++){
    var on=mm===pay_month;
    h+='<div class="month-chip pay-month-chip" data-month="'+mm+'" onclick="pay_selectMonth('+mm+')" style="flex-shrink:0;background:'+(on?'#002046':'#f0f0f0')+';color:'+(on?'#fff':'#333')+'">'+mm+'월</div>';
  }
  h+='</div>';
  h+='<div class="pay-v2-sumgrid"><div class="pay-v2-sumcell"><div class="pay-v2-sumlabel">총 매출</div><div class="pay-v2-sumval" id="pay_v2_grand">₩0</div></div>';
  h+='<div class="pay-v2-sumcell"><div class="pay-v2-sumlabel">완납</div><div class="pay-v2-sumval" id="pay_v2_paid_n">'+c.paid+'명</div></div>';
  h+='<div class="pay-v2-sumcell"><div class="pay-v2-sumlabel">미납</div><div class="pay-v2-sumval" id="pay_v2_unpaid_n">'+c.unpaid+'명</div></div></div>';
  h+='<div class="pay-v2-filt">';
  h+='<button type="button" class="pay-v2-fpill'+(pay_uiFilter==='all'?' on':'')+'" data-f="all" onclick="pay_setUiFilter(\'all\')">전체</button>';
  h+='<button type="button" class="pay-v2-fpill'+(pay_uiFilter==='paid'?' on':'')+'" data-f="paid" onclick="pay_setUiFilter(\'paid\')">완납</button>';
  h+='<button type="button" class="pay-v2-fpill'+(pay_uiFilter==='unpaid'?' on':'')+'" data-f="unpaid" onclick="pay_setUiFilter(\'unpaid\')">미납</button>';
  h+='</div><div class="pay-v2-list" id="pay_v2_list"></div>';
  Q('app',h);
  pay_renderCardList();
  var chip=document.querySelector('.pay-month-chip[data-month="'+pay_month+'"]');
  if(chip)try{chip.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'})}catch(e){}
}
