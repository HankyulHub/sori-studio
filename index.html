<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>소리마을 매니저</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif!important;background:#0a0a0a;color:#f0f0f0;max-width:500px;margin:0 auto;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;padding-bottom:80px}
*{font-family:'Noto Sans KR',sans-serif!important}
.banner{background:#111;padding:16px 20px 14px;border-bottom:2px solid #FFD43B}
.banner-row{display:flex;justify-content:space-between;align-items:center}
.logo{font-size:11px;letter-spacing:2.5px;color:#FFD43B;font-weight:700}
.title{font-size:17px;font-weight:700;color:#fff;margin-top:3px}
.date{font-size:13px;color:#888}
.mode-tabs{display:flex;background:#111;border-bottom:1px solid #1e1e1e}
.mode-tab{flex:1;padding:12px 0;text-align:center;font-size:13px;font-weight:500;color:#555;cursor:pointer;transition:.2s;position:relative}
.mode-tab:active{background:#141414}
.mode-tab.active{color:#FFD43B;font-weight:700}
.mode-tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:#FFD43B;border-radius:1px}
.section{border-bottom:1px solid #1a1a1a}
.section-header{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:.1s}
.section-header:active{background:#111}
.section-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
.section-dot{width:7px;height:7px;border-radius:50%;background:#FFD43B;flex-shrink:0}
.section-badge{font-size:11px;color:#888;font-weight:400;margin-left:4px}
.section-arrow{font-size:14px;color:#555;transition:transform .2s}
.section-arrow.open{transform:rotate(180deg)}
.section-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.section-body.open{max-height:3000px}
.section-inner{padding:0 20px 16px}
.month-sel{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.month-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #2a2a2a;background:#1a1a1a;color:#888;transition:.15s;font-family:inherit}
.month-chip:active{transform:scale(.95)}
.month-chip.active{background:rgba(255,212,59,.12);color:#FFD43B;border-color:rgba(255,212,59,.3)}
.greeting-box{background:#111;border:1px solid #222;border-radius:10px;padding:14px;color:#ddd;font-size:13px;line-height:1.7;white-space:pre-wrap;min-height:60px;outline:none;transition:border-color .2s}
.greeting-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.chip-btn{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.chip-btn:active{transform:scale(.95)}
.chip-btn-o{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.2)}
.chip-btn-g{background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.2)}
.chip-btn-d{background:#1a1a1a;color:#999;border:1px solid #2a2a2a}
.stu-item{margin:0;border-bottom:1px solid #1a1a1a}
.stu-item:last-child{border-bottom:none}
.stu-row{padding:12px 0;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.1s}
.stu-row:active{opacity:.8}
.stu-av{width:30px;height:30px;border-radius:50%;background:#FFD43B;color:#111;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.stu-name{font-size:14px;font-weight:500;flex:1}
.stu-summary{font-size:12px;color:#666;margin-left:auto;flex-shrink:0}
.stu-arrow{font-size:12px;color:#444;flex-shrink:0;transition:transform .2s}
.stu-arrow.open{transform:rotate(90deg)}
.stu-detail{max-height:0;overflow:hidden;transition:max-height .25s ease;padding:0 0 0 40px}
.stu-detail.open{max-height:600px}
.stu-detail-inner{padding:4px 0 12px}
.fee-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.fee-chip{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid #2a2a2a;background:#1a1a1a;color:#aaa;transition:.15s;font-family:inherit}
.fee-chip:active{transform:scale(.95)}
.fee-chip.selected{background:rgba(255,212,59,.12);color:#FFD43B;border-color:rgba(255,212,59,.3)}
.fee-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.fee-label{font-size:12px;color:#888;width:50px;flex-shrink:0}
.fee-input{flex:1;padding:8px 10px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:6px;color:#eee;font-size:12px;font-family:inherit;outline:none}
.fee-input:focus{border-color:#FFD43B}
.fee-input::placeholder{color:#333}
.add-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px dashed #333;background:transparent;color:#666;font-family:inherit;transition:.15s;margin-top:6px}
.add-btn:active{background:#111;color:#aaa;transform:scale(.95)}
.added-item{background:#111;border:1px solid #222;border-radius:8px;padding:10px 12px;margin-top:8px;position:relative}
.added-item-row{display:flex;align-items:center;gap:8px}
.added-item-remove{width:20px;height:20px;border-radius:50%;background:#1a1a1a;border:1px solid #333;color:#666;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;flex-shrink:0;line-height:1}
.added-item-remove:active{background:#333;color:#f87171}
.added-item input{flex:1;padding:6px 8px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:6px;color:#eee;font-size:12px;font-family:inherit;outline:none}
.added-item input:focus{border-color:#FFD43B}
.added-item input::placeholder{color:#444}
.material-note{font-size:11px;color:#f59e0b;margin-top:6px;padding-left:2px}
.sched-item{background:#111;border:1px solid #222;border-radius:8px;padding:10px 12px;margin-bottom:8px}
.sched-row{display:flex;align-items:center;gap:8px}
.sched-title-input{padding:6px 8px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:6px;color:#FFD43B;font-size:12px;font-weight:600;font-family:inherit;outline:none;width:80px}
.sched-title-input:focus{border-color:#FFD43B}
.sched-value-input{flex:1;padding:6px 8px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:6px;color:#eee;font-size:12px;font-family:inherit;outline:none}
.sched-value-input:focus{border-color:#FFD43B}
.sched-value-input::placeholder{color:#444}
.edit-block{background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:12px;font-size:12.5px;color:#999;line-height:1.6;white-space:pre-wrap;outline:none;transition:border-color .2s,color .2s;min-height:40px;cursor:pointer}
.edit-block:focus,.edit-block.editing{border-color:#FFD43B;color:#eee;cursor:text}
.edit-hint{font-size:10px;color:#444;margin-top:4px;text-align:right}
.notice-block{background:rgba(255,212,59,.04);border:1px solid rgba(255,212,59,.15);border-radius:8px;padding:10px 12px;margin-top:8px}
.notice-input{width:100%;padding:8px;background:transparent;border:none;color:#eee;font-size:12.5px;font-family:inherit;outline:none;line-height:1.6;resize:none;min-height:36px}
.notice-input::placeholder{color:#555}
.notice-label{font-size:10px;color:#FFD43B;font-weight:600;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.pagi{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 0}
.pagi-btn{width:32px;height:32px;border-radius:50%;background:#1a1a1a;border:1px solid #2a2a2a;color:#888;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;font-family:inherit;transition:.15s}
.pagi-btn:active{background:#222}
.pagi-btn.disabled{opacity:.3;cursor:default}
.pagi-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.pagi-num.active{background:#FFD43B;color:#111}
.pagi-num:not(.active){color:#555}
.swipe-hint{display:flex;justify-content:space-between;padding:2px 0 8px;pointer-events:none}
.swipe-hint span{font-size:11px;color:#2a2a2a;transition:color .2s}
.swipe-hint.has-prev span:first-child{color:#555}
.swipe-hint.has-next span:last-child{color:#555}
.gen-area{padding:16px 20px;background:#0a0a0a;position:sticky;bottom:0;border-top:1px solid #1a1a1a}
.btn-gen{background:#FFD43B;color:#111;width:100%;padding:14px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.btn-gen:active{transform:scale(.97)}
.total-hint{font-size:12px;color:#888;text-align:center;margin-bottom:8px}
.total-hint b{color:#4ade80}
.car-header{padding:12px 16px;background:#111;border-bottom:1px solid #1e1e1e}
.car-row1{display:flex;align-items:center;justify-content:space-between}
.car-back{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #2a2a2a;background:#1a1a1a;color:#ccc;font-family:inherit}
.car-back:active{background:#222}
.car-counter{font-size:13px;font-weight:600;color:#888}
.car-nav{display:flex;gap:5px}
.car-nav-btn{width:32px;height:32px;border-radius:50%;background:#1a1a1a;border:1px solid #252525;color:#aaa;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
.car-nav-btn:active{background:#222}
.car-names{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 0 4px;overflow:hidden}
.car-name{font-size:12px;color:#444;transition:all .25s;white-space:nowrap;cursor:pointer;flex-shrink:0}
.car-name.active{font-size:15px;color:#FFD43B;font-weight:600}
.car-name.near{font-size:12px;color:#555}
.car-body{padding:16px 20px}
.car-stu{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.car-av{width:38px;height:38px;border-radius:50%;background:#FFD43B;color:#111;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700}
.car-av.copied{background:#0a0a0a;color:#4ade80;border:2px solid #16a34a}
.car-sname{font-size:16px;font-weight:700}
.car-ssub{font-size:12px;color:#666;margin-top:1px}
.car-status{font-size:11px;padding:4px 0;margin-bottom:8px}
.msg-display{width:100%;padding:14px;background:#111;border:1px solid #222;border-radius:10px;color:#ddd;font-size:13px;line-height:1.8;min-height:200px;margin-bottom:4px;white-space:pre-wrap;word-break:break-word;cursor:pointer;transition:border-color .2s}
.msg-display .hl-name{color:#FFD43B;font-weight:600}
.msg-display .hl-money{color:#4ade80;font-weight:600}
.msg-edit-area{width:100%;padding:14px;background:#111;border:1px solid #FFD43B;border-radius:10px;color:#eee;font-size:13px;line-height:1.8;min-height:200px;margin-bottom:4px;font-family:inherit;outline:none;resize:none}
.msg-edit-hint{font-size:11px;color:#555;text-align:center;margin-bottom:10px}
.copy-btn-full{width:100%;padding:14px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.copy-btn-full:active{transform:scale(.97)}
.copy-btn-full.ready{background:#FFD43B;color:#111}
.copy-btn-full.done{background:#0d1a0d;color:#4ade80;border:1px solid #16a34a}
.summary-wrap{padding:20px}
.summary-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1a1a1a;font-size:13px}
.summary-row:last-child{border-bottom:none}
.summary-name{color:#aaa}
.summary-fee{color:#eee;font-weight:500}
.summary-mat{font-size:11px;color:#f59e0b;margin-top:2px}
.summary-total{background:#111;border:1px solid #222;border-radius:10px;padding:14px;margin-top:16px;display:flex;justify-content:space-between;align-items:center}
.summary-total-label{font-size:13px;color:#888}
.summary-total-val{font-size:18px;font-weight:700;color:#4ade80}
.summary-back{width:100%;padding:14px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;background:#1a1a1a;color:#ccc;margin-top:16px}
.summary-back:active{background:#222}
.loading{display:flex;flex-direction:column;align-items:center;padding:60px 20px;color:#666;font-size:13px;gap:12px}
.spin{width:22px;height:22px;border:2.5px solid #1a1a1a;border-top-color:#FFD43B;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes stuSlideLeft{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes stuSlideRight{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
.stu-slide-left{animation:stuSlideLeft .2s ease}
.stu-slide-right{animation:stuSlideRight .2s ease}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:#1a1a1a;border:1px solid #252525;color:#eee;padding:8px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.25s;z-index:99;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease}
</style>
</head>
<body>
<div class="banner">
  <div class="banner-row">
    <div><div class="logo">SORI MANAGER</div><div class="title">소리마을 매니저</div></div>
    <div class="date" id="headerDate"></div>
  </div>
</div>
<div class="mode-tabs">
  <div class="mode-tab" onclick="switchMode('kakao')">💬 카톡 대본</div>
  <div class="mode-tab active" onclick="switchMode('invoice')">💳 월비 명세서</div>
</div>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
var API_URL='https://script.google.com/macros/s/AKfycbzW7VPXPRW0Ltf8ws_1xtdLM0rceMsumj7oi6bLD3jSjOCtYG8_WYGAqjd_UyRjPrQ1/exec';
var IS_TEST=true;

var MODE='invoice',VIEW='setting';
var stuPage=0,carIdx=0,PER_PAGE=5;
var copied=new Set();
var editingMsg={};
var students=[];
var loaded=false;

var now=new Date();
var targetMonth=now.getMonth()+2;
var targetYear=now.getFullYear();
if(targetMonth>12){targetMonth=1;targetYear++}
var selectedMonth=targetMonth;

document.getElementById('headerDate').textContent=targetYear+'년 '+selectedMonth+'월';

var presets=[
  {label:'주 2회 / 90,000원',freq:'주 2회',fee:'90,000'},
  {label:'주 2회 / 110,000원',freq:'주 2회',fee:'110,000'},
  {label:'주 3회 / 130,000원',freq:'주 3회',fee:'130,000'},
  {label:'주 3회 / 150,000원',freq:'주 3회',fee:'150,000'}
];

var scheduleItems=[
  {title:'휴강',value:'',placeholder:'예: '+selectedMonth+'/2(월) 대체공휴일'},
  {title:'악기특강',value:'',placeholder:'예: '+selectedMonth+'/4, '+selectedMonth+'/11'},
  {title:'예술융합특강',value:'',placeholder:'예: '+selectedMonth+'/25'}
];

var greeting='안녕하세요, 소리마을음악교습소입니다🎶\n따뜻한 봄바람과 함께 새로운 시작을 알리는 '+selectedMonth+'월입니다. 새 학기를 맞이하여 우리 아이들이 음악 속에서 더 큰 꿈을 키워가길 바랍니다.☘️';
var greetLoading=false;
var greetEditing=false;
var payInfo='• 납부 기간: 매월 25일 ~ 말일\n• 납부 방법: 비대면 카드 / 방문 카드 / 계좌이체\n• 계좌번호: 국민은행 528702-04-052815 김수지';
var scheduleNote='* 학기 중 수업시간, 요일 변동사항이 있으시면 연락 부탁드립니다♡';
var closing='문의 사항은 언제든 연락주세요^^ 감사합니다❤️\n소리마을음악교습소 드림';
var notice='';
var noticeOn=false;
var openSections={greeting:false,students:true,schedule:false,pay:false,closing:false};
var openStudents=new Set();

function apiGet(action){
  var url=API_URL+'?action='+action+(IS_TEST?'&test=1':'');
  return fetch(url).then(function(r){return r.json()}).then(function(j){if(!j.ok)throw new Error(j.error);return j.data});
}
function apiPost(action,body){
  body.action=action;
  if(IS_TEST)body.test='1';
  return fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)})
    .then(function(r){return r.json()}).then(function(j){if(!j.ok)throw new Error(j.error);return j.data});
}

function init(){
  Q('app','<div class="loading"><div class="spin"></div>데이터 불러오는 중...</div>');
  apiGet('loadInvoiceStudents').then(function(data){
    students=data||[];
    loaded=true;
    render();
  }).catch(function(e){
    Q('app','<div style="padding:20px;color:#f87171">연결 실패: '+e.message+'</div>');
  });
}

function switchMode(m){
  MODE=m;VIEW='setting';stuPage=0;copied.clear();editingMsg={};
  document.querySelectorAll('.mode-tab').forEach(function(t,i){
    t.classList.toggle('active',(i===0&&m==='kakao')||(i===1&&m==='invoice'));
  });
  if(m==='invoice'&&!loaded)init();
  else render();
}

function render(){
  if(MODE==='kakao')renderKakao();
  else if(VIEW==='setting')renderSetting();
  else if(VIEW==='carousel')renderCarousel();
  else if(VIEW==='summary')renderSummary();
}

function renderKakao(){
  Q('app','<div style="padding:40px 20px;text-align:center;color:#555"><p style="font-size:14px;margin-bottom:8px">💬 카톡 대본 기능</p><p style="font-size:12px;color:#444">(기존 화면 그대로)</p></div>');
}

function renderSetting(){
  var total=calcTotal();
  var h='';
  h+=buildSec('greeting','🎶 인삿말',null,openSections.greeting,buildGreeting);
  h+=buildSec('students','📌 수강료 안내',students.length+'명',openSections.students,buildStudents);
  h+=buildSec('schedule','🎵 수업 일정',null,openSections.schedule,buildSchedule);
  h+=buildSec('pay','💳 납부 안내',null,openSections.pay,buildPay);
  h+=buildNotice();
  h+=buildSec('closing','❤️ 마무리 인사',null,openSections.closing,buildClosing);
  h+='<div class="gen-area">';
  h+='<div class="total-hint">이번 달 예상 매출 <b>'+total+'원</b></div>';
  h+='<button class="btn-gen" onclick="goCarousel()">전체 명세서 생성 ('+students.length+'명)</button>';
  h+='</div>';
  Q('app',h);
  attachSwipe();
}

function calcTotal(){
  var sum=0;
  students.forEach(function(s){
    var n=parseInt((s.fee||'0').replace(/,/g,''),10);
    if(!isNaN(n))sum+=n;
  });
  return sum.toLocaleString();
}

function buildSec(key,title,badge,isOpen,contentFn){
  var badgeHtml=badge?'<span class="section-badge">'+badge+'</span>':'';
  return '<div class="section">'+
    '<div class="section-header" onclick="toggleSec(\''+key+'\')">'+
    '<div class="section-title"><div class="section-dot"></div>'+title+badgeHtml+'</div>'+
    '<span class="section-arrow'+(isOpen?' open':'')+'">▾</span></div>'+
    '<div class="section-body'+(isOpen?' open':'')+'"><div class="section-inner">'+contentFn()+'</div></div></div>';
}

function buildGreeting(){
  var s='<div class="month-sel">';
  for(var m=selectedMonth-1;m<=selectedMonth+1;m++){
    var mm=m<1?m+12:m>12?m-12:m;
    s+='<div class="month-chip'+(mm===selectedMonth?' active':'')+'" onclick="setMonth('+mm+')">'+mm+'월</div>';
  }
  s+='</div>';
  if(greetLoading){
    s+='<div class="loading" style="padding:20px 0"><div class="spin"></div><span>AI 생성 중...</span></div>';
  }else if(greetEditing){
    s+='<textarea class="msg-edit-area" id="greetTA" oninput="greeting=this.value" style="min-height:100px">'+esc(greeting)+'</textarea>';
    s+='<div class="greeting-actions"><div class="chip-btn chip-btn-g" onclick="saveGreetEdit()">✓ 수정 완료</div></div>';
  }else{
    s+='<div class="greeting-box">'+esc(greeting)+'</div>';
    s+='<div class="greeting-actions">';
    s+='<div class="chip-btn chip-btn-o" onclick="regenGreeting()">↻ 재생성</div>';
    s+='<div class="chip-btn chip-btn-d" onclick="greetEditing=true;renderSetting()">✏️ 직접 수정</div>';
    s+='</div>';
  }
  return s;
}

function regenGreeting(){
  greetLoading=true;openSections.greeting=true;renderSetting();
  apiPost('generateGreeting',{month:selectedMonth}).then(function(text){
    greeting=text;greetLoading=false;renderSetting();
  }).catch(function(){
    greetLoading=false;toast('생성 실패, 다시 시도해주세요');renderSetting();
  });
}

function saveGreetEdit(){
  var ta=document.getElementById('greetTA');
  if(ta)greeting=ta.value;
  greetEditing=false;renderSetting();
}

function setMonth(m){
  selectedMonth=m;
  document.getElementById('headerDate').textContent=targetYear+'년 '+m+'월';
  scheduleItems.forEach(function(si){si.placeholder=si.placeholder.replace(/\d+\//g,m+'/')});
  renderSetting();
}

function buildStudents(){
  var totalPages=Math.ceil(students.length/PER_PAGE);
  var start=stuPage*PER_PAGE,end=Math.min(start+PER_PAGE,students.length);
  var hasPrev=stuPage>0,hasNext=stuPage<totalPages-1;
  var s='';
  s+='<div id="stuListWrap">';
  s+='<div class="swipe-hint'+(hasPrev?' has-prev':'')+(hasNext?' has-next':'')+'">';
  s+='<span>'+(hasPrev?'◀ 이전':'')+'</span>';
  s+='<span>'+(hasNext?'다음 ▶':'')+'</span>';
  s+='</div>';
  for(var i=start;i<end;i++){
    var st=students[i],isOpen=openStudents.has(i);
    s+='<div class="stu-item">';
    s+='<div class="stu-row" onclick="toggleStu('+i+')">';
    s+='<div class="stu-av">'+st.name[0]+'</div>';
    s+='<span class="stu-name">'+st.name+'</span>';
    s+='<span class="stu-summary">'+(st.freq||'미입력')+' · '+(st.fee||'0')+'원</span>';
    s+='<span class="stu-arrow'+(isOpen?' open':'')+'">›</span></div>';
    s+='<div class="stu-detail'+(isOpen?' open':'')+'">';
    s+='<div class="stu-detail-inner">';
    s+='<div class="fee-chips">';
    presets.forEach(function(p,pi){
      var sel=(st.freq===p.freq&&st.fee===p.fee);
      s+='<div class="fee-chip'+(sel?' selected':'')+'" onclick="selPreset('+i+','+pi+')">'+p.label+'</div>';
    });
    s+='</div>';
    s+='<div class="fee-row"><span class="fee-label">수강료</span>';
    s+='<input class="fee-input" value="'+esc(st.fee||'')+'" placeholder="직접 입력" onchange="updateFee('+i+',this.value)"/></div>';
    if(st.materials&&st.materials.length>0){
      st.materials.forEach(function(mat,mi){
        s+='<div class="added-item"><div class="added-item-row">';
        s+='<div class="added-item-remove" onclick="removeMat('+i+','+mi+')">✕</div>';
        s+='<input value="'+esc(mat.text)+'" placeholder="예: 3/6 반주1 : 7,000원" oninput="students['+i+'].materials['+mi+'].text=this.value;autoSave('+i+')"/>';
        s+='</div></div>';
      });
      s+='<div class="material-note">* 교재비는 이체 부탁드립니다🩷</div>';
    }
    s+='<div class="add-btn" onclick="addMat('+i+')">+ 교재비 추가</div>';
    s+='</div></div></div>';
  }
  if(totalPages>1){
    s+='<div class="pagi">';
    s+='<div class="pagi-btn'+(stuPage===0?' disabled':'')+'" onclick="goPage('+(stuPage-1)+')">‹</div>';
    for(var p=0;p<totalPages;p++){
      s+='<div class="pagi-num'+(p===stuPage?' active':'')+'" onclick="goPage('+p+')">'+(p+1)+'</div>';
    }
    s+='<div class="pagi-btn'+(stuPage>=totalPages-1?' disabled':'')+'" onclick="goPage('+(stuPage+1)+')">›</div>';
    s+='</div>';
  }
  s+='</div>';
  return s;
}

function attachSwipe(){
  var el=document.getElementById('stuListWrap');
  if(!el)return;
  var sx=0,sy=0;
  el.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
  el.addEventListener('touchmove',function(e){
    var dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>8)e.preventDefault();
  },{passive:false});
  el.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)<Math.abs(dy)||Math.abs(dx)<40)return;
    var totalPages=Math.ceil(students.length/PER_PAGE);
    if(dx<0&&stuPage<totalPages-1)goPage(stuPage+1,'left');
    else if(dx>0&&stuPage>0)goPage(stuPage-1,'right');
  },{passive:true});
}

function buildSchedule(){
  var s='';
  scheduleItems.forEach(function(item,idx){
    s+='<div class="sched-item"><div class="sched-row">';
    s+='<div class="added-item-remove" onclick="removeSched('+idx+')">✕</div>';
    s+='<input class="sched-title-input" value="'+esc(item.title)+'" oninput="scheduleItems['+idx+'].title=this.value"/>';
    s+='<input class="sched-value-input" value="'+esc(item.value)+'" placeholder="'+esc(item.placeholder)+'" oninput="scheduleItems['+idx+'].value=this.value"/>';
    s+='</div></div>';
  });
  s+='<div class="add-btn" onclick="addSched()">+ 항목 추가</div>';
  s+='<div style="margin-top:10px">';
  s+='<div class="edit-block" contenteditable="false" onclick="makeEditable(this)" onblur="scheduleNote=this.textContent">'+esc(scheduleNote)+'</div>';
  s+='<div class="edit-hint">탭하여 수정</div></div>';
  return s;
}

function buildPay(){
  return '<div class="edit-block" contenteditable="false" onclick="makeEditable(this)" onblur="payInfo=this.textContent">'+esc(payInfo)+'</div>'+
    '<div class="edit-hint">탭하여 수정</div>';
}

function buildNotice(){
  if(!noticeOn){
    return '<div style="padding:8px 20px;border-bottom:1px solid #1a1a1a">'+
      '<div class="add-btn" onclick="noticeOn=true;renderSetting()" style="width:100%;justify-content:center;padding:10px">+ 📢 공지 추가</div></div>';
  }
  return '<div class="section"><div style="padding:12px 20px">'+
    '<div class="notice-block">'+
    '<div class="notice-label"><span>📢 공지사항</span><span class="added-item-remove" onclick="noticeOn=false;notice=\'\';renderSetting()">✕</span></div>'+
    '<textarea class="notice-input" placeholder="예: 다음 달부터 인상된 원비가 적용됩니다" oninput="notice=this.value">'+esc(notice)+'</textarea>'+
    '</div></div></div>';
}

function buildClosing(){
  return '<div class="edit-block" contenteditable="false" onclick="makeEditable(this)" onblur="closing=this.textContent">'+esc(closing)+'</div>'+
    '<div class="edit-hint">탭하여 수정</div>';
}

function toggleSec(k){openSections[k]=!openSections[k];renderSetting()}
function toggleStu(i){openStudents.has(i)?openStudents.delete(i):openStudents.add(i);renderSetting()}
function goPage(p,dir){
  var mx=Math.ceil(students.length/PER_PAGE)-1;
  if(p<0||p>mx)return;
  var d=dir||(p>stuPage?'left':'right');
  stuPage=p;openStudents.clear();renderSetting();
  var el=document.getElementById('stuListWrap');
  if(el){
    el.classList.add('stu-slide-'+d);
    setTimeout(function(){if(el)el.classList.remove('stu-slide-left','stu-slide-right')},300);
  }
}
function selPreset(si,pi){var p=presets[pi];students[si].freq=p.freq;students[si].fee=p.fee;autoSave(si);renderSetting()}
function updateFee(i,v){students[i].fee=v;autoSave(i)}
function addMat(i){students[i].materials.push({text:''});renderSetting()}
function removeMat(si,mi){students[si].materials.splice(mi,1);autoSave(si);renderSetting()}
function addSched(){scheduleItems.push({title:'',value:'',placeholder:'날짜와 내용 입력'});openSections.schedule=true;renderSetting();toast('항목 추가됨')}
function removeSched(idx){scheduleItems.splice(idx,1);renderSetting()}
function makeEditable(el){
  el.contentEditable='true';el.classList.add('editing');el.focus();
  el.parentNode.querySelector('.edit-hint').textContent='수정 중... (다른 곳을 탭하면 저장)';
  el.addEventListener('blur',function(){el.contentEditable='false';el.classList.remove('editing');el.parentNode.querySelector('.edit-hint').textContent='탭하여 수정'},{once:true});
}

function autoSave(i){
  var s=students[i];
  apiPost('saveInvoiceStudent',{name:s.name,freq:s.freq,fee:s.fee,materials:s.materials}).catch(function(){});
}

function goCarousel(){
  VIEW='carousel';carIdx=0;copied.clear();editingMsg={};
  students.forEach(function(s,i){editingMsg[i]=buildMessage(s)});
  render();
}

function renderCarousel(){
  var s=students[carIdx];
  var prev=carIdx>0?students[carIdx-1]:null;
  var next=carIdx<students.length-1?students[carIdx+1]:null;
  var isCopied=copied.has(carIdx);
  var h='<div class="car-header"><div class="car-row1">';
  h+='<button class="car-back" onclick="VIEW=\'setting\';render()">← 설정</button>';
  h+='<span class="car-counter">'+(carIdx+1)+' / '+students.length+'</span>';
  h+='<div class="car-nav"><div class="car-nav-btn" onclick="carNav(-1)">‹</div><div class="car-nav-btn" onclick="carNav(1)">›</div></div></div>';
  h+='<div class="car-names">';
  if(prev)h+='<span class="car-name near" onclick="carNav(-1)">'+prev.name+'</span>';
  h+='<span class="car-name active">'+s.name+'</span>';
  if(next)h+='<span class="car-name near" onclick="carNav(1)">'+next.name+'</span>';
  h+='</div></div>';
  h+='<div class="car-body fade-in">';
  h+='<div class="car-stu"><div class="car-av'+(isCopied?' copied':'')+'">'+s.name[0]+'</div><div>';
  h+='<div class="car-sname">'+s.name+'</div>';
  h+='<div class="car-ssub">'+s.gg+' · '+(s.freq||'')+'</div></div></div>';
  if(isCopied)h+='<div class="car-status" style="color:#4ade80">✓ 복사 완료</div>';
  var msg=editingMsg[carIdx]||buildMessage(s);
  h+='<div class="msg-display" id="msgDisp" onclick="enterMsgEdit()">'+highlightMsg(msg,s)+'</div>';
  h+='<div class="msg-edit-hint" id="editHint">탭하여 수정</div>';
  h+='<button class="copy-btn-full '+(isCopied?'done':'ready')+'" onclick="doCopy('+carIdx+')">';
  h+=isCopied?'✓ '+s.name+' 복사 완료':'📋 '+s.name+' 명세서 복사';
  h+='</button></div>';
  Q('app',h);
}

function highlightMsg(msg,s){
  var h=esc(msg);
  h=h.split(esc(s.name)).join('<span class="hl-name">'+esc(s.name)+'</span>');
  h=h.split(esc(s.fee)+'원').join('<span class="hl-money">'+esc(s.fee)+'원</span>');
  return h;
}

function enterMsgEdit(){
  var disp=document.getElementById('msgDisp');
  if(!disp)return;
  var ta=document.createElement('textarea');
  ta.className='msg-edit-area';ta.id='msgTA';ta.value=editingMsg[carIdx];
  ta.style.minHeight='200px';
  ta.addEventListener('input',function(){editingMsg[carIdx]=this.value});
  disp.parentNode.replaceChild(ta,disp);
  var hint=document.getElementById('editHint');
  if(hint)hint.innerHTML='<span onclick="exitMsgEdit()" style="color:#FFD43B;cursor:pointer;font-weight:600">수정 완료 ✓</span>';
  ta.style.height='auto';ta.style.height=Math.max(200,ta.scrollHeight)+'px';
  ta.focus();
}

function exitMsgEdit(){
  var ta=document.getElementById('msgTA');
  if(!ta)return;
  editingMsg[carIdx]=ta.value;
  ta.blur();renderCarousel();
}

function buildMessage(s){
  var m=greeting+'\n━━━━━━━━━━━\n📌 '+selectedMonth+'월 수강료 안내\n';
  m+='• '+s.name+' ('+s.freq+') - '+s.fee+'원\n';
  if(s.materials&&s.materials.length>0){
    var mats=s.materials.filter(function(x){return x.text.trim()});
    if(mats.length>0){
      m+='• 교재비\n';
      mats.forEach(function(x){m+='- '+x.text+'\n'});
      m+='* 교재비는 이체 부탁드립니다🩷\n';
    }
  }
  m+='━━━━━━━━━━━\n💳 납부 안내\n'+payInfo+'\n';
  m+='━━━━━━━━━━━\n🎵 '+selectedMonth+'월 수업 일정\n';
  scheduleItems.forEach(function(item){
    if(item.title.trim()&&item.value.trim())m+='• '+item.title+' - '+item.value+'\n';
  });
  m+=scheduleNote+'\n';
  if(noticeOn&&notice.trim())m+='━━━━━━━━━━━\n📢 공지\n'+notice+'\n';
  m+='━━━━━━━━━━━\n'+closing;
  return m;
}

function carNav(dir){
  var ta=document.getElementById('msgTA');
  if(ta)editingMsg[carIdx]=ta.value;
  var ni=carIdx+dir;
  if(ni>=0&&ni<students.length){carIdx=ni;renderCarousel()}
}

function doCopy(idx){
  var ta=document.getElementById('msgTA');
  if(ta)editingMsg[idx]=ta.value;
  try{navigator.clipboard.writeText(editingMsg[idx])}catch(e){}
  copied.add(idx);
  toast(students[idx].name+' 명세서 복사 완료!');
  setTimeout(function(){
    for(var i=idx+1;i<students.length;i++){
      if(!copied.has(i)){carIdx=i;renderCarousel();return}
    }
    VIEW='summary';render();
  },800);
}

function renderSummary(){
  var totalFee=0,totalMat=0;
  var h='<div class="summary-wrap fade-in">';
  h+='<div class="summary-title">🎉 전체 명세서 완료!</div>';
  students.forEach(function(s){
    var fee=parseInt((s.fee||'0').replace(/,/g,''),10)||0;
    totalFee+=fee;
    var mats=s.materials?s.materials.filter(function(x){return x.text.trim()}):[];
    var matSum=0;
    mats.forEach(function(x){
      var n=x.text.match(/[\d,]+원/);
      if(n)matSum+=parseInt(n[0].replace(/,|원/g,''),10)||0;
    });
    totalMat+=matSum;
    h+='<div class="summary-row">';
    h+='<div><div class="summary-name">'+s.name+' <span style="color:#555;font-size:11px">'+s.freq+'</span></div>';
    if(mats.length>0)h+='<div class="summary-mat">교재비 포함</div>';
    h+='</div>';
    h+='<div class="summary-fee">'+fee.toLocaleString()+'원</div></div>';
  });
  h+='<div class="summary-total">';
  h+='<span class="summary-total-label">수강료 합계</span>';
  h+='<span class="summary-total-val">'+totalFee.toLocaleString()+'원</span></div>';
  if(totalMat>0){
    h+='<div class="summary-total" style="margin-top:8px">';
    h+='<span class="summary-total-label">교재비 합계</span>';
    h+='<span class="summary-total-val" style="color:#f59e0b">'+totalMat.toLocaleString()+'원</span></div>';
  }
  h+='<button class="summary-back" onclick="VIEW=\'setting\';render()">← 설정으로 돌아가기</button>';
  h+='</div>';
  Q('app',h);
}

function Q(id,h){document.getElementById(id).innerHTML=h}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on')},2200)}

switchMode('invoice');
</script>
</body>
</html>
