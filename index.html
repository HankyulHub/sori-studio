<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>소리마을 매니저</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200&display=swap" rel="stylesheet">
<style>
@font-face{
  font-family:'StitchBody';
  src:url('./assets/fonts/Manrope-VariableFont_wght.ttf') format('truetype');
  font-weight:100 900;
  font-style:normal;
  font-display:swap;
}
@font-face{
  font-family:'StitchHeadline';
  src:url('./assets/fonts/NotoSerifKR-VariableFont_wght.ttf') format('truetype');
  font-weight:100 900;
  font-style:normal;
  font-display:swap;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:'StitchBody',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif!important}
body{background:#faf9f6;color:#1a1c1a;max-width:500px;margin:0 auto;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;padding-bottom:92px}
*{font-family:inherit}

h1,h2,h3,h4,h5,h6,.title{font-family:'StitchHeadline',serif!important}

:root{
  --pri:#002046;
  --pri-2:#1b365d;
  --bg:#faf9f6;
  --sc-low:#f4f3f1;
  --sc-lowest:#ffffff;
  --sec:#775a19;
  --sec-fixed:#ffdea5;
  --on:#1a1c1a;
  --on-v:#44474e;
  --ov:rgba(196,198,207,.15);
  --err:#ba1a1a;
  --sh:0 1px 3px rgba(26,28,26,0.04);
}

/* ═══ 공통 ═══ */
.banner{background:var(--bg);padding:18px 20px 14px;border-bottom:none;cursor:pointer;box-shadow:0 1px 0 rgba(196,198,207,.25)}
.banner-row{display:flex;justify-content:space-between;align-items:center}
.logo{font-size:10px;letter-spacing:.18em;color:var(--on-v);font-weight:800;text-transform:uppercase}
.title{font-size:18px;font-weight:800;color:var(--pri);margin-top:4px}
.date{font-size:12px;color:var(--on-v);font-weight:600}
.mode-tabs{display:flex;background:transparent;border-bottom:1px solid rgba(196,198,207,.22)}
.mode-tab{flex:1;padding:12px 0;text-align:center;font-size:13px;font-weight:500;color:#555;cursor:pointer;transition:.2s;position:relative}
.mode-tab:active{background:rgba(244,243,241,.9)}
.mode-tab.active{color:#FFD43B;font-weight:700}
.mode-tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:#FFD43B;border-radius:1px}
.loading{display:flex;flex-direction:column;align-items:center;padding:60px 20px;color:#666;font-size:13px;gap:12px}
.spin{width:22px;height:22px;border:2.5px solid rgba(196,198,207,.55);border-top-color:var(--pri);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(250,249,246,0.92);border:1px solid rgba(196,198,207,.38);color:var(--on);padding:9px 16px;border-radius:12px;font-size:13px;opacity:0;transition:.25s;z-index:99;pointer-events:none;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:0 16px 40px rgba(26,28,26,.10)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease}
.help-btn{width:30px;height:30px;border-radius:999px;background:rgba(255,255,255,.65);border:1px solid rgba(196,198,207,.4);color:var(--pri);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-weight:800;flex-shrink:0;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.help-btn:active{transform:scale(.98)}

/* ═══ 카톡 대본 스타일 ═══ */
.bar{padding:12px 20px;background:transparent;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.bar-info{font-size:12px;color:var(--on-v);font-weight:700}.bar-info b{color:var(--pri)}.bar-info .b-g{color:#1f7a3d}.bar-info .b-o{color:var(--sec)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 16px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:.15s;white-space:nowrap}
.btn:active{transform:scale(0.985)}
.btn-y{background:linear-gradient(45deg,var(--pri),var(--pri-2));color:#fff}
.btn-d{background:#e9e8e5;color:var(--pri);border:none}
.btn:disabled{opacity:.38;cursor:default;transform:none}
.btn-y-full{background:linear-gradient(45deg,var(--pri),var(--pri-2));color:#fff;width:100%;padding:14px;border-radius:14px;font-size:14px;font-weight:800;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.btn-y-full:active{transform:scale(0.97)}
.progress{height:3px;background:rgba(196,198,207,.22)}.progress-fill{height:100%;background:linear-gradient(90deg,var(--pri),var(--pri-2));transition:width .4s}
.gen-bar{padding:10px 20px;background:transparent;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--on-v)}
.gen-bar .spin-s{width:14px;height:14px;border:2px solid rgba(196,198,207,.5);border-top-color:var(--pri);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
.card{padding:14px 20px;border-bottom:none;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.12s}
.card:active{opacity:.88}.card.done-card{opacity:.62}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.av-y{background:var(--sec-fixed);color:#5d4201}
.av-g{background:rgba(31,122,61,.10);color:#1f7a3d;border:1px solid rgba(31,122,61,.22)}
.av-o{background:rgba(119,90,25,.10);color:var(--sec)}
.card-body{flex:1;min-width:0}.card-name{font-size:14px;font-weight:700;color:var(--on)}
.card-kw{font-size:12px;color:var(--on-v);margin-top:3px;display:flex;align-items:center;gap:6px}
.card-kw-label{color:var(--sec);font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;flex-shrink:0}
.card-kw-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.card-st{font-size:11px;flex-shrink:0}
.card-kw-input{width:100%;padding:9px 10px;background:rgba(244,243,241,.9);border:1px solid rgba(196,198,207,.35);border-radius:10px;color:var(--on);font-size:12px;font-family:inherit;outline:none;margin-top:6px}
.card-kw-input:focus{border-color:rgba(0,32,70,.35);box-shadow:0 0 0 3px rgba(0,32,70,.08)}
.inp-wrap{padding:0 20px 10px}
.inp-wrap.done-inp{opacity:.52;pointer-events:none}
.inp-label{display:flex;align-items:center;gap:10px;margin:10px 0 5px}
.inp-num{width:26px;height:26px;border-radius:999px;background:var(--sec-fixed);color:#5d4201;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0}
.inp-num.g{background:rgba(31,122,61,.10);color:#1f7a3d;border:1px solid rgba(31,122,61,.22)}
.inp-num.o{background:rgba(119,90,25,.10);color:var(--sec);border:1px solid rgba(119,90,25,.20)}
.inp-name{font-size:14px;font-weight:500}.inp-gg{font-size:12px;color:#555}
.inp-wrap input{width:100%;padding:12px 12px;background:var(--sc-lowest);border:none;border-radius:12px;color:var(--on);font-size:13px;font-family:inherit;outline:none;box-shadow:var(--sh)}
.inp-wrap input:focus{box-shadow:0 0 0 3px rgba(0,32,70,.10),var(--sh)}
.inp-wrap input::placeholder{color:rgba(68,71,78,.65)}
.inp-wrap input.review-input{border-color:#f59e0b;color:#f59e0b;pointer-events:none}
.det-head{padding:12px 16px;background:transparent;border-bottom:none}
.det-row1{display:flex;align-items:center;justify-content:space-between}
.det-nav{display:flex;gap:5px}
.nav-b{width:34px;height:34px;border-radius:999px;background:rgba(255,255,255,.7);border:1px solid rgba(196,198,207,.45);color:var(--pri);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.nav-b:active{transform:scale(.98)}
.carousel{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 0 4px;overflow:hidden}
.car-name{font-size:12px;color:rgba(68,71,78,.72);transition:all .25s;white-space:nowrap;cursor:pointer;flex-shrink:0}
.car-name.active{font-size:15px;color:var(--pri);font-weight:800}
.car-name.near{font-size:12px;color:rgba(68,71,78,.55)}
@keyframes carSlide{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.car-anim{animation:carSlide .25s ease}
.det-body{padding:16px 20px}
.det-stu{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.det-av{width:40px;height:40px;border-radius:999px;background:var(--sec-fixed);color:#5d4201;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900}
.det-name{font-size:16px;font-weight:900;color:var(--pri)}
.det-sub{font-size:12px;color:var(--on-v);margin-top:2px}
.regen-tag{font-size:11px;margin-bottom:8px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;transition:.15s}
.regen-tag:active{opacity:.7}
.regen-wait{font-size:11px;color:#888;display:inline-flex;align-items:center;gap:4px;margin-bottom:8px}
.regen-wait .spin-s{width:12px;height:12px;border:2px solid rgba(196,198,207,.55);border-top-color:var(--pri);border-radius:50%;animation:sp .7s linear infinite}
.msg-area{width:100%;padding:14px;background:var(--sc-lowest);border:none;border-radius:14px;color:var(--on);font-size:13.5px;line-height:1.75;font-family:inherit;outline:none;resize:none;min-height:220px;margin-bottom:14px;box-shadow:var(--sh)}
.msg-area:focus{box-shadow:0 0 0 3px rgba(0,32,70,.10),var(--sh)}
.msg-area.done{background:rgba(31,122,61,.08);box-shadow:0 0 0 1px rgba(31,122,61,.18),var(--sh);color:var(--on)}
.det-btns{display:flex;gap:8px}.det-btns .btn{flex:1;padding:12px;font-size:13px}
.sent-badge{font-size:11px;color:#4ade80;padding:6px 0;text-align:center;margin-bottom:8px}
.short-warn{font-size:11px;color:#f59e0b;padding:4px 0;margin-bottom:6px}
.resume-bar{padding:12px 20px;background:transparent;border-bottom:1px solid rgba(196,198,207,.22);display:flex;align-items:center;justify-content:space-between}
.resume-bar span{font-size:12px;color:var(--on-v);font-weight:700}
.msg-display{width:100%;padding:14px;background:var(--sc-lowest);border:none;border-radius:14px;color:var(--on);font-size:13.5px;line-height:1.75;min-height:220px;margin-bottom:14px;white-space:pre-wrap;word-break:break-word;-webkit-user-select:none;user-select:none;box-shadow:var(--sh)}
.msg-display.done{background:rgba(31,122,61,.08);box-shadow:0 0 0 1px rgba(31,122,61,.18),var(--sh);color:var(--on)}
.msg-edit-hint{font-size:11px;color:#555;text-align:center;margin:-8px 0 10px}
.sec-header{padding:16px 20px 10px;display:flex;align-items:center;gap:10px;border-bottom:none}
.sec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sec-dot-y{background:var(--sec-fixed)}
.sec-dot-g{background:rgba(31,122,61,.35)}
.sec-dot-o{background:rgba(119,90,25,.35)}
.sec-label{font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;flex-shrink:0}
.sec-label-y{color:var(--sec)}.sec-label-g{color:#1f7a3d}.sec-label-o{color:var(--sec)}
.sec-count{font-size:11px;color:rgba(68,71,78,.75);font-weight:700}
.sec-line{flex:1;height:1px;background:rgba(196,198,207,.22)}
.modal-dim{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.35);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;pointer-events:none;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.modal-dim.on{opacity:1;pointer-events:auto}
.modal-dim.modal-dim--closing{pointer-events:auto}
.modal-card{background:rgba(250,249,246,0.86);border:1px solid rgba(196,198,207,.35);border-radius:18px;padding:24px 20px 20px;width:calc(100% - 48px);max-width:340px;transform:scale(0.95) translateY(10px);transition:transform .25s cubic-bezier(0.34,1.56,0.64,1);text-align:center;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 16px 45px rgba(26,28,26,.12)}
.modal-dim.on .modal-card{transform:scale(1) translateY(0)}
/* 명세서 목록 모달: 화면 높이 안에서만 스크롤 */
.modal-card.modal-card--list{max-height:min(78vh, 520px);display:flex;flex-direction:column;overflow:hidden;text-align:left;padding:14px 12px 12px;width:calc(100% - 32px);max-width:min(380px, 100vw - 32px)}
.modal-card--list .modal-icon{text-align:center;font-size:22px;margin-bottom:4px}
.modal-card--list .modal-title{text-align:center;margin-bottom:2px}
.modal-card--list .modal-desc{text-align:center;margin-bottom:8px;font-size:11px;line-height:1.45}
.modal-card--list .inv-list-head{flex-shrink:0;margin:6px 0 8px}
.inv-list-scroll{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:0 2px 4px 0}
.inv-list-scroll::-webkit-scrollbar{width:4px}
.inv-list-scroll::-webkit-scrollbar-thumb{background:rgba(196,198,207,.55);border-radius:999px}
.modal-card--list .modal-btns{display:flex;gap:8px}.modal-card--list .modal-btns .btn{flex:1;padding:11px;font-size:13px}
.modal-card--list .modal-btns{margin-top:10px;flex-shrink:0}
.modal-icon{font-size:28px;margin-bottom:10px}
.modal-title{font-size:15px;font-weight:900;color:var(--pri);margin-bottom:6px}
.modal-desc{font-size:12.5px;color:var(--on-v);line-height:1.6;margin-bottom:6px}
.modal-names{font-size:12px;color:var(--sec);background:rgba(255,222,165,0.55);border-radius:10px;padding:10px 12px;margin:10px 0 18px;line-height:1.5;max-height:80px;overflow-y:auto}
.modal-btns{display:flex;gap:8px}.modal-btns .btn{flex:1;padding:12px;font-size:13px}
@keyframes slideL{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
.slide{animation:slideL .3s ease}

/* ═══ Tutorial ═══ */
.tut-dim{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.78);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;pointer-events:none;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.tut-dim.on{opacity:1;pointer-events:auto}
.tut-box{width:calc(100% - 48px);max-width:360px;text-align:center;padding:32px 24px 24px;overflow:hidden}
@keyframes tutSlideLeft{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
@keyframes tutSlideRight{from{opacity:0;transform:translateX(-60px)}to{opacity:1;transform:translateX(0)}}
.tut-slide-left{animation:tutSlideLeft .25s ease}
.tut-slide-right{animation:tutSlideRight .25s ease}
.tut-emoji{font-size:48px;margin-bottom:16px}
.tut-step{font-size:11px;color:var(--sec-fixed);font-weight:900;letter-spacing:.18em;margin-bottom:8px;text-transform:uppercase}
.tut-title{font-size:18px;font-weight:900;color:#fff;margin-bottom:10px;line-height:1.4}
.tut-desc{font-size:12px;color:rgba(255,255,255,.78);line-height:1.7;margin-bottom:8px}
.tut-example{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:12px 16px;margin:12px 0 20px;text-align:left}
.tut-example-label{font-size:10px;color:#FFD43B;font-weight:600;letter-spacing:1px;margin-bottom:6px}
.tut-example-text{font-size:11.5px;color:rgba(255,255,255,.82);line-height:1.6}
.tut-dots{display:flex;justify-content:center;gap:8px;margin-bottom:20px}
.tut-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.22);transition:.2s}
.tut-dot.on{background:#FFD43B;width:20px}
.tut-btns{display:flex;gap:8px}
.tut-btns .btn{flex:1;padding:13px;font-size:13px}
.tut-skip{font-size:11px;color:#555;margin-top:14px;cursor:pointer}
.tut-skip:active{color:#888}

/* ═══ 명세서 스타일 ═══ */
.section{border-bottom:none}
.section-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:.1s}
.section-header:active{opacity:.88}
.section-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
.section-dot{width:7px;height:7px;border-radius:50%;background:#FFD43B;flex-shrink:0}
.section-badge{font-size:11px;color:#888;font-weight:400;margin-left:4px}
.section-arrow{font-size:14px;color:#555;transition:transform .2s}
.section-arrow.open{transform:rotate(180deg)}
.section-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.section-body.open{max-height:3000px}
.section-inner{padding:0 20px 16px}
.month-sel{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.month-chip{padding:7px 14px;border-radius:999px;font-size:12px;font-weight:800;cursor:pointer;border:1px solid rgba(196,198,207,.45);background:rgba(255,255,255,.7);color:var(--on-v);transition:.15s;font-family:inherit;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.month-chip:active{transform:scale(.95)}
.month-chip.active{background:rgba(0,32,70,.08);color:var(--pri);border-color:rgba(0,32,70,.22)}
.greeting-box{background:var(--sc-lowest);border:1px solid rgba(196,198,207,.32);border-radius:14px;padding:14px;color:var(--on);font-size:13px;line-height:1.7;white-space:pre-wrap;min-height:60px;outline:none;transition:border-color .2s;box-shadow:var(--sh)}
.greeting-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.chip-btn{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.chip-btn:active{transform:scale(.95)}
.chip-btn-o{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.2)}
.chip-btn-g{background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.2)}
.chip-btn-d{background:#e9e8e5;color:var(--pri);border:none}
.stu-item{margin:0;border-bottom:1px solid rgba(196,198,207,.22)}
.stu-item:last-child{border-bottom:none}
.stu-row{padding:12px 0;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.1s}
.stu-row:active{opacity:.8}
.stu-av{width:30px;height:30px;border-radius:50%;background:#FFD43B;color:var(--on);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.stu-name{font-size:14px;font-weight:500;flex:1}
.stu-summary{font-size:12px;color:#666;margin-left:auto;flex-shrink:0}
.stu-arrow{font-size:12px;color:#444;flex-shrink:0;transition:transform .2s}
.stu-arrow.open{transform:rotate(90deg)}
.stu-detail{max-height:0;overflow:hidden;transition:max-height .25s ease;padding:0 0 0 40px}
.stu-detail.open{max-height:600px}
.stu-detail-inner{padding:4px 0 12px}
.fee-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.fee-chip{padding:7px 14px;border-radius:999px;font-size:12px;font-weight:800;cursor:pointer;border:1px solid rgba(196,198,207,.38);background:rgba(255,255,255,.7);color:var(--on-v);transition:.15s;font-family:inherit;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.fee-chip:active{transform:scale(.95)}
.fee-chip.selected{background:rgba(255,212,59,.12);color:#FFD43B;border-color:rgba(255,212,59,.3)}
.mat-quick{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-top:8px}
.mat-quick-label{font-size:11px;color:#666;flex-shrink:0}
.mat-quick-btn{padding:6px 10px;border-radius:999px;font-size:11px;font-weight:800;cursor:pointer;border:1px solid rgba(196,198,207,.40);background:rgba(255,255,255,.75);color:var(--on-v);font-family:inherit}
.mat-quick-btn:active{transform:scale(.96)}
.mat-quick-btn.selected{background:rgba(255,212,59,.12);color:#FFD43B;border-color:rgba(255,212,59,.28)}
.fee-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.fee-label{font-size:12px;color:#888;width:50px;flex-shrink:0}

.inv-car-status{font-size:11px;padding:4px 0;margin-bottom:8px}
.inv-rev-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#0d1a0d;border:1px solid rgba(22,163,74,.35);border-radius:10px;padding:10px 12px;margin:10px 0 10px}

.inv-list-head{display:flex;gap:6px;margin:6px 0 10px}

.inv-msg-display{width:100%;padding:14px;background:var(--sc-lowest);border:1px solid rgba(196,198,207,.30);border-radius:14px;color:var(--on);font-size:13px;line-height:1.8;min-height:200px;margin-bottom:6px;white-space:pre-wrap;word-break:break-word;cursor:pointer;transition:border-color .2s;box-shadow:var(--sh)}

.inv-car-actions{display:flex;flex-direction:column;gap:10px;margin-top:4px}

.summary-wrap{padding:20px}

@keyframes stuSlideLeft{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes stuSlideRight{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
.stu-slide-left{animation:stuSlideLeft .2s ease}
.stu-slide-right{animation:stuSlideRight .2s ease}
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;display:flex;background:rgba(250,249,246,0.82);border-top:1px solid rgba(196,198,207,.22);z-index:60;padding:8px 0 max(10px,env(safe-area-inset-bottom));backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 -18px 40px rgba(26,28,26,.08)}
.tabbar-item{flex:1;padding:7px 2px 6px;text-align:center;font-size:10px;color:#74777f;cursor:pointer;border:none;background:transparent;font-family:inherit;line-height:1.15;font-weight:800;letter-spacing:.08em;text-transform:uppercase;position:relative;transition: background 0.15s}

/* 폰트(타이틀/숫자 강조) */
.home3-w1,.home3-cta-title,.home3-sec-title,.home3-alert-title,.home3-stat-num,.home3-money,.title{font-family:'StitchHeadline',serif!important}

/* 홈(대시보드 v3) */
.home3-wrap{padding:18px 20px 10px}
.home3-welcome{margin:6px 0 18px}
.home3-w1{font-size:32px;font-weight:800;color:var(--pri);letter-spacing:-0.02em;line-height:1.12}
.home3-w2{font-size:14px;color:var(--on-v);font-weight:600;margin-top:8px;line-height:1.45}
.home3-grid2{display:grid;grid-template-columns:1fr;gap:12px}
.home3-cta{border-radius:18px;padding:18px 16px;box-shadow:0 20px 50px rgba(26,28,26,.08);cursor:pointer;transition:transform .18s ease,box-shadow .18s ease}
.home3-cta:active{transform:scale(.99)}
.home3-cta--pri{background:linear-gradient(45deg,var(--pri),var(--pri-2));color:#fff}
.home3-cta--sec{background:var(--sc-lowest);color:var(--pri);border:1px solid rgba(196,198,207,.10)}
.home3-cta-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
.home3-cta-ic{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.home3-cta--pri .home3-cta-ic{background:rgba(255,255,255,.10)}
.home3-cta--sec .home3-cta-ic{background:rgba(0,32,70,.06)}
.home3-cta-ic .ms{font-size:26px;line-height:1}
.home3-cta--pri .home3-cta-ic .ms{color:#dec482;font-variation-settings:'FILL' 1,'wght' 650,'opsz' 24,'GRAD' 0}
.home3-cta--sec .home3-cta-ic .ms{color:var(--pri);font-variation-settings:'FILL' 1,'wght' 650,'opsz' 24,'GRAD' 0}
.home3-cta-title{font-size:20px;font-weight:900;letter-spacing:-0.01em}
.home3-cta-desc{margin-top:10px;font-size:14px;line-height:1.55;font-weight:650}
.home3-cta--pri .home3-cta-desc{color:#87a0cd}
.home3-cta--sec .home3-cta-desc{color:var(--on-v)}
.home3-cta-foot{margin-top:14px;font-size:14px;font-weight:900}
.home3-cta--pri .home3-cta-foot{color:#dec482}
.home3-cta--sec .home3-cta-foot{color:var(--pri)}
.home3-section{margin-top:40px}
.home3-sec-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
.home3-sec-title{font-size:13px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:rgba(68,71,78,.78)}

.home3-alert{display:flex;gap:12px;align-items:flex-start}
.home3-ic{width:34px;height:34px;border-radius:999px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.home3-ic--err{background:#ffdad6;color:var(--err)}
.home3-ic--sec{background:#fed488;color:#775a19}
.home3-ic .ms{font-size:20px;font-variation-settings:'FILL' 1,'wght' 650,'opsz' 24,'GRAD' 0}
.home3-alert-main{flex:1;min-width:0}
.home3-alert-title{font-size:14px;font-weight:900;color:var(--pri)}
.home3-alert-desc{font-size:12.5px;color:rgba(68,71,78,.78);margin-top:4px;line-height:1.45}
.home3-alert-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.home3-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 12px;border-radius:14px;font-size:12px;font-weight:900;border:1px solid rgba(196,198,207,.35);background:rgba(244,243,241,.7);color:var(--pri);cursor:pointer}
.home3-btn:active{transform:scale(.99)}
.home3-btn--pri{border:none;background:linear-gradient(45deg,var(--pri),var(--pri-2));color:#fff}
.home3-btn .ms{font-size:18px}
.home3-stats{display:grid;grid-template-columns:1fr;gap:12px}

.home3-stat--dark{background:linear-gradient(45deg,var(--pri),var(--pri-2));color:#fff}
.home3-stat-label{font-size:10px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;opacity:.68}
.home3-stat-num{margin-top:10px;font-size:32px;font-weight:900;letter-spacing:-0.02em}
.home3-stat-sub{margin-top:4px;font-size:13px;font-weight:700;opacity:.68}

.home3-money{font-size:24px;font-weight:900;color:var(--pri);letter-spacing:-0.02em;margin-top:10px}
.home3-money-sub{margin-top:6px;font-size:10px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:rgba(0,32,70,.45)}

.home3-bars{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.home3-barrow{display:flex;align-items:center;gap:10px}
.home3-bar-l{width:34px;font-size:11px;color:rgba(68,71,78,.8);font-weight:900}
.home3-bar{flex:1;height:10px;border-radius:999px;background:rgba(244,243,241,.95);overflow:hidden}
.home3-bar > div{height:100%;border-radius:999px}
.home3-bar--cur{background:linear-gradient(45deg,var(--pri),var(--pri-2))}
.home3-bar--prev{background:rgba(196,198,207,.55)}
.home3-bar-v{width:64px;text-align:right;font-size:11px;color:rgba(68,71,78,.75);font-weight:900}

<script>
// ═══════════════════════════════════════
// 공통 설정
// ═══════════════════════════════════════
var API_URL='https://script.google.com/macros/s/AKfycbzW7VPXPRW0Ltf8ws_1xtdLM0rceMsumj7oi6bLD3jSjOCtYG8_WYGAqjd_UyRjPrQ1/exec';
var IS_TEST=true;
var MODE='home';
var APP_DATA=null,APP_LOADING=false;
var HOME_RENDERED=false;

function apiGet(action,params){
  // params: {key:value} 형태로 추가 쿼리 파라미터 전송
  var url=API_URL+'?action='+action;
  if(IS_TEST)url+='&test=1';
  if(params){
    for(var k in params){
      if(params[k]===undefined||params[k]===null)continue;
      url+='&'+encodeURIComponent(k)+'='+encodeURIComponent(params[k]);
    }
  }
  return fetch(url).then(function(r){return r.json()}).then(function(j){if(!j.ok)throw new Error(j.error);return j.data});
}
function apiPost(action,body){
  body.action=action;
  // POST에서도 test 쿼리를 같이 보내야 doPost(e)에서 isTest가 확실히 갈라집니다.
  var url=API_URL+(IS_TEST?'?test=1':'');
  if(IS_TEST)body.test='1'; // 호환용(백엔드가 body.test를 읽도록 바꿀 수도 있으니 유지)
  return fetch(url,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)})
    .then(function(r){return r.json()}).then(function(j){if(!j.ok)throw new Error(j.error);return j.data});
}
function Q(id,h){document.getElementById(id).innerHTML=h}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on')},2500)}

function showModal(html,isList){
  var m=document.getElementById('modal');
  var card=document.getElementById('modalCard');
  if(m._modalCloseEnd){
    m.removeEventListener('transitionend',m._modalCloseEnd);
    m._modalCloseEnd=null;
  }
  m.classList.remove('modal-dim--closing');
  card.innerHTML=html;
  if(isList){card.classList.add('modal-card--list');}else{card.classList.remove('modal-card--list');}
  m.classList.add('on');
}
function closeModal(done){
  var m=document.getElementById('modal');
  var card=document.getElementById('modalCard');
  if(m._modalCloseEnd){
    m.removeEventListener('transitionend',m._modalCloseEnd);
    m._modalCloseEnd=null;
  }
  var wasOpen=m.classList.contains('on');
  m.classList.add('modal-dim--closing');
  m.classList.remove('on');
  if(!wasOpen){
    m.classList.remove('modal-dim--closing');
    card.classList.remove('modal-card--list');
    if(typeof done==='function')done();
    return;
  }
  function end(e){
    if(e.target!==m||e.propertyName!=='opacity')return;
    m.removeEventListener('transitionend',end);
    m._modalCloseEnd=null;
    m.classList.remove('modal-dim--closing');
    card.classList.remove('modal-card--list');
    if(typeof done==='function')done();
  }
  m._modalCloseEnd=end;
  m.addEventListener('transitionend',end);
}

var now=new Date();
document.getElementById('headerDate').textContent=now.getFullYear()+'년 '+(now.getMonth()+1)+'월';

function goHomeBanner(){
  if(MODE==='home')home_render();
  else if(MODE==='kakao')kk_goHome();
  else if(MODE==='invoice')invGoHome();
  else if(MODE==='stu')stu_render();
  else if(MODE==='pay')pay_render();
}

function appLoadInitFallback(){
  return Promise.all([
    apiGet('loadStudents'),
    apiGet('loadInvoiceStudents',{year:inv_targetYear,month:inv_selectedMonth}),
    apiGet('loadPaymentStatus',{year:pay_year,month:pay_month}),
    apiGet('getRevenueStats')
  ]).then(function(arr){
    return{
      students:arr[0]||[],
      invoiceStudents:arr[1]||[],
      paymentStatus:arr[2]||null,
      revenueStats:arr[3]||null
    };
  });
}
function appMergeCacheFromData(data){
  APP_DATA=data;
  kk_KW={};
  kk_PrevKW={};
  kk_MSG={};
  kk_DONE=new Set();
  kk_S=data.students||[];
  kk_S.forEach(function(s){
    if(s.kw)kk_KW[s.row]=s.kw;
    kk_PrevKW[s.row]=s.prevKw||'';
    if(s.msg)kk_MSG[s.row]=s.msg;
    if(s.done)kk_DONE.add(s.row);
  });
  kk_loaded=true;
  inv_students=data.invoiceStudents||[];
  inv_loaded=true;
  stu_list=data.students||[];
  stu_loaded=true;
  pay_status=data.paymentStatus||null;
  pay_stats=data.revenueStats||null;
  pay_loaded=true;
}
function appApplyInitData(data){
  APP_LOADING=false;
  appMergeCacheFromData(data);
  if(MODE==='home'){home_render();}
  else if(MODE==='kakao'){kk_rInput();kk_checkFirstRun();}
  else if(MODE==='invoice')inv_render();
  else if(MODE==='stu')stu_render();
  else if(MODE==='pay')pay_render();
  else if(MODE==='att')att_render();
  else if(MODE==='more')more_render();
}
function stu_softReloadFromServer(){
  return appLoadInitFallback().then(appMergeCacheFromData);
}
var APP_CACHE_VER=1;
function appCacheKey(){
  return 'sori_app_'+APP_CACHE_VER+'_'+(IS_TEST?'t':'m')+'_'+inv_targetYear+'_'+inv_selectedMonth+'_'+pay_year+'_'+pay_month;
}
function appReadCache(){
  try{
    var raw=localStorage.getItem(appCacheKey());
    if(!raw)return null;
    var o=JSON.parse(raw);
    if(!o||!o.data)return null;
    return o.data;
  }catch(e){return null;}
}
function appWriteCache(data){
  try{
    localStorage.setItem(appCacheKey(),JSON.stringify({v:APP_CACHE_VER,data:data,ts:Date.now()}));
  }catch(e){}
}
function appInit(){
  var cached=appReadCache();
  var hadCache=!!cached;
  if(cached){
    APP_LOADING=false;
    appMergeCacheFromData(cached);
    if(MODE==='home')home_render();
    else if(MODE==='kakao'){kk_rInput();kk_checkFirstRun();}
    else if(MODE==='invoice')inv_render();
    else if(MODE==='stu')stu_render();
    else if(MODE==='pay')pay_render();
    else if(MODE==='att')att_render();
    else if(MODE==='more')more_render();
  }else{
    APP_LOADING=true;
    Q('app','<div class="loading"><div class="spin"></div>불러오는 중...</div>');
  }
  var params={
    year:inv_targetYear,
    month:inv_selectedMonth,
    payYear:pay_year,
    payMonth:pay_month
  };
  apiGet('loadAll',params).catch(function(){
    return appLoadInitFallback();
  }).then(function(data){
    if(!data)return;
    appWriteCache(data);
    appApplyInitData(data);
  }).catch(function(e){
    APP_LOADING=false;
    if(!hadCache){
      Q('app','<div style="padding:20px;color:#f87171;font-size:13px">연결 실패: '+esc(e&&e.message?e.message:String(e))+'</div>');
    }else{
      toast('최신 정보를 불러오지 못했어요');
    }
  });
}

function switchTab(m){
  MODE=m;
  document.getElementById('tabHome').classList.toggle('active',m==='home');
  document.getElementById('tabKakao').classList.toggle('active',m==='kakao');
  document.getElementById('tabStu').classList.toggle('active',m==='stu');
  document.getElementById('tabInv').classList.toggle('active',m==='invoice');
  document.getElementById('tabMore').classList.toggle('active',m==='more');
  document.getElementById('helpBtn').style.display=(m==='kakao'?'flex':'none');
  var titles={home:'홈',kakao:'메시지',stu:'학생',invoice:'명세서',more:'더보기',att:'출결 · 시간표',pay:'매출 장부'};
  document.getElementById('bannerTitle').textContent=titles[m]||'소리마을 매니저';
  if(!APP_DATA){appInit();return;}
  if(m==='home')home_render();
  else if(m==='stu')stu_render();
  else if(m==='att')att_render();
  else if(m==='kakao'){kk_rInput();kk_checkFirstRun();}
  else if(m==='invoice')inv_render();
  else if(m==='pay')pay_render();
  else if(m==='more')more_render();
}

function home_goFeedback(){
  switchTab('kakao');
  setTimeout(function(){try{window.scrollTo(0,0)}catch(e){}},0);
}
function home_goNotice(){
  switchTab('kakao');
  setTimeout(function(){try{window.scrollTo(0,0)}catch(e){}},0);
}
function home_openUnpaidList(){
  var ps=(APP_DATA&&APP_DATA.paymentStatus)?APP_DATA.paymentStatus:null;
  var list=(ps&&ps.students)?ps.students.filter(function(s){return !s.paid}):[];
  if(!list.length){toast('미납 항목이 없습니다');return;}
  var names=list.slice(0,12).map(function(s){return esc(s.name)}).join('<br>');
  var more=list.length>12?('<br>외 '+(list.length-12)+'명'):''; 
  showModal('<div class="modal-title">미납 안내 ('+list.length+'건)</div><div class="modal-desc">아래 학생의 수업료 결제일이 지났습니다.</div><div class="modal-names">'+names+more+'</div><div class="modal-btns"><button class="btn btn-d" onclick="closeModal()">닫기</button><button class="btn btn-y" onclick="closeModal();switchTab(\'kakao\')">독촉 안내문 쓰기</button></div>');
}
function home_render(){
  var ps=(APP_DATA&&APP_DATA.paymentStatus)?APP_DATA.paymentStatus:null;
  var unpaidList=(ps&&ps.students)?ps.students.filter(function(s){return !s.paid}):[];
  var unpaidN=unpaidList.length;

  var totalInv=(typeof inv_students!=='undefined'&&Array.isArray(inv_students)&&inv_students.length)?inv_students.length:50;
  var sentN=Math.min(45,totalInv);
  var unsentN=Math.max(0,totalInv-sentN);

  var cur=(pay_stats&&pay_stats.current)?pay_stats.current:null;
  var money=(cur&&typeof cur.total==='number')?cur.total:12450000;

  var h='';
  h+='<div class="home3-wrap'+(HOME_RENDERED?'':' fade-in')+'">';
  h+='<div class="home3-welcome">';
  h+='<div class="home3-w1">반갑습니다, 원장님.</div>';
  h+='<div class="home3-w2">오늘도 예술적인 하루가 되길 바랍니다.</div>';
  h+='</div>';

var kk_S=[],kk_KW={},kk_PrevKW={},kk_MSG={},kk_SHORT={},kk_DONE=new Set(),kk_REGEN=new Set(),kk_EDITED=new Set();
var kk_CI=0,kk_CANCEL=false,kk_EDITMODE=false,kk_VIEW='input',kk_GEN=false,kk_GC=0,kk_GT=0,kk_GEN_TG=[];
var kk_loaded=false;
var kk_doneFolded=true;

function kk_init(){
  if(APP_DATA&&APP_DATA.students){
    kk_S=APP_DATA.students||[];
    kk_S.forEach(function(s){if(s.kw)kk_KW[s.row]=s.kw;kk_PrevKW[s.row]=s.prevKw||'';if(s.msg)kk_MSG[s.row]=s.msg;if(s.done)kk_DONE.add(s.row)});
    kk_loaded=true;
    if(MODE!=='kakao')return;
    kk_rInput();
    kk_checkFirstRun();
    return;
  }
  Q('app','<div class="loading"><div class="spin"></div>학생 목록 불러오는 중...</div>');
  apiGet('loadStudents').then(function(data){
    kk_S=data||[];
    kk_S.forEach(function(s){if(s.kw)kk_KW[s.row]=s.kw;kk_PrevKW[s.row]=s.prevKw||'';if(s.msg)kk_MSG[s.row]=s.msg;if(s.done)kk_DONE.add(s.row)});
    kk_loaded=true;
    if(MODE!=='kakao')return;
    kk_rInput();
    kk_checkFirstRun();
  }).catch(function(e){
    if(MODE!=='kakao')return;
    Q('app','<div style="padding:20px;color:#f87171;font-size:13px;">연결 실패: '+e.message+'</div>');
  });
}

function kk_hasMsg(){return kk_S.some(function(s){return kk_MSG[s.row]})}
function kk_isReview(s){return!kk_DONE.has(s.row)&&kk_MSG[s.row]&&kk_MSG[s.row].trim()}
function kk_isUngen(s){return!kk_DONE.has(s.row)&&(!kk_MSG[s.row]||!kk_MSG[s.row].trim())}
function kk_toggleDoneFold(){

function kk_kwCh(row,v){
  kk_KW[row]=v;
  var pending=kk_S.filter(function(s){return!kk_DONE.has(s.row)});
  var genableCount=pending.filter(function(s){return(kk_KW[s.row]||'').trim()}).length;
  var b=document.getElementById('kk_gbtn');if(b)b.disabled=genableCount===0;
}

function kk_tryGenAll(){
  var targets=kk_S.filter(function(s){return(kk_KW[s.row]||'').trim()&&!kk_DONE.has(s.row)});
  var existing=targets.filter(function(s){return kk_MSG[s.row]&&kk_MSG[s.row].trim()});
  if(existing.length>0){
    var names=existing.map(function(s){return s.name}).join(', ');
    var newOnly=targets.filter(function(s){return!(kk_MSG[s.row]&&kk_MSG[s.row].trim())});
    showModal('<div class="modal-icon">📝</div><div class="modal-title">이미 생성된 메시지가 있습니다</div><div class="modal-desc">아래 '+existing.length+'명은 이미 AI 메시지가 있어요.<br>새로 생성하면 기존 메시지가 사라집니다.</div><div class="modal-names">'+esc(names)+'</div><div class="modal-btns"><button class="btn btn-d" onclick="closeModal();kk_genAllSkip()">'+(newOnly.length>0?'새 학생만 생성 ('+newOnly.length+'명)':'취소')+'</button><button class="btn btn-y" onclick="closeModal();kk_genAllOverwrite()">전체 다시 생성</button></div>');
  }else{kk_genAllOverwrite()}
}

function kk_genAllOverwrite(){
  kk_CANCEL=false;kk_GEN=true;kk_REGEN.clear();
  kk_GEN_TG=kk_S.filter(function(s){return(kk_KW[s.row]||'').trim()&&!kk_DONE.has(s.row)});
  if(!kk_GEN_TG.length){kk_GEN=false;kk_rList();return}
  kk_GEN_TG.forEach(function(s){delete kk_MSG[s.row];delete kk_SHORT[s.row]});
  kk_GT=kk_GEN_TG.length;kk_GC=0;
  apiPost('saveKeywords',{updates:kk_GEN_TG.map(function(s){return{row:s.row,kw:kk_KW[s.row]}})});
  kk_rList();kk_runGen(0);
}

function kk_genAllSkip(){
  kk_CANCEL=false;kk_GEN=true;kk_REGEN.clear();
  kk_GEN_TG=kk_S.filter(function(s){return(kk_KW[s.row]||'').trim()&&!kk_DONE.has(s.row)&&!(kk_MSG[s.row]&&kk_MSG[s.row].trim())});
  if(!kk_GEN_TG.length){kk_GEN=false;toast('새로 생성할 학생이 없습니다');kk_rList();return}
  kk_GEN_TG.forEach(function(s){delete kk_MSG[s.row];delete kk_SHORT[s.row]});
  kk_GT=kk_GEN_TG.length;kk_GC=0;
  apiPost('saveKeywords',{updates:kk_GEN_TG.map(function(s){return{row:s.row,kw:kk_KW[s.row]}})});
  kk_rList();kk_runGen(0);
}

function kk_resumeGen(){
  kk_GEN_TG=kk_S.filter(function(s){return(kk_KW[s.row]||'').trim()&&!kk_DONE.has(s.row)&&!kk_MSG[s.row]});
  if(!kk_GEN_TG.length){toast('생성할 학생이 없습니다');return}
  kk_CANCEL=false;kk_GEN=true;kk_GT=kk_GEN_TG.length;kk_GC=0;
  kk_rList();kk_runGen(0);
}

function kk_runGen(idx){
  if(kk_CANCEL||!kk_GEN){kk_GEN=false;kk_updGB();if(!kk_hasMsg())kk_rInput();return}
  if(idx>=kk_GEN_TG.length){kk_GEN=false;kk_GC=0;kk_GT=0;kk_updGB();return}
  var s=kk_GEN_TG[idx];
  if(kk_REGEN.has(s.row)||kk_MSG[s.row]){kk_runGen(idx+1);return}
  kk_GC=idx+1;kk_updGB();
  apiPost('generateKakao',{name:s.name,gg:s.gg,kw:kk_KW[s.row],hist:s.hist}).then(function(m){
    if(kk_CANCEL){kk_GEN=false;if(!kk_hasMsg())kk_rInput();return}
    if(m.indexOf('[SHORT]')===0){kk_SHORT[s.row]=true;m=m.substring(7)}
    kk_MSG[s.row]=m;
    apiPost('saveMessage',{row:s.row,text:m});
    if(kk_VIEW==='list')kk_refreshCards();
    if(kk_VIEW==='detail'){kk_updDetCounter();toast(s.name+' 생성 완료 ✓')}
    kk_runGen(idx+1);
  }).catch(function(e){
    if(kk_CANCEL){kk_GEN=false;return}
    kk_MSG[s.row]='[실패: '+e.message+']';
    if(kk_VIEW==='list')kk_refreshCards();
    kk_runGen(idx+1);
  });
}

function kk_updGB(){
  var el=document.getElementById('kk_genBar');if(!el)return;
  if(!kk_GEN||kk_GT===0){el.style.display='none';return}
  el.style.display='flex';
  el.innerHTML='<div class="spin-s"></div>'+kk_GC+'/'+kk_GT+'명 생성 중...<button class="btn btn-d" onclick="kk_CANCEL=true;kk_GEN=false;kk_updGB();kk_refreshCards()" style="padding:4px 10px;font-size:11px;margin-left:auto">취소</button>';
}

function kk_updDetCounter(){
  var gl=kk_S.filter(function(x){return kk_MSG[x.row]});
  var s=kk_S[kk_CI],el=document.getElementById('kk_detCount');
  if(el){var pos=gl.findIndex(function(x){return x.row===s.row})+1;el.textContent=pos+' / '+gl.length}
  var car=document.getElementById('kk_carousel');
  if(car)car.innerHTML=kk_buildCarousel(true);
}

function kk_refreshCards(){
  var cl=document.getElementById('kk_cardList');if(cl)cl.innerHTML=kk_buildSectionedCards(kk_EDITMODE);
  var reviewList=kk_S.filter(function(s){return kk_isReview(s)});
  var ungenList=kk_S.filter(function(s){return(kk_KW[s.row]||'').trim()&&kk_isUngen(s)});
  var doneList=kk_S.filter(function(s){return kk_DONE.has(s.row)});
  var total=reviewList.length+ungenList.length+doneList.length;
  var pct=total?Math.round(doneList.length/total*100):0;
  var info=document.querySelector('.bar-info');
  if(info){
    var parts=[];
    if(ungenList.length>0)parts.push('미생성 <b>'+ungenList.length+'</b>명');
    if(reviewList.length>0)parts.push('검수대기 <b class="b-o">'+reviewList.length+'</b>명');
    if(doneList.length>0)parts.push('복사완료 <b class="b-g">'+doneList.length+'</b>명');
    info.innerHTML=parts.join(' · ');
  }
  var prog=document.querySelector('.progress-fill');if(prog)prog.style.width=pct+'%';
  var rb=document.getElementById('kk_resumeBar');
  var remaining=kk_S.filter(function(s){return(kk_KW[s.row]||'').trim()&&!kk_DONE.has(s.row)&&!kk_MSG[s.row]}).length;
  if(rb){if(!kk_GEN&&remaining>0){rb.style.display='flex';rb.querySelector('span').textContent=remaining+'명 미생성'}else{rb.style.display='none'}}
}

function kk_rList(){
  kk_VIEW='list';kk_EDITMODE=false;kk_EDITED.clear();
  var reviewList=kk_S.filter(function(s){return kk_isReview(s)});
  var ungenList=kk_S.filter(function(s){return(kk_KW[s.row]||'').trim()&&kk_isUngen(s)});
  var doneList=kk_S.filter(function(s){return kk_DONE.has(s.row)});
  var total=reviewList.length+ungenList.length+doneList.length;
  var pct=total?Math.round(doneList.length/total*100):0;
  var remaining=kk_S.filter(function(s){return(kk_KW[s.row]||'').trim()&&!kk_DONE.has(s.row)&&!kk_MSG[s.row]}).length;
  var infoParts=[];
  if(ungenList.length>0)infoParts.push('미생성 <b>'+ungenList.length+'</b>명');
  if(reviewList.length>0)infoParts.push('검수대기 <b class="b-o">'+reviewList.length+'</b>명');
  if(doneList.length>0)infoParts.push('복사완료 <b class="b-g">'+doneList.length+'</b>명');
  var h='<div class="bar"><span class="bar-info">'+infoParts.join(' · ')+'</span>';
  if(reviewList.length>0)h+='<button class="btn btn-d" id="kk_editBtn" onclick="kk_toggleEdit()">키워드 수정</button>';
  h+='</div><div class="progress"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
    '<div class="gen-bar" id="kk_genBar" style="display:none"></div>'+
    '<div class="resume-bar" id="kk_resumeBar" style="'+((!kk_GEN&&remaining>0)?'display:flex':'display:none')+'"><span>'+remaining+'명 미생성</span><button class="btn btn-y" onclick="kk_resumeGen()" style="padding:8px 16px;font-size:12px">이어서 생성</button></div>'+
    '<div id="kk_cardList">'+kk_buildSectionedCards(false)+'</div>';
  Q('app',h);kk_updGB();
}

function kk_buildSectionedCards(edit){
  var gen=kk_S.filter(function(s){return kk_MSG[s.row]||kk_DONE.has(s.row)});
  var reviewList=gen.filter(function(s){return kk_isReview(s)});
  var ungenList=kk_S.filter(function(s){return(kk_KW[s.row]||'').trim()&&kk_isUngen(s)&&!kk_MSG[s.row]});
  var doneList=gen.filter(function(s){return kk_DONE.has(s.row)});
  var h='';
  if(!gen.length&&!ungenList.length&&!kk_GEN)return '<div style="padding:40px 20px;text-align:center"><p style="color:#555;font-size:13px;margin-bottom:16px">생성된 메시지가 없습니다</p><button class="btn btn-y" onclick="kk_rInput()" style="padding:12px 24px">← 키워드 입력</button></div>';
  if(!gen.length&&!ungenList.length&&kk_GEN)return '';
  if(reviewList.length>0){
    h+='<div class="sec-header"><div class="sec-dot sec-dot-o"></div><span class="sec-label sec-label-o">검수대기</span><span class="sec-count">'+reviewList.length+'명</span><div class="sec-line"></div></div>';
    reviewList.forEach(function(s){h+=kk_buildOneCard(s,edit,'review')});
  }
  if(ungenList.length>0){
    h+='<div class="sec-header"><div class="sec-dot sec-dot-y"></div><span class="sec-label sec-label-y">미생성</span><span class="sec-count">'+ungenList.length+'명</span><div class="sec-line"></div></div>';
    ungenList.forEach(function(s){h+=kk_buildOneCard(s,edit,'ungen')});
  }
  if(doneList.length>0){
    h+='<div class="sec-header"><div class="sec-dot sec-dot-g"></div><span class="sec-label sec-label-g">복사완료</span><span class="sec-count">'+doneList.length+'명</span><div class="sec-line"></div></div>';
    doneList.forEach(function(s){h+=kk_buildOneCard(s,edit,'done')});
  }
  return h;
}

function kk_buildOneCard(s,edit,status){
  var kw=kk_KW[s.row]||'',isShort=kk_SHORT[s.row];
  if(edit&&status==='review'){
    return '<div style="padding:10px 20px;border-bottom:1px solid #151515;display:flex;align-items:center;gap:12px"><div class="av av-o">'+s.name[0]+'</div><div style="flex:1;min-width:0"><div class="card-name">'+s.name+'</div><input class="card-kw-input" value="'+esc(kw)+'" oninput="kk_onEditKw('+s.row+',this.value)" placeholder="키워드"/></div></div>';
  }
  var avC,stC,stT;
  if(status==='done'){avC='av-g';stC='#4ade80';stT='복사완료'}
  else if(status==='ungen'){avC='av-y';stC='#FFD43B';stT='미생성'}
  else{avC='av-o';stC='#f59e0b';stT=isShort?'짧음':'검수대기'}
  var stHtml;
  if(kk_EDITED.has(s.row)&&status==='review'){
    stHtml='<span onclick="event.stopPropagation();kk_doRegenFromList('+s.row+')" style="background:#f59e0b;color:var(--on);padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer">재생성</span>';
  }else{stHtml='<span class="card-st" style="color:'+stC+'">'+stT+'</span>'}
  var cardClass=status==='done'?'card done-card':'card';
  var clickAction=status==='ungen'?'':'onclick="kk_showDet('+s.row+')"';
  return '<div class="'+cardClass+'" '+clickAction+'><div class="av '+avC+'">'+s.name[0]+'</div><div class="card-body"><div class="card-name">'+s.name+'</div><div class="card-kw"><span class="card-kw-label">키워드</span><span class="card-kw-text">'+esc(kw.substring(0,35))+'</span></div></div>'+stHtml+'</div>';
}

function kk_onEditKw(row,v){if(kk_KW[row]!==v)kk_EDITED.add(row);kk_KW[row]=v}

function kk_toggleEdit(){
  kk_EDITMODE=!kk_EDITMODE;
  document.getElementById('kk_cardList').innerHTML=kk_buildSectionedCards(kk_EDITMODE);
  var btn=document.getElementById('kk_editBtn');
  if(btn){
    if(kk_EDITMODE){btn.textContent='수정 완료';btn.classList.remove('btn-d');btn.classList.add('btn-y')}
    else{
      btn.classList.remove('btn-y');btn.classList.add('btn-d');btn.textContent='키워드 수정';
      var reviewS=kk_S.filter(function(s){return kk_isReview(s)});
      apiPost('saveKeywords',{updates:reviewS.map(function(s){return{row:s.row,kw:kk_KW[s.row]||''}})});
      kk_refreshCards();
    }
  }
}

function kk_doRegenFromList(row){
  kk_EDITED.delete(row);delete kk_MSG[row];delete kk_SHORT[row];
  kk_CANCEL=false;kk_GEN=true;kk_GEN_TG=[kk_S.find(function(s){return s.row===row})];kk_GT=1;kk_GC=0;
  kk_refreshCards();kk_updGB();kk_runGen(0);
}

function kk_showDet(row){if(kk_EDITMODE)return;if(!kk_MSG[row])return;kk_CI=kk_S.findIndex(function(s){return s.row===row});kk_rDet(false)}

function kk_buildCarousel(anim){
  var gl=kk_S.filter(function(x){return kk_MSG[x.row]});
  var pos=gl.findIndex(function(x){return x.row===kk_S[kk_CI].row});
  var prev=pos>0?gl[pos-1].name:'';
  var cur=gl[pos]?gl[pos].name:'';
  var nxt=pos<gl.length-1?gl[pos+1].name:'';
  var cls=anim?' car-anim':'';
  var h='';
  if(prev)h+='<span class="car-name near" onclick="kk_nav(-1)">'+prev+'</span>';
  h+='<span class="car-name active'+cls+'">'+cur+'</span>';
  if(nxt)h+='<span class="car-name near'+cls+'" onclick="kk_nav(1)">'+nxt+'</span>';
  return h;
}

function kk_rDet(slide){
  kk_VIEW='detail';
  var s=kk_S[kk_CI],m=kk_MSG[s.row]||'',d=kk_DONE.has(s.row),isShort=kk_SHORT[s.row];
  var gl=kk_S.filter(function(x){return kk_MSG[x.row]});
  var pos=gl.findIndex(function(x){return x.row===s.row})+1;
  var sentBadge=d?'<div class="sent-badge">복사 완료</div>':'';
  var shortWarn=(!d&&isShort)?'<div class="short-warn">⚠ 메시지가 짧습니다. 직접 수정하세요.</div>':'';
  var tagHtml='';
  if(!d){
    if(kk_REGEN.has(s.row))tagHtml='<div class="regen-wait"><div class="spin-s"></div>생성 대기 중...</div>';
    else tagHtml='<div class="regen-tag" style="color:#f59e0b;background:rgba(245,158,11,0.08)" onclick="kk_doRegen('+s.row+')">AI 생성 메시지 ↻ 다시 생성</div>';
  }
  var btns;
  if(d){btns='<div class="det-btns"><button class="btn btn-d" onclick="kk_undo('+s.row+')">되돌리기</button><button class="btn btn-y" onclick="kk_doCopy('+s.row+')">복사하기</button></div>'}
  else{btns='<button class="btn-y-full" onclick="kk_doCopy('+s.row+')">복사하기</button>'}
  var msgHtml;
  if(d){msgHtml='<div class="msg-display done">'+esc(m)+'</div>'}
  else{msgHtml='<div class="msg-display" id="kk_msgdiv" onclick="kk_enterEdit('+s.row+')">'+esc(m)+'</div><div class="msg-edit-hint">탭하여 수정</div>'}
  var wrap=slide?'<div class="det-body slide">':'<div class="det-body">';
  Q('app',
    '<div class="det-head"><div class="det-row1"><button class="btn btn-d" onclick="kk_rList()" style="padding:7px 14px;font-size:12px">목록으로</button><span id="kk_detCount" style="font-size:13px;font-weight:600;color:#888">'+pos+' / '+gl.length+'</span><div class="det-nav"><div class="nav-b" onclick="kk_nav(-1)">‹</div><div class="nav-b" onclick="kk_nav(1)">›</div></div></div><div class="carousel" id="kk_carousel">'+kk_buildCarousel(slide)+'</div></div>'+
    wrap+'<div class="det-stu"><div class="det-av">'+s.name[0]+'</div><div><div class="det-name">'+s.name+'</div><div class="det-sub">'+s.gg+' · '+esc(kk_KW[s.row]||'')+'</div></div></div>'+sentBadge+shortWarn+tagHtml+msgHtml+btns+'</div>');
}

function kk_enterEdit(row){
  var div=document.getElementById('kk_msgdiv');if(!div)return;
  var m=kk_MSG[row]||'';
  var ta=document.createElement('textarea');
  ta.className='msg-area';ta.id='kk_msgbox';ta.value=m;
  ta.addEventListener('input',function(){kk_MSG[row]=this.value;kk_SHORT[row]=false});
  div.parentNode.replaceChild(ta,div);
  var hint=document.querySelector('.msg-edit-hint');
  if(hint)hint.innerHTML='<span onclick="kk_exitEdit('+row+')" style="color:#FFD43B;cursor:pointer;font-weight:600">수정 완료 ✓</span>';
  ta.style.height='auto';ta.style.height=Math.max(220,ta.scrollHeight)+'px';
  ta.focus();
}

function kk_exitEdit(row){
  var ta=document.getElementById('kk_msgbox');if(!ta)return;
  kk_MSG[row]=ta.value;
  apiPost('saveMessage',{row:row,text:ta.value});
  ta.blur();
  var div=document.createElement('div');
  div.className='msg-display';div.id='kk_msgdiv';
  div.setAttribute('onclick','kk_enterEdit('+row+')');
  div.textContent=ta.value;
  ta.parentNode.replaceChild(div,ta);
  var hint=document.querySelector('.msg-edit-hint');
  if(hint)hint.innerHTML='탭하여 수정';
}

function kk_nav(dir){
  var cur=kk_S[kk_CI];
  if(!kk_DONE.has(cur.row)){var b=document.getElementById('kk_msgbox');if(b){kk_MSG[cur.row]=b.value;apiPost('saveMessage',{row:cur.row,text:b.value})}}
  var gl=kk_S.filter(function(x){return kk_MSG[x.row]});
  var p=gl.findIndex(function(x){return x.row===cur.row})+dir;
  if(p>=0&&p<gl.length){kk_CI=kk_S.findIndex(function(x){return x.row===gl[p].row});kk_rDet(dir>0)}
}

function kk_doCopy(row){
  var b=document.getElementById('kk_msgbox'),m=b?b.value:kk_MSG[row];kk_MSG[row]=m;
  try{navigator.clipboard.writeText(m)}catch(e){}
  if(!kk_DONE.has(row)){
    kk_DONE.add(row);kk_SHORT[row]=false;
    apiPost('markDone',{row:row,text:m}).catch(function(e){kk_DONE.delete(row)});
  }
  var gl=kk_S.filter(function(x){return kk_MSG[x.row]});
  var p=gl.findIndex(function(x){return x.row===row});
  var nextPending=gl.slice(p+1).find(function(x){return!kk_DONE.has(x.row)});
  if(nextPending){kk_CI=kk_S.findIndex(function(x){return x.row===nextPending.row});kk_rDet(true)}
  else{toast('모든 메시지 복사 완료!');setTimeout(function(){kk_rInput()},1200)}
}

function kk_doRegen(row){
  var s=kk_S.find(function(x){return x.row===row}),kw=kk_KW[row]||'';
  if(!kw.trim()){toast('키워드를 입력해주세요');return}
  kk_REGEN.add(row);kk_rDet(false);
  apiPost('generateKakao',{name:s.name,gg:s.gg,kw:kw,hist:s.hist}).then(function(m){
    kk_REGEN.delete(row);
    if(m.indexOf('[SHORT]')===0){kk_SHORT[row]=true;m=m.substring(7)}else{kk_SHORT[row]=false}
    kk_MSG[row]=m;apiPost('saveMessage',{row:row,text:m});
    if(kk_VIEW==='detail'&&kk_S[kk_CI].row===row)kk_rDet(false);
  }).catch(function(e){kk_REGEN.delete(row);toast('실패: '+e.message);kk_rDet(false)});
}

function kk_undo(row){
  kk_DONE.delete(row);kk_rDet(false);
  apiPost('undoDone',{row:row}).catch(function(e){kk_DONE.add(row);kk_rDet(false)});
}

// 명세서 모듈 (inv_ prefix)
// ═══════════════════════════════════════
var inv_students=[];
var inv_loaded=false;
var inv_VIEW='setting';
var inv_stuPage=0,inv_carIdx=0,inv_PER_PAGE=5;
var inv_sent=new Set();
var inv_editingMsg={};
var inv_historySaving=false;
var inv_revSum=0;
var inv_revDisplay=0;
var inv_revRaf=null;
var inv_lastAdd=0;
var inv_listFilter='all'; // 'all' | 'sent'
var inv_carSlide=''; // '' | 'next' | 'prev'
var inv_bulkFromList=false;
var inv_bulkSel=new Set();

function inv_bulkUiRefresh(){
  var eligible=0;
  for(var ei=0;ei<inv_students.length;ei++){if(inv_bulkEligible(ei))eligible++}
  var selN=inv_bulkSelCount();
  var allOn=(eligible>0 && selN===eligible);

  var allCb=document.getElementById('inv_bulk_all_cb');
  if(allCb){
    allCb.disabled=(eligible<1);
    allCb.checked=allOn;
    allCb.indeterminate=(!allOn && selN>0 && selN<eligible);
  }
  var btn=document.getElementById('inv_bulk_send_btn');
  if(btn){
    btn.disabled=(selN<1);
    btn.textContent='일괄 친구톡 ('+selN+'명 선택)';
  }
  var items=document.querySelectorAll('.inv-list-item[data-idx]');
  items.forEach(function(el){
    var i=parseInt(el.getAttribute('data-idx'),10);
    if(isNaN(i))return;
    var can=inv_bulkEligible(i);
    el.classList.toggle('disabled',!can);
    var cb=el.querySelector('input[type="checkbox"][data-role="inv-bulk-item"]');
    if(cb){
      cb.disabled=!can;
      cb.checked=!!inv_bulkSel.has(i);
    }
  });
}

function inv_phoneOk(s){
  var p=String((s&&s.phone)||'').replace(/\D/g,'');
  return p.length>=10;
}
function inv_bulkEligible(i){
  return !!(inv_students[i]&&inv_phoneOk(inv_students[i]));
}
function inv_bulkSelCount(){
  var n=0;
  inv_bulkSel.forEach(function(i){ if(inv_bulkEligible(i)) n++; });
  return n;
}
function inv_bulkToggle(i){
  if(!inv_bulkEligible(i))return;
  if(inv_bulkSel.has(i))inv_bulkSel.delete(i);
  else inv_bulkSel.add(i);
  inv_bulkUiRefresh();
}
function inv_bulkAllToggle(cb){
  var eligible=0;
  for(var ei=0;ei<inv_students.length;ei++){if(inv_bulkEligible(ei))eligible++}
  var selN=inv_bulkSelCount();
  var allOn=(eligible>0&&selN===eligible);
  var nextOn=(cb&&typeof cb.checked==='boolean') ? cb.checked : !allOn;
  inv_bulkSel.clear();
  if(nextOn){
    for(var i=0;i<inv_students.length;i++){
      if(inv_bulkEligible(i))inv_bulkSel.add(i);
    }
  }
  inv_bulkUiRefresh();
}
function inv_getMsgFor(idx){
  return inv_editingMsg[idx]||inv_buildMessage(inv_students[idx]);
}
function inv_parseTuitionLine(msg,name){
  var escN=String(name||'').replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  var re=new RegExp('•\\s*'+escN+'\\s*\\(([^)]*)\\)\\s*-\\s*([\\d,]+)원');
  var m=String(msg||'').match(re);
  if(!m)return null;
  return {freq:m[1].trim(),feeRaw:m[2].replace(/,/g,'')};
}
function inv_tuitionDiffersFromMaster(idx){
  var s=inv_students[idx];
  var p=inv_parseTuitionLine(inv_getMsgFor(idx),s.name);
  if(!p)return false;
  var mf=inv_feeNumber(s);
  var pf=parseInt(p.feeRaw,10);
  if(isNaN(pf))pf=mf;
  var freqOk=(p.freq===(s.freq||'').trim());
  var feeOk=(pf===mf);
  return !freqOk||!feeOk;
}
function inv_applySentState(idx){
  if(inv_sent.has(idx))return;
  var n=inv_studentRevenue(inv_students[idx]);
  inv_lastAdd=n;
  inv_revSum+=n;
  inv_sent.add(idx);
  inv_syncCarouselSentUI();
  var host=document.getElementById('inv_rev_bar_host');
  if(host)host.innerHTML=inv_buildRevBar();
  inv_revAnimate(inv_revSum);
}
function inv_applyMasterFromMsg(idx, cb){
  var s=inv_students[idx];
  var p=inv_parseTuitionLine(inv_getMsgFor(idx),s.name);
  if(!p||!s.row){cb();return;}
  var feeStr=parseInt(p.feeRaw,10);
  if(isNaN(feeStr)){cb();return;}
  feeStr=feeStr.toLocaleString();
  apiPost('updateStudent',{
    row:s.row,
    name:s.name,
    grade:s.grade||'',
    gender:s.gender||'',
    freq:p.freq,
    fee:feeStr,
    phone:s.phone||'',
    parentName:s.parentName||'',
    level:s.level||''
  }).then(function(){
    s.freq=p.freq;
    s.fee=feeStr;
    if(typeof inv_editingMsg[idx]!=='undefined')inv_editingMsg[idx]=inv_buildMessage(s);

function inv_parseMaterialLineSum(t){
  if(!t)return 0;
  var sum=0,s=String(t),re=/([\d,]+)\s*원/g,m;
  while((m=re.exec(s))!==null){var n=parseInt(m[1].replace(/,/g,''),10);if(!isNaN(n))sum+=n}
  return sum;
}
function inv_materialsSumForStudent(s){
  if(!s||!s.materials)return 0;
  var sum=0;
  s.materials.forEach(function(x){sum+=inv_parseMaterialLineSum(x.text)});
  return sum;
}
function inv_studentRevenue(s){
  return inv_feeNumber(s)+inv_materialsSumForStudent(s);
}
function inv_calcTotalRaw(){
  var sum=0;
  inv_students.forEach(function(s){sum+=inv_studentRevenue(s)});
  return sum;
}
function inv_calcTotal(){
  return inv_calcTotalRaw().toLocaleString();
}
function inv_refreshTotalHint(){
  var el=document.getElementById('inv_total_hint');
  if(el)el.textContent=inv_calcTotalRaw().toLocaleString();
}
function inv_displayFee(s){
  var n=inv_feeNumber(s);
  return n?n.toLocaleString():String((s&&s.fee)||'').trim()||'0';
}
function inv_formatMatLineBlur(t){
  return String(t).replace(/(\d[\d,]*)\s*원/g,function(_,g){
    var n=parseInt(g.replace(/,/g,''),10);
    return (isNaN(n)?g:n.toLocaleString())+'원';
  });
}
function inv_blurMat(i,mi,el){
  var nt=inv_formatMatLineBlur(el.value);
  if(nt!==el.value){inv_students[i].materials[mi].text=nt;el.value=nt;inv_autoSave(i)}
  inv_refreshTotalHint();
}
function inv_matHasToken(st,amt){
  var token=(amt||0).toLocaleString()+'원';
  if(!st.materials||!st.materials.length)return false;
  var t=(st.materials[st.materials.length-1].text||'').trim();
  var re=new RegExp('(^|\\s)'+token.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'(?=\\s|$)');
  return re.test(t);
}

function inv_buildStudents(){

  var hasPrev=inv_stuPage>0,hasNext=inv_stuPage<totalPages-1;

  s+='<div class="swipe-hint'+(hasPrev?' has-prev':'')+(hasNext?' has-next':'')+'">';
  s+='<span>'+(hasPrev?'◀ 이전':'')+'</span><span>'+(hasNext?'다음 ▶':'')+'</span></div>';
  for(var i=start;i<end;i++){
    var st=inv_students[i],isOpen=inv_openStudents.has(i);
    var matAny=st.materials&&st.materials.some(function(x){return(x.text||'').trim()});
    var feeDisp=inv_displayFee(st);
    s+='<div class="stu-item"><div class="stu-row" onclick="inv_toggleStu('+i+')">';
    s+='<div class="stu-av">'+st.name[0]+'</div>';
    s+='<span class="stu-name">'+st.name+'</span>';
    s+='<span class="stu-summary">'+(st.freq||'미입력')+' · '+feeDisp+'원'+(matAny?' · 교재비':'')+'</span>';
    s+='<span class="stu-arrow'+(isOpen?' open':'')+'">›</span></div>';
    s+='<div class="stu-detail'+(isOpen?' open':'')+'"><div class="stu-detail-inner">';
    if(st.materials&&st.materials.length>0){
      st.materials.forEach(function(mat,mi){
        s+='<div class="added-item"><div class="added-item-row"><div class="added-item-remove" onclick="inv_removeMat('+i+','+mi+')">✕</div><input value="'+esc(mat.text)+'" placeholder="예: 3/6 반주1 : 7,000원" oninput="inv_students['+i+'].materials['+mi+'].text=this.value;inv_autoSave('+i+');inv_refreshTotalHint()" onblur="inv_blurMat('+i+','+mi+',this)"/></div></div>';
      });
      s+='<div class="material-note">* 교재비는 이체 부탁드립니다🩷</div>';
    }else if(st.prevMaterials&&st.prevMaterials.length>0){
      s+='<div class="material-note">* 전월 교재비 기록이 있어요 (자동 입력 안 함)</div>';
    }
    s+='<div class="add-btn" onclick="inv_addMat('+i+')">+ 교재비 추가</div>';
    s+='<div class="mat-quick"><span class="mat-quick-label">빠른 입력 · 한 번 더 누르면 취소</span>';
    [7000,10000,15000].forEach(function(amt){
      var lab=amt.toLocaleString()+'원';
      s+='<button type="button" class="mat-quick-btn'+(inv_matHasToken(st,amt)?' selected':'')+'" onclick="inv_quickMat('+i+','+amt+')">'+lab+'</button>';
    });
    s+='</div>';
    s+='</div></div></div>';
  }
  if(totalPages>1){
    s+='<div class="pagi"><div class="pagi-btn'+(inv_stuPage===0?' disabled':'')+'" onclick="inv_goPage('+(inv_stuPage-1)+')">‹</div>';
    for(var p=0;p<totalPages;p++)s+='<div class="pagi-num'+(p===inv_stuPage?' active':'')+'" onclick="inv_goPage('+p+')">'+(p+1)+'</div>';
    s+='<div class="pagi-btn'+(inv_stuPage>=totalPages-1?' disabled':'')+'" onclick="inv_goPage('+(inv_stuPage+1)+')">›</div></div>';
  }
  s+='</div>';
  return s;
}

function inv_attachSwipe(){
  var el=document.getElementById('inv_stuListWrap');if(!el)return;
  var sx=0,sy=0;
  el.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
  el.addEventListener('touchmove',function(e){var dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>8)e.preventDefault()},{passive:false});
  el.addEventListener('touchend',function(e){var dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)<Math.abs(dy)||Math.abs(dx)<40)return;var totalPages=Math.ceil(inv_students.length/inv_PER_PAGE);if(dx<0&&inv_stuPage<totalPages-1)inv_goPage(inv_stuPage+1,'left');else if(dx>0&&inv_stuPage>0)inv_goPage(inv_stuPage-1,'right')},{passive:true});
}

function inv_goPage(p,dir){
  var mx=Math.ceil(inv_students.length/inv_PER_PAGE)-1;
  if(p<0||p>mx)return;
  var d=dir||(p>inv_stuPage?'left':'right');

  var el=document.getElementById('inv_stuListWrap');
  if(el){el.classList.add('stu-slide-'+d);setTimeout(function(){if(el)el.classList.remove('stu-slide-left','stu-slide-right')},300)}
}
function inv_quickMat(i,amt){
  var token=(amt||0).toLocaleString()+'원';
  var st=inv_students[i];
  if(!st.materials.length)st.materials.push({text:''});
  var last=st.materials[st.materials.length-1];
  var t=(last.text||'').trim();
  var escTok=token.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  var re=new RegExp('(^|\\s)'+escTok+'(?=\\s|$)');
  if(re.test(t)){
    last.text=t.replace(re,'').replace(/\s+/g,' ').trim();
  }else{
    last.text=t?(t+' '+token):token;
  }
  inv_autoSave(i);inv_renderSetting();
}
function inv_addMat(i){inv_students[i].materials.push({text:''});inv_renderSetting()}
function inv_removeMat(si,mi){inv_students[si].materials.splice(mi,1);inv_autoSave(si);inv_renderSetting()}
function inv_addSched(){inv_scheduleItems.push({title:'',value:'',placeholder:'날짜와 내용 입력'});inv_openSections.schedule=true;inv_renderSetting();toast('항목 추가됨')}

function inv_makeEditable(el){

  el.addEventListener('blur',function(){el.contentEditable='false';el.classList.remove('editing');el.parentNode.querySelector('.edit-hint').textContent='탭하여 수정'},{once:true});
}

function inv_attachMsgEditOutside(){
  var body=document.getElementById('inv_car_body');
  if(!body)return;
  body.addEventListener('click',function(e){
    var ta=document.getElementById('inv_msgTA');
    if(!ta)return;
    if(e.target===ta||(ta.contains&&ta.contains(e.target)))return;
    if(e.target.closest&&e.target.closest('.inv-car-actions'))return;
    inv_exitMsgEdit();
  });
}
function inv_attachCarouselSwipe(){
  var el=document.getElementById('inv_car_body');
  if(!el)return;
  var sx=0,sy=0;
  el.addEventListener('touchstart',function(e){
    if(!e.touches||e.touches.length!==1)return;
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;
  },{passive:true});
  el.addEventListener('touchend',function(e){
    var t=e.changedTouches&&e.changedTouches[0];
    if(!t)return;
    var dx=t.clientX-sx,dy=t.clientY-sy;
    if(Math.abs(dx)<56||Math.abs(dy)>Math.abs(dx)*0.75)return;
    if(dx<0)inv_carNav(1);else inv_carNav(-1);
  },{passive:true});
}
function inv_cancelRevAnim(){if(inv_revRaf){cancelAnimationFrame(inv_revRaf);inv_revRaf=null}}
function inv_syncRevBarNums(){

  if(a)a.textContent=ts;if(b)b.textContent=ts;
}
function inv_revAnimate(to){
  inv_cancelRevAnim();
  var from=inv_revDisplay,start=performance.now(),dur=420;
  function ease(t){return 1-Math.pow(1-t,3)}
  function tick(now){
    var u=Math.min(1,(now-start)/dur);
    inv_revDisplay=Math.round(from+(to-from)*ease(u));
    inv_syncRevBarNums();
    if(u<1)inv_revRaf=requestAnimationFrame(tick);
    else{inv_revDisplay=to;inv_syncRevBarNums();inv_revRaf=null}
  }
  inv_revRaf=requestAnimationFrame(tick);
}
function inv_buildRevBar(){

  return '<div class="inv-rev-bar"><div class="inv-rev-left">누적 <b id="inv_rev_left_num">'+total+'</b>원</div><div class="inv-rev-right">'+right+'</div></div>';

    var mats=s.materials.filter(function(x){return x.text.trim()});

      m+='• 교재비\n';

  m+='━━━━━━━━━━━\n🎵 '+inv_selectedMonth+'월 수업 일정\n';

    });

function inv_runBulkFriend(idxs){
  var queue=[];
  for(var k=0;k<idxs.length;k++){
    var i=idxs[k];
    if(inv_phoneOk(inv_students[i])) queue.push({idx:i,name:inv_students[i].name,phone:inv_students[i].phone,message:inv_getMsgFor(i)});
  }
  if(!queue.length){toast('발송할 항목 없음');return;}
  var allRes=[];
  var cur=0;
  function prog(){
    Q('app','<div class="summary-wrap fade-in"><div class="summary-title">발송 중</div><div class="pay-sum" id="inv_bulk_prog">'+(cur+1)+'/'+queue.length+' 발송 중...</div></div>');
  }
  function step(){
    if(cur>=queue.length){
      var lines=allRes.map(function(x){return '<div class="'+(x.ok?'ok':'fail')+'">'+esc(x.name)+' '+(x.ok?'성공':'실패')+(x.error?(' '+esc(x.error)):'')+'</div>';}).join('');
      Q('app','<div class="summary-wrap fade-in"><div class="summary-title">발송 완료</div><div class="summary-result">'+lines+'</div><button class="summary-back" onclick="inv_VIEW=\'setting\';inv_render()">← 설정으로</button></div>');
      return;
    }
    prog();
    var at=cur;
    apiPost('sendInvoiceFriendTalk',{students:[{name:queue[at].name,phone:queue[at].phone,message:queue[at].message}]}).then(function(res){
      var r=(res&&res.results)||[];
      if(r[0]&&r[0].ok)inv_applySentState(queue[at].idx);
      if(r[0])allRes.push(r[0]);
      cur++;
      step();
    }).catch(function(e){
      allRes.push({name:queue[at].name,ok:false,error:e.message});
      cur++;
      step();
    });
  }
  step();
}

function stu_patchInvFromRec(rec){
  for(var i=0;i<inv_students.length;i++){

      inv_students[i].name=rec.name;
      inv_students[i].grade=rec.grade;
      inv_students[i].gender=rec.gender;

      inv_students[i].parentName=rec.parentName;

      return;
    }

function stu_patchPayFromRec(rec,oldName){
  if(!pay_status||!pay_status.students)return;
  var n=parseInt(String(rec.fee||'').replace(/,/g,''),10);
  if(isNaN(n))n=0;
  var fd=String(rec.fee||'').trim();
  var match=oldName||rec.name;
  var found=false;
  pay_status.students.forEach(function(p){
    if(p.name===match){
      p.name=rec.name;p.fee=n;p.feeDisplay=fd;found=true;
    }
  });
  if(!found)pay_status.students.push({name:rec.name,fee:n,feeDisplay:fd,paid:false,paidDate:''});
}

    return;
  }
  Q('app','<div class="loading"><div class="spin"></div>불러오는 중...</div>');
  apiGet('loadStudents').then(function(data){
    stu_list=data||[];
    stu_loaded=true;
    if(MODE!=='stu')return;
    stu_render();
  }).catch(function(e){if(MODE==='stu')Q('app','<div style="padding:20px;color:#f87171">'+esc(e.message)+'</div>');});
}
function stu_render(){
  var q=stu_filter.trim().toLowerCase();
  var rows=stu_list.filter(function(s){
    if(!q)return true;
    return (String(s.name||'')+String(s.grade||'')+String(s.phone||'')).toLowerCase().indexOf(q)>=0;
  });
  var cards='';
  cards+='<div style="padding:8px 20px"><button class="btn btn-y" onclick="stu_openEdit(null)" style="width:100%">+ 학생 추가</button></div>';
  rows.forEach(function(rec){
    var sfee=String(rec.fee||'').trim()||'-';
    cards+='<div class="stu-card"><div class="stu-card-top"><div><div class="stu-card-name">'+esc(rec.name)+'</div>';
    cards+='<div class="stu-card-meta">'+esc(rec.grade||'')+' · '+esc(rec.gg||'')+' · '+esc(sfee)+(sfee==='-'?'':'원')+'</div></div>';
    cards+='<div class="stu-card-actions"><button type="button" class="stu-mini" onclick="stu_openEdit('+rec.row+')">수정</button>';
    cards+='<button type="button" class="stu-mini" onclick="stu_delete('+rec.row+')">삭제</button></div></div></div>';
  });
  if(!rows.length)cards+='<div style="padding:24px;text-align:center;color:#555;font-size:13px">검색 결과가 없습니다</div>';
  var cardList=document.getElementById('stu_cardList');
  if(cardList){
    cardList.innerHTML=cards;
    return;
  }
  var h='<div class="stu-search"><input type="search" id="stu_searchInput" placeholder="이름 · 학년 · 연락처 검색" value="'+esc(stu_filter)+'" oninput="stu_filter=this.value;stu_render()"/></div>';
  h+='<div id="stu_cardList">'+cards+'</div>';
  Q('app',h);
}
function stu_pickGenderChip(v){
  document.getElementById('stu_e_gender').value=v;
  document.querySelectorAll('.stu-chip-gen').forEach(function(c){
    c.classList.toggle('selected',c.getAttribute('data-v')===v);
  });
}
function stu_pickFreqChip(v){
  document.getElementById('stu_e_freq').value=v;
  document.querySelectorAll('.stu-chip-fr').forEach(function(c){
    c.classList.toggle('selected',c.getAttribute('data-v')===v);
  });
}
function stu_pickFeeChip(amt){
  document.getElementById('stu_e_fee').value=amt.toLocaleString();
  document.querySelectorAll('.stu-chip-fee').forEach(function(c){
    c.classList.toggle('selected',c.getAttribute('data-a')===String(amt));
  });
}
function stu_onFeeInput(){
  document.querySelectorAll('.stu-chip-fee').forEach(function(c){c.classList.remove('selected');});
}
function stu_openEdit(row){
  var o=row?stu_list.find(function(x){return x.row===row}):null;
  if(!o)o={name:'',grade:'',gender:'',freq:'',fee:'',phone:'',parentName:'',level:''};
  stu_editing=o;
  var isNew=!row;
  var g=o.gender||'';
  var fq=o.freq||'';
  var feeRaw=String(o.fee||'').replace(/,/g,'');
  var feeNum=parseInt(feeRaw,10);
  var feePres=[90000,110000,130000,150000];
  var feeSel=feePres.indexOf(feeNum)>=0;
  var h='<div class="edit-page">';
  h+='<div class="edit-topbar"><button type="button" class="btn btn-d" onclick="stu_render()">← 돌아가기</button><span style="font-size:15px;font-weight:700">'+(isNew?'학생 추가':'학생 수정')+'</span><button type="button" class="btn btn-y" onclick="stu_save('+(isNew?'null':row)+')">저장</button></div>';
  h+='<div class="edit-field"><div class="edit-label">이름</div><input class="fee-input" id="stu_e_name" value="'+esc(o.name)+'" style="width:100%"/></div>';
  h+='<div class="edit-field"><div class="edit-label">학년</div><input class="fee-input" id="stu_e_grade" value="'+esc(o.grade)+'" style="width:100%"/></div>';
  h+='<div class="edit-field"><div class="edit-label">성별</div><div class="edit-chips">';
  h+='<button type="button" class="fee-chip stu-chip-gen" data-v="남" onclick="stu_pickGenderChip(\'남\')">남</button>';
  h+='<button type="button" class="fee-chip stu-chip-gen" data-v="여" onclick="stu_pickGenderChip(\'여\')">여</button>';
  h+='</div><input type="hidden" id="stu_e_gender" value="'+esc(g)+'"/></div>';
  h+='<div class="edit-field"><div class="edit-label">주 횟수</div><div class="edit-chips">';
  h+='<button type="button" class="fee-chip stu-chip-fr" data-v="주 1회" onclick="stu_pickFreqChip(\'주 1회\')">주1</button>';
  h+='<button type="button" class="fee-chip stu-chip-fr" data-v="주 2회" onclick="stu_pickFreqChip(\'주 2회\')">주2</button>';
  h+='<button type="button" class="fee-chip stu-chip-fr" data-v="주 3회" onclick="stu_pickFreqChip(\'주 3회\')">주3</button>';
  h+='</div><input type="hidden" id="stu_e_freq" value="'+esc(fq)+'"/></div>';
  h+='<div class="edit-field"><div class="edit-label">수강료</div><div class="edit-chips">';
  feePres.forEach(function(a){
    var sel=feeSel&&feeNum===a;
    h+='<button type="button" class="fee-chip stu-chip-fee'+(sel?' selected':'')+'" data-a="'+a+'" onclick="stu_pickFeeChip('+a+')">'+a.toLocaleString()+'원</button>';
  });
  h+='</div><input class="fee-input" id="stu_e_fee" value="'+esc(o.fee||'')+'" placeholder="직접 입력" oninput="stu_onFeeInput()" style="width:100%;margin-top:4px"/></div>';
  h+='<div class="edit-field"><div class="edit-label">학부모명</div><input class="fee-input" id="stu_e_parent" value="'+esc(o.parentName||'')+'" style="width:100%"/></div>';
  h+='<div class="edit-field"><div class="edit-label">연락처</div><input class="fee-input" type="tel" id="stu_e_phone" value="'+esc(o.phone||'')+'" style="width:100%"/></div>';
  h+='<div class="edit-field"><div class="edit-label">레벨</div><input class="fee-input" id="stu_e_level" value="'+esc(o.level||'')+'" style="width:100%"/></div>';
  h+='</div>';
  Q('app',h);
  if(g)stu_pickGenderChip(g);
  if(fq)stu_pickFreqChip(fq);
}
function stu_save(row){
  var body={
    name:document.getElementById('stu_e_name').value.trim(),
    grade:document.getElementById('stu_e_grade').value.trim(),
    gender:document.getElementById('stu_e_gender').value.trim(),
    parentName:document.getElementById('stu_e_parent').value.trim(),
    phone:document.getElementById('stu_e_phone').value.trim(),
    fee:document.getElementById('stu_e_fee').value.trim(),
    freq:document.getElementById('stu_e_freq').value.trim(),
    level:document.getElementById('stu_e_level').value.trim()
  };
  if(!body.name){toast('이름을 입력하세요');return;}
  if(row){
    body.row=row;
    var prev=stu_list.find(function(s){return s.row===row})||{};
    var oldName=prev.name;
    var rec=stu_recFromBody(row,body,prev);
    var ix=stu_list.findIndex(function(s){return s.row===row});
    if(ix>=0)stu_list[ix]=rec;
    kk_S=stu_list;
    stu_patchInvFromRec(rec);
    stu_patchPayFromRec(rec,oldName);
    stu_syncAppDataStudents();
    stu_invalidateInvSession();
    stu_rebuildKkMapsFromList();
    stu_render();
    apiPost('updateStudent',body).catch(function(e){
      toast('저장 실패 — 서버와 맞추는 중');
      stu_softReloadFromServer().then(function(){stu_render();}).catch(function(){});
    });
  }else{
    var maxR=1;
    stu_list.forEach(function(s){if(s.row>maxR)maxR=s.row;});
    var guessRow=maxR+1;
    var rec=stu_recNew(guessRow,body);
    stu_list.push(rec);
    kk_S=stu_list;
    inv_students.push({
      row:guessRow,name:rec.name,grade:rec.grade,gender:rec.gender,gg:rec.gg,
      freq:rec.freq,fee:rec.fee,materials:[],phone:rec.phone,parentName:rec.parentName,level:rec.level,
      prevFreq:'',prevFee:'',prevMaterials:[]
    });
    stu_patchPayFromRec(rec);
    stu_syncAppDataStudents();
    stu_invalidateInvSession();
    stu_rebuildKkMapsFromList();
    stu_render();
    apiPost('addStudent',body).then(function(newRow){
      var r=typeof newRow==='number'?newRow:parseInt(newRow,10);
      if((!r||isNaN(r))&&newRow&&typeof newRow==='object'&&newRow.row!=null)r=parseInt(newRow.row,10);
      if(!r||isNaN(r)||r<2){
        stu_softReloadFromServer().then(function(){stu_render();}).catch(function(e){toast(e.message);});
        return;
      }
      if(r!==guessRow){
        stu_softReloadFromServer().then(function(){stu_render();});
        return;
      }
      stu_syncAppDataStudents();
      stu_invalidateInvSession();
    }).catch(function(e){
      toast('저장 실패 — 서버와 맞추는 중');
      stu_list=stu_list.filter(function(s){return s.row!==guessRow});
      kk_S=stu_list;
      inv_students=inv_students.filter(function(x){return x.row!==guessRow});
      stu_rebuildKkMapsFromList();
      stu_softReloadFromServer().then(function(){stu_render();}).catch(function(){});
    });
  }
}
function stu_delete(row){
  var rec=stu_list.find(function(x){return x.row===row});
  if(!rec||!confirm(rec.name+' 학생을 삭제할까요?'))return;
  var delRow=row;
  var nm=rec.name;
  stu_list=stu_list.filter(function(s){return s.row!==delRow});
  stu_list.forEach(function(s){ if(s.row>delRow) s.row--; });
  kk_S=stu_list;
  inv_students=inv_students.filter(function(x){return x.row!==delRow});
  inv_students.forEach(function(x){ if(x.row>delRow) x.row--; });
  if(pay_status&&pay_status.students){
    pay_status.students=pay_status.students.filter(function(p){return p.name!==nm});
  }
  stu_rebuildKkMapsFromList();
  stu_syncAppDataStudents();
  stu_invalidateInvSession();
  toast('삭제됨');
  stu_render();
  apiPost('deleteStudent',{row:delRow}).catch(function(e){
    toast('삭제 실패 — 서버와 맞추는 중');
    stu_softReloadFromServer().then(function(){stu_render();}).catch(function(){});
  });
}

  Q('app','<div class="att-placeholder">📅 출결 · 시간표<br><br>준비 중입니다.</div>');

// ═══════════════════════════════════════
// 매출장부 pay_
// ═══════════════════════════════════════
var pay_loaded=false,pay_status=null,pay_stats=null,pay_year=now.getFullYear(),pay_month=now.getMonth()+1;
function pay_init(){
  if(APP_DATA&&APP_DATA.paymentStatus&&APP_DATA.revenueStats){
    var ps=APP_DATA.paymentStatus;
    if(Number(ps.year)===pay_year&&Number(ps.month)===pay_month){
      pay_status=APP_DATA.paymentStatus;
      pay_stats=APP_DATA.revenueStats;
      pay_loaded=true;
      if(MODE==='pay')pay_render();
      return;
    }
  }
  Q('app','<div class="loading"><div class="spin"></div>불러오는 중...</div>');
  Promise.all([
    apiGet('loadPaymentStatus',{year:pay_year,month:pay_month}),
    apiGet('getRevenueStats')
  ]).then(function(arr){
    pay_status=arr[0];
    pay_stats=arr[1];
    pay_loaded=true;
    if(APP_DATA){
      APP_DATA.paymentStatus=pay_status;
      APP_DATA.revenueStats=pay_stats;
    }
    if(MODE!=='pay')return;
    pay_render();
  }).catch(function(e){if(MODE==='pay')Q('app','<div style="padding:20px;color:#f87171">'+esc(e.message)+'</div>');});
}
function pay_render(){
  if(!pay_status||!pay_stats){pay_init();return;}
  var st=pay_status.students||[];
  var paid=st.filter(function(x){return x.paid}).length;
  var tot=st.length;
  var unpaid=tot-paid;
  var h='<div class="pay-head"><div class="pay-sum">납부 <b style="color:#4ade80">'+paid+'</b>/'+tot+'명 · 미납 <b style="color:#f87171">'+unpaid+'</b>명</div>';
  h+='<div class="month-sel">';
  for(var pm=pay_month-1;pm<=pay_month+1;pm++){
    var mm=pm<1?pm+12:pm>12?pm-12:pm;
    h+='<div class="month-chip'+(mm===pay_month?' active':'')+'" onclick="pay_setMonth('+mm+')">'+mm+'월</div>';
  }
  h+='</div></div><div class="pay-list">';
  st.forEach(function(s,pi){
    h+='<div class="pay-row'+(s.paid?'':' unpaid')+'"><div><div class="pay-name">'+esc(s.name)+'</div><div style="font-size:11px;color:#888">'+(s.feeDisplay||(typeof s.fee==='number'?s.fee.toLocaleString():s.fee))+'원'+(s.paidDate?' · '+esc(s.paidDate):'')+'</div></div>';
    h+='<button type="button" class="pay-toggle'+(s.paid?' on':'')+'" onclick="pay_toggle('+pi+')">'+(s.paid?'납부완료':'미납')+'</button></div>';
  });
  h+='</div><div class="pay-dash"><div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:8px">이번 달 매출</div>';
  var cur=pay_stats.current||{};
  h+='<div class="pay-stat">총 '+cur.total.toLocaleString()+'원 · 수납 '+cur.paid.toLocaleString()+'원 · 수납률 '+cur.rate+'%</div>';
  h+='<div class="pay-ai">'+(pay_stats.aiLine||'')+'</div>';
  h+='<div class="pay-bar-wrap">';
  var bars=pay_stats.bars||[];
  var maxB=1;bars.forEach(function(b){if(b.total>maxB)maxB=b.total;});
  if(maxB<1)maxB=1;
  bars.forEach(function(b){
    var pct=maxB?Math.round(b.total/maxB*100):0;
    h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center"><div class="pay-bar" style="height:100px"><div class="pay-bar-fill" style="height:'+pct+'%"></div></div><div class="pay-bar-lab">'+b.month+'월</div></div>';
  });
  h+='</div></div>';
  Q('app',h);
}
function pay_setMonth(m){
  pay_month=m;
  pay_loaded=false;
  if(APP_DATA)APP_DATA.paymentStatus=null;
  pay_init();
}
function pay_toggle(pi){
  var s=pay_status.students[pi];
  if(!s)return;
  apiPost('togglePayment',{year:pay_year,month:pay_month,name:s.name,paid:!s.paid}).then(function(){
    pay_loaded=false;
    if(APP_DATA)APP_DATA.paymentStatus=null;
    pay_init();
  }).catch(function(e){toast(e.message);});
}
